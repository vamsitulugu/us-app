<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Music 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --h: 215;
  --accent: hsl(var(--h),100%,62%);
  --accent-d: hsl(var(--h),95%,50%);
  --accent-l: hsl(var(--h),100%,78%);
  --accent-glow: hsla(var(--h),100%,62%,0.35);
  --accent2: hsl(300,85%,65%);
  --accent2-d: hsl(300,80%,52%);
  --accent2-glow: hsla(300,85%,65%,0.35);
  --g1: rgba(255,255,255,0.04);
  --g2: rgba(255,255,255,0.08);
  --g3: rgba(255,255,255,0.13);
  --blur: blur(24px) saturate(180%);
  --blur-sm: blur(12px) saturate(150%);
  --ff-serif: 'DM Serif Display',Georgia,serif;
  --ff-sans: 'Inter',system-ui,sans-serif;
  --r: 18px; --rs: 12px; --rss: 8px;
  --white: #ffffff;
  --text: rgba(255,255,255,0.92);
  --text2: rgba(255,255,255,0.62);
  --text3: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.18);
  --green: #34d399; --green-bg: rgba(52,211,153,0.15);
  --red: #f87171; --red-bg: rgba(248,113,113,0.15);
  --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.15);
  --t: all 0.22s cubic-bezier(0.4,0,0.2,1);
  --t-spring: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ff-sans);color:var(--text);min-height:100vh;background:transparent;line-height:1.5}

/* ── NOW PLAYING BAR ── */
.now-playing-bar{
  position:sticky;top:0;z-index:50;
  background:rgba(5,5,18,0.88);backdrop-filter:blur(24px) saturate(200%);
  border-bottom:1px solid var(--border2);
  padding:12px 16px;
}
.np-inner{display:flex;align-items:center;gap:12px}
.np-art{
  width:48px;height:48px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;position:relative;overflow:hidden;
}
.np-art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.np-art.spinning .np-vinyl{animation:spinDisc 4s linear infinite}
.np-vinyl{
  position:absolute;inset:0;border-radius:50%;opacity:0;transition:opacity 0.3s;
  background:conic-gradient(from 0deg,#111 0%,#222 25%,#111 50%,#222 75%,#111 100%);
}
.np-art.spinning .np-vinyl{opacity:0.3}
@keyframes spinDisc{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.np-info{flex:1;min-width:0}
.np-title{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.np-progress{margin-top:6px}
.np-bar{height:3px;background:rgba(255,255,255,0.12);border-radius:2px;cursor:pointer;position:relative}
.np-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.1s linear;position:relative}
.np-bar-fill::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--white);box-shadow:0 0 6px var(--accent-glow)}
.np-times{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:3px}
.np-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nc-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:6px;border-radius:8px;transition:var(--t);display:flex;align-items:center;justify-content:center}
.nc-btn:hover{color:var(--white);background:var(--g2)}
.nc-btn.play{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;font-size:14px;box-shadow:0 4px 14px var(--accent-glow)}
.nc-btn.play:hover{filter:brightness(1.1);transform:scale(1.08)}
.nc-btn.active{color:var(--accent)}

/* ── PLAYLIST TABS ── */
.pl-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 16px}
.pl-tabs::-webkit-scrollbar{display:none}
.pl-tab{padding:13px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:var(--t);margin-bottom:-1px}
.pl-tab:hover{color:var(--white)}
.pl-tab.active{color:var(--white);border-bottom-color:var(--accent)}

/* ── SECTION HEADER ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 10px;
}
.section-title{font-family:var(--ff-serif);font-size:18px;color:var(--white)}
.section-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── UPLOAD AREA ── */
.upload-zone{
  margin:0 16px 16px;border-radius:16px;border:2px dashed var(--border2);
  background:var(--g1);padding:24px;text-align:center;cursor:pointer;
  transition:var(--t);position:relative;overflow:hidden;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:hsla(var(--h),100%,62%,0.06)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;font-weight:600;color:var(--white);margin-bottom:4px}
.upload-sub{font-size:11px;color:var(--text3)}
.upload-formats{margin-top:8px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.fmt-chip{padding:3px 9px;border-radius:10px;background:var(--g2);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text3)}

/* ── TRACK LIST ── */
.track-list{padding:0 16px 8px}
.track-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border-radius:12px;transition:var(--t);cursor:pointer;
  border:1px solid transparent;position:relative;
  margin-bottom:2px;
}
.track-item:hover{background:var(--g2);border-color:var(--border)}
.track-item.active{background:hsla(var(--h),100%,62%,0.1);border-color:hsla(var(--h),100%,62%,0.25)}
.track-num{width:20px;text-align:center;font-size:12px;color:var(--text3);flex-shrink:0}
.track-item.active .track-num{display:none}
.track-playing-anim{width:20px;height:20px;display:none;align-items:center;justify-content:center;gap:2px;flex-shrink:0}
.track-item.active .track-playing-anim{display:flex}
.bar-anim{width:3px;border-radius:2px;background:var(--accent);animation:barAnim 0.8s ease-in-out infinite}
.bar-anim:nth-child(2){animation-delay:0.15s;height:10px}
.bar-anim:nth-child(3){animation-delay:0.3s;height:14px}
.bar-anim:nth-child(1){height:8px}
@keyframes barAnim{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.track-art{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  position:relative;overflow:hidden;
}
.track-art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.track-info{flex:1;min-width:0}
.track-title{font-size:13px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-dur{font-size:11px;color:var(--text3);flex-shrink:0}
.track-menu{
  background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;
  padding:4px 7px;border-radius:6px;transition:var(--t);opacity:0;flex-shrink:0;
}
.track-item:hover .track-menu{opacity:1}
.track-menu:hover{background:var(--g2);color:var(--white)}
.track-vis-badge{padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700;flex-shrink:0}
.vis-both{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
.vis-self{background:hsla(var(--h),100%,62%,0.15);color:var(--accent);border:1px solid hsla(var(--h),100%,62%,0.3)}
.vis-partner{background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3)}

/* ── EMPTY STATE ── */
.empty-pl{text-align:center;padding:40px 20px}
.empty-pl-ico{font-size:48px;margin-bottom:12px}
.empty-pl-text{font-size:13px;color:var(--text3)}

/* ── CONTEXT MENU ── */
.track-ctx{
  position:fixed;z-index:1000;background:rgba(14,14,26,0.97);
  backdrop-filter:blur(20px);border:1px solid var(--border2);
  border-radius:14px;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,0.5);
  overflow:hidden;animation:ctxIn 0.15s ease;
}
@keyframes ctxIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;font-size:13px;color:var(--text);transition:background 0.1s}
.ctx-item:hover{background:var(--g2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:var(--red-bg)}

/* ── UPLOAD MODAL ── */
.music-modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px}
.music-modal-bg.open{display:flex}
.music-modal{background:rgba(8,8,20,0.92);backdrop-filter:blur(30px) saturate(200%);border:1px solid var(--border2);border-radius:22px;width:100%;max-width:420px;padding:24px;color:var(--white);animation:ctxIn 0.3s ease}
.mm-title{font-family:var(--ff-serif);font-size:18px;color:var(--white);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.mm-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:2px 6px;border-radius:6px;transition:var(--t)}
.mm-close:hover{background:var(--g1);color:var(--white)}
.mm-field{margin-bottom:13px}
.mm-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px}
.mm-field input,.mm-field select{width:100%;background:var(--g1);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;color:var(--white);font-family:var(--ff-sans);outline:none;transition:var(--t)}
.mm-field input:focus,.mm-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.mm-field select option{background:#0d0d1f;color:#fff}
.mm-btn{width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;font-family:var(--ff-sans);font-size:13px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;box-shadow:0 4px 16px var(--accent-glow);transition:var(--t);margin-top:4px}
.mm-btn:hover{filter:brightness(1.1)}

/* ── SHUFFLE / REPEAT INDICATOR ── */
.mode-pills{display:flex;gap:7px;padding:0 16px 12px}
.mode-pill{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--g1);color:var(--text2);transition:var(--t);user-select:none}
.mode-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:12px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;padding:10px 14px;border-radius:12px;background:var(--g1);border:1px solid var(--border);text-align:center}
.stat-chip-n{font-family:var(--ff-serif);font-size:20px;color:var(--white)}
.stat-chip-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .np-art{width:40px;height:40px}
  .track-art{width:38px;height:38px;font-size:15px}
}
</style>
</head>
<body>

<!-- ═══ NOW PLAYING BAR ═══ -->
<div class="now-playing-bar" id="nowPlayingBar">
  <div class="np-inner">
    <div class="np-art" id="npArt">
      <div class="np-vinyl"></div>
      <span id="npArtEmoji">🎵</span>
    </div>
    <div class="np-info">
      <div class="np-title" id="npTitle">No song playing</div>
      <div class="np-artist" id="npArtist">Upload a song to start</div>
      <div class="np-progress">
        <div class="np-bar" id="npBar" onclick="seekSong(event)">
          <div class="np-bar-fill" id="npBarFill" style="width:0%"></div>
        </div>
        <div class="np-times"><span id="npCurrent">0:00</span><span id="npDuration">0:00</span></div>
      </div>
    </div>
    <div class="np-controls">
      <button class="nc-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">⇄</button>
      <button class="nc-btn" onclick="prevSong()" title="Previous">⏮</button>
      <button class="nc-btn play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="nc-btn" onclick="nextSong()" title="Next">⏭</button>
      <button class="nc-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">↩</button>
    </div>
  </div>
</div>

<!-- ═══ TABS ═══ -->
<div class="pl-tabs">
  <div class="pl-tab active" onclick="switchTab('my',this)" id="tab-my">❤️ My Playlist</div>
  <div class="pl-tab" onclick="switchTab('partner',this)" id="tab-partner">💜 Partner's Playlist</div>
</div>

<!-- ═══ SECTIONS ═══ -->
<div id="section-my">
  <div class="section-header">
    <div>
      <div class="section-title">My Playlist</div>
      <div class="section-sub" id="myStats">0 songs</div>
    </div>
    <button onclick="openUploadModal('my')" style="padding:9px 16px;border-radius:12px;border:none;cursor:pointer;font-family:var(--ff-sans);font-size:12px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;box-shadow:0 4px 14px var(--accent-glow);transition:var(--t)">+ Add Song</button>
  </div>

  <div class="mode-pills">
    <div class="mode-pill" id="myShufflePill" onclick="toggleShuffle()">⇄ Shuffle</div>
    <div class="mode-pill" id="myRepeatPill" onclick="toggleRepeat()">↩ Repeat</div>
    <div class="mode-pill" onclick="playAll('my')" style="background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;border-color:transparent;box-shadow:0 2px 10px var(--accent-glow)">▶ Play All</div>
  </div>

  <label class="upload-zone" id="myDropZone">
    <input type="file" multiple accept="audio/*" onchange="handleFileInput(event,'my')">
    <div class="upload-icon">🎵</div>
    <div class="upload-text">Drop songs here or tap to browse</div>
    <div class="upload-sub">Upload from your phone</div>
    <div class="upload-formats">
      <span class="fmt-chip">MP3</span>
      <span class="fmt-chip">M4A</span>
      <span class="fmt-chip">WAV</span>
      <span class="fmt-chip">OGG</span>
      <span class="fmt-chip">FLAC</span>
    </div>
  </label>

  <div class="track-list" id="myTrackList"></div>
</div>

<div id="section-partner" style="display:none">
  <div class="section-header">
    <div>
      <div class="section-title">Partner's Playlist</div>
      <div class="section-sub" id="ptStats">0 songs</div>
    </div>
    <button onclick="openUploadModal('partner')" style="padding:9px 16px;border-radius:12px;border:none;cursor:pointer;font-family:var(--ff-sans);font-size:12px;font-weight:600;background:linear-gradient(135deg,var(--accent2),var(--accent2-d));color:#fff;box-shadow:0 4px 14px var(--accent2-glow);transition:var(--t)">+ Add Song</button>
  </div>

  <div class="mode-pills">
    <div class="mode-pill" onclick="playAll('partner')" style="background:linear-gradient(135deg,var(--accent2),var(--accent2-d));color:#fff;border-color:transparent;box-shadow:0 2px 10px var(--accent2-glow)">▶ Play All</div>
  </div>

  <label class="upload-zone" id="ptDropZone">
    <input type="file" multiple accept="audio/*" onchange="handleFileInput(event,'partner')">
    <div class="upload-icon">💜</div>
    <div class="upload-text">Partner can upload songs here</div>
    <div class="upload-sub">Upload from phone · Synced for both</div>
    <div class="upload-formats">
      <span class="fmt-chip">MP3</span>
      <span class="fmt-chip">M4A</span>
      <span class="fmt-chip">WAV</span>
      <span class="fmt-chip">OGG</span>
    </div>
  </label>

  <div class="track-list" id="ptTrackList"></div>
</div>

<!-- ═══ UPLOAD MODAL ═══ -->
<div class="music-modal-bg" id="uploadModal">
  <div class="music-modal">
    <div class="mm-title">
      🎵 Song Details
      <button class="mm-close" onclick="closeUploadModal()">✕</button>
    </div>
    <div id="pendingArtPreview" style="text-align:center;margin-bottom:14px;display:none">
      <div style="width:72px;height:72px;border-radius:14px;margin:0 auto 8px;overflow:hidden;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px" id="artPreviewWrap"><span id="artPreviewEmoji">🎵</span></div>
    </div>
    <div class="mm-field">
      <label>Song Title</label>
      <input type="text" id="mmTitle" placeholder="Enter song name..." autocomplete="off">
    </div>
    <div class="mm-field">
      <label>Artist</label>
      <input type="text" id="mmArtist" placeholder="Artist name..." autocomplete="off">
    </div>
    <div class="mm-field">
      <label>Album Art (optional)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="mmArtUrl" placeholder="Paste image URL or leave blank...">
        <label style="padding:9px 13px;background:var(--g2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0">
          Upload
          <input type="file" accept="image/*" style="display:none" onchange="loadArtFile(this)">
        </label>
      </div>
    </div>
    <div class="mm-field">
      <label>Who can hear this?</label>
      <select id="mmVisibility">
        <option value="both">👥 Both of us</option>
        <option value="self">🙋 Only Me</option>
        <option value="partner">💌 Partner Only</option>
      </select>
    </div>
    <button class="mm-btn" onclick="confirmUpload()">✅ Save Song</button>
  </div>
</div>

<!-- ═══ CONTEXT MENU ═══ -->
<div class="track-ctx" id="trackCtx" style="display:none"></div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
// ══ STATE ══
let musicState = {
  my:[],      // [{id,title,artist,artUrl,artData,audioData,duration,durationFmt,date,visibility,by:'my'}]
  partner:[], // same
  currentPlaylist:'my',
  currentIdx:-1,
  playing:false,
  shuffle:false,
  repeat:false,
  shuffleOrder:[],
};
let pendingFiles=[], pendingPlaylist='my', pendingFileIdx=0, pendingArtData='';
let uploadQueue=[];

const audio = document.getElementById('audioPlayer');
const EMOJI_SET=['🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎼','🎤','🎧'];
function randEmoji(){ return EMOJI_SET[Math.floor(Math.random()*EMOJI_SET.length)]; }

// ══ PERSIST ══
function saveMusicState() {
  try{
    const toSave={my:musicState.my.map(t=>({...t,audioData:null})),partner:musicState.partner.map(t=>({...t,audioData:null}))};
    localStorage.setItem('us_music_meta',JSON.stringify(toSave));
    // Audio stored separately due to size
    musicState.my.forEach(t=>{if(t.audioData)localStorage.setItem('us_audio_'+t.id,t.audioData);});
    musicState.partner.forEach(t=>{if(t.audioData)localStorage.setItem('us_audio_'+t.id,t.audioData);});
  }catch(e){ console.warn('Music save error:',e); }
}
function loadMusicState() {
  try{
    const meta=localStorage.getItem('us_music_meta');
    if(!meta) return;
    const d=JSON.parse(meta);
    ['my','partner'].forEach(pl=>{
      musicState[pl]=(d[pl]||[]).map(t=>{
        const audio=localStorage.getItem('us_audio_'+t.id);
        return {...t,audioData:audio||null};
      });
    });
  }catch(e){}
}

// ══ TAB SWITCHING ══
let currentTab='my';
function switchTab(tab, el) {
  currentTab=tab;
  document.querySelectorAll('.pl-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('section-my').style.display=tab==='my'?'block':'none';
  document.getElementById('section-partner').style.display=tab==='partner'?'block':'none';
}

// ══ RENDER TRACKS ══
function renderTracks(playlist) {
  const tracks=musicState[playlist];
  const el=document.getElementById(playlist+'TrackList');
  const statsEl=document.getElementById(playlist==='my'?'myStats':'ptStats');
  const totalDur=tracks.reduce((s,t)=>s+(t.durationSec||0),0);
  if(statsEl) statsEl.textContent=`${tracks.length} song${tracks.length!==1?'s':''} · ${fmtDuration(totalDur)}`;
  if(!tracks.length){
    el.innerHTML=`<div class="empty-pl"><div class="empty-pl-ico">${playlist==='my'?'🎵':'💜'}</div><div class="empty-pl-text">${playlist==='my'?'Your playlist is empty. Upload songs!':'Partner hasn\'t added songs yet.'}</div></div>`;
    return;
  }
  const visLabels={both:{cls:'vis-both',txt:'👥'},self:{cls:'vis-self',txt:'🙋'},partner:{cls:'vis-partner',txt:'💌'}};
  el.innerHTML=tracks.map((t,i)=>{
    const isActive=musicState.currentPlaylist===playlist&&musicState.currentIdx===i;
    const vl=visLabels[t.visibility||'both'];
    return `<div class="track-item${isActive?' active':''}" onclick="playTrack('${playlist}',${i})" oncontextmenu="showTrackCtx(event,'${playlist}',${i});return false" ontouchstart="trackTouchStart(event,'${playlist}',${i})" ontouchend="trackTouchEnd()">
      <div class="track-num">${i+1}</div>
      <div class="track-playing-anim"><div class="bar-anim"></div><div class="bar-anim"></div><div class="bar-anim"></div></div>
      <div class="track-art">${t.artData||t.artUrl?`<img src="${t.artData||t.artUrl}" alt="${escHtml(t.title)}" loading="lazy">`:`<span>${t.emoji||'🎵'}</span>`}</div>
      <div class="track-info">
        <div class="track-title">${escHtml(t.title)}</div>
        <div class="track-artist">${escHtml(t.artist||'Unknown Artist')}</div>
      </div>
      <span class="track-vis-badge ${vl.cls}">${vl.txt}</span>
      <div class="track-dur">${t.durationFmt||''}</div>
      <button class="track-menu" onclick="event.stopPropagation();showTrackCtx(event,'${playlist}',${i})">⋯</button>
    </div>`;
  }).join('');
}
function renderAll(){renderTracks('my');renderTracks('partner');}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDuration(sec){if(!sec)return'';const m=Math.floor(sec/60),s=sec%60;return m+'m '+s+'s'}
function fmtTime(sec){if(isNaN(sec))return'0:00';const m=Math.floor(sec/60),s=Math.floor(sec%60);return m+':'+(s+'').padStart(2,'0')}

// ══ FILE HANDLING ══
function handleFileInput(e, playlist) {
  const files=Array.from(e.target.files);
  if(!files.length) return;
  pendingPlaylist=playlist;
  uploadQueue=[...files];
  processNextUpload();
}
function processNextUpload() {
  if(!uploadQueue.length) return;
  const file=uploadQueue.shift();
  readAudioFile(file);
}
let _pendingTrack=null;
function readAudioFile(file) {
  const reader=new FileReader();
  reader.onload=e=>{
    const audioData=e.target.result;
    // Get duration
    const tmpAudio=new Audio(audioData);
    tmpAudio.onloadedmetadata=()=>{
      const dur=Math.floor(tmpAudio.duration||0);
      // Parse title/artist from filename
      let name=file.name.replace(/\.[^/.]+$/,'');
      let title=name, artist='Unknown Artist';
      const dashIdx=name.indexOf(' - ');
      if(dashIdx>-1){artist=name.slice(0,dashIdx).trim();title=name.slice(dashIdx+3).trim();}
      _pendingTrack={audioData,durationSec:dur,durationFmt:fmtTime(dur),rawTitle:title,rawArtist:artist};
      document.getElementById('mmTitle').value=title;
      document.getElementById('mmArtist').value=artist;
      pendingArtData='';
      document.getElementById('mmArtUrl').value='';
      document.getElementById('pendingArtPreview').style.display='none';
      document.getElementById('artPreviewEmoji').textContent='🎵';
      document.getElementById('uploadModal').classList.add('open');
    };
    tmpAudio.onerror=()=>{
      // Can't read metadata, use file info
      _pendingTrack={audioData,durationSec:0,durationFmt:'',rawTitle:file.name,rawArtist:''};
      document.getElementById('mmTitle').value=file.name.replace(/\.[^/.]+$/,'');
      document.getElementById('mmArtist').value='';
      document.getElementById('uploadModal').classList.add('open');
    };
  };
  reader.readAsDataURL(file);
}
function loadArtFile(input) {
  if(!input.files[0]) return;
  const r=new FileReader();
  r.onload=e=>{
    pendingArtData=e.target.result;
    document.getElementById('pendingArtPreview').style.display='block';
    const wrap=document.getElementById('artPreviewWrap');
    wrap.innerHTML=`<img src="${pendingArtData}" style="width:100%;height:100%;object-fit:cover">`;
  };
  r.readAsDataURL(input.files[0]);
}
function openUploadModal(playlist) {
  pendingPlaylist=playlist;
  _pendingTrack=null;
  pendingArtData='';
  document.getElementById('mmTitle').value='';
  document.getElementById('mmArtist').value='';
  document.getElementById('mmArtUrl').value='';
  document.getElementById('mmVisibility').value='both';
  document.getElementById('pendingArtPreview').style.display='none';
  // trigger file input
  const inp=document.createElement('input');
  inp.type='file';inp.accept='audio/*';inp.multiple=true;
  inp.onchange=e=>handleFileInput(e,playlist);
  inp.click();
}
function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('open');
  _pendingTrack=null;
  // process next in queue
  if(uploadQueue.length) setTimeout(processNextUpload,300);
}
function confirmUpload() {
  if(!_pendingTrack) { closeUploadModal(); return; }
  const track={
    id:Date.now(),
    title:document.getElementById('mmTitle').value.trim()||'Untitled',
    artist:document.getElementById('mmArtist').value.trim()||'Unknown Artist',
    artData:pendingArtData||'',
    artUrl:document.getElementById('mmArtUrl').value.trim(),
    audioData:_pendingTrack.audioData,
    durationSec:_pendingTrack.durationSec,
    durationFmt:_pendingTrack.durationFmt,
    visibility:document.getElementById('mmVisibility').value,
    by:pendingPlaylist,
    date:new Date().toISOString().slice(0,10),
    emoji:randEmoji(),
  };
  musicState[pendingPlaylist].push(track);
  saveMusicState();
  renderAll();
  closeUploadModal();
  // Auto-play if nothing playing
  if(!musicState.playing) playTrack(pendingPlaylist, musicState[pendingPlaylist].length-1);
}

// ══ PLAYBACK ══
function playTrack(playlist, idx) {
  const track=musicState[playlist][idx];
  if(!track) return;
  musicState.currentPlaylist=playlist;
  musicState.currentIdx=idx;
  if(!track.audioData){
    showToast('Audio data not available');return;
  }
  audio.src=track.audioData;
  audio.play().then(()=>{
    musicState.playing=true;
    updateNowPlaying(track);
    updatePlayBtn();
    renderAll();
  }).catch(e=>{console.warn('Play error:',e);showToast('Cannot play: '+e.message);});
}
function togglePlay() {
  if(!audio.src||audio.src===window.location.href){showToast('No song selected');return;}
  if(musicState.playing){ audio.pause(); musicState.playing=false; }
  else { audio.play(); musicState.playing=true; }
  updatePlayBtn();
  updateNowPlayingAnim();
}
function prevSong() {
  const pl=musicState.currentPlaylist;
  const tracks=musicState[pl];
  if(!tracks.length) return;
  let idx=musicState.currentIdx-1;
  if(idx<0) idx=tracks.length-1;
  playTrack(pl,idx);
}
function nextSong() {
  const pl=musicState.currentPlaylist;
  const tracks=musicState[pl];
  if(!tracks.length) return;
  let idx;
  if(musicState.shuffle){idx=Math.floor(Math.random()*tracks.length);}
  else{idx=musicState.currentIdx+1; if(idx>=tracks.length) idx=0;}
  playTrack(pl,idx);
}
function playAll(playlist) {
  const tracks=musicState[playlist];
  if(!tracks.length){showToast('No songs to play');return;}
  musicState.currentPlaylist=playlist;
  if(musicState.shuffle) musicState.currentIdx=Math.floor(Math.random()*tracks.length);
  else musicState.currentIdx=0;
  playTrack(playlist,musicState.currentIdx);
}
function toggleShuffle() {
  musicState.shuffle=!musicState.shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active',musicState.shuffle);
  document.getElementById('myShufflePill').classList.toggle('active',musicState.shuffle);
  showToast(musicState.shuffle?'Shuffle on 🔀':'Shuffle off');
}
function toggleRepeat() {
  musicState.repeat=!musicState.repeat;
  document.getElementById('repeatBtn').classList.toggle('active',musicState.repeat);
  document.getElementById('myRepeatPill').classList.toggle('active',musicState.repeat);
  audio.loop=musicState.repeat;
  showToast(musicState.repeat?'Repeat on 🔁':'Repeat off');
}
function seekSong(e) {
  if(!audio.duration) return;
  const bar=document.getElementById('npBar');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  audio.currentTime=pct*audio.duration;
}
function updateNowPlaying(track) {
  document.getElementById('npTitle').textContent=track.title;
  document.getElementById('npArtist').textContent=track.artist||'Unknown Artist';
  const art=document.getElementById('npArt');
  if(track.artData||track.artUrl){
    art.innerHTML=`<div class="np-vinyl"></div><img src="${track.artData||track.artUrl}" alt="${escHtml(track.title)}">`;
  } else {
    art.innerHTML=`<div class="np-vinyl"></div><span id="npArtEmoji">${track.emoji||'🎵'}</span>`;
  }
  art.classList.add('spinning');
  document.getElementById('npDuration').textContent=fmtTime(audio.duration||0);
}
function updatePlayBtn() {
  document.getElementById('playBtn').textContent=musicState.playing?'⏸':'▶';
}
function updateNowPlayingAnim() {
  const art=document.getElementById('npArt');
  if(musicState.playing) art.classList.add('spinning');
  else art.classList.remove('spinning');
}

// ══ AUDIO EVENTS ══
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('npBarFill').style.width=pct+'%';
  document.getElementById('npCurrent').textContent=fmtTime(audio.currentTime);
  document.getElementById('npDuration').textContent=fmtTime(audio.duration);
});
audio.addEventListener('ended',()=>{
  if(musicState.repeat) return; // loop handled by audio.loop
  nextSong();
});
audio.addEventListener('pause',()=>{ musicState.playing=false; updatePlayBtn(); updateNowPlayingAnim(); });
audio.addEventListener('play',()=>{ musicState.playing=true; updatePlayBtn(); updateNowPlayingAnim(); });
audio.addEventListener('loadedmetadata',()=>{
  document.getElementById('npDuration').textContent=fmtTime(audio.duration);
});

// ══ CONTEXT MENU ══
let ctxTouchTimer=null;
function trackTouchStart(e,pl,i){ctxTouchTimer=setTimeout(()=>showTrackCtx(e,pl,i),550);}
function trackTouchEnd(){clearTimeout(ctxTouchTimer);}
function showTrackCtx(e,pl,i) {
  e.preventDefault();
  const track=musicState[pl][i];if(!track)return;
  const menu=document.getElementById('trackCtx');
  menu.innerHTML=`
    <div class="ctx-item" onclick="playTrack('${pl}',${i});closeCtx()">▶ Play</div>
    <div class="ctx-item" onclick="editTrack('${pl}',${i});closeCtx()">✏️ Edit Details</div>
    <div class="ctx-item" onclick="moveTrack('${pl}',${i},-1);closeCtx()">⬆️ Move Up</div>
    <div class="ctx-item" onclick="moveTrack('${pl}',${i},1);closeCtx()">⬇️ Move Down</div>
    <div class="ctx-item" onclick="changeVis('${pl}',${i});closeCtx()">👁 Change Visibility</div>
    <div class="ctx-item danger" onclick="deleteTrack('${pl}',${i});closeCtx()">🗑️ Delete</div>
  `;
  const cx=e.clientX||e.touches?.[0]?.clientX||100;
  const cy=e.clientY||e.touches?.[0]?.clientY||100;
  menu.style.left=Math.min(cx,window.innerWidth-190)+'px';
  menu.style.top=Math.min(cy,window.innerHeight-200)+'px';
  menu.style.display='block';
  setTimeout(()=>document.addEventListener('click',closeCtx,{once:true}),10);
}
function closeCtx(){document.getElementById('trackCtx').style.display='none';}
function moveTrack(pl,i,dir) {
  const t=musicState[pl];
  const ni=i+dir;
  if(ni<0||ni>=t.length)return;
  [t[i],t[ni]]=[t[ni],t[i]];
  if(musicState.currentPlaylist===pl){if(musicState.currentIdx===i)musicState.currentIdx=ni;else if(musicState.currentIdx===ni)musicState.currentIdx=i;}
  saveMusicState();renderAll();
}
function deleteTrack(pl,i) {
  if(!confirm('Delete this song?'))return;
  const t=musicState[pl][i];
  try{localStorage.removeItem('us_audio_'+t.id);}catch(e){}
  musicState[pl].splice(i,1);
  if(musicState.currentPlaylist===pl&&musicState.currentIdx===i){audio.pause();musicState.playing=false;musicState.currentIdx=-1;updatePlayBtn();}
  saveMusicState();renderAll();
}
function changeVis(pl,i) {
  const t=musicState[pl][i];
  const opts=['both','self','partner'];
  const labels=['👥 Both','🙋 Only Me','💌 Partner Only'];
  const cur=opts.indexOf(t.visibility||'both');
  const next=(cur+1)%3;
  t.visibility=opts[next];
  saveMusicState();renderAll();
  showToast('Visibility: '+labels[next]);
}
function editTrack(pl,i) {
  const t=musicState[pl][i];
  const newTitle=prompt('Song title:',t.title);if(newTitle===null)return;
  const newArtist=prompt('Artist:',t.artist||'');if(newArtist===null)return;
  t.title=newTitle||t.title;
  t.artist=newArtist;
  saveMusicState();renderAll();
  if(musicState.currentPlaylist===pl&&musicState.currentIdx===i) updateNowPlaying(t);
}

// ══ DRAG & DROP ══
['myDropZone','ptDropZone'].forEach(id=>{
  const zone=document.getElementById(id);
  if(!zone)return;
  const pl=id==='myDropZone'?'my':'partner';
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.classList.remove('drag');
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('audio/'));
    if(!files.length)return;
    pendingPlaylist=pl;uploadQueue=[...files];processNextUpload();
  });
});

// ══ TOAST ══
let toastTimer;
function showToast(msg){
  let t=document.getElementById('musicToast');
  if(!t){t=document.createElement('div');t.id='musicToast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(15,15,15,0.9);backdrop-filter:blur(16px);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);font-family:var(--ff-sans);font-weight:500';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(12px)';},2800);
}

// ══ KEYBOARD SHORTCUTS ══
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')nextSong();
  if(e.code==='ArrowLeft')prevSong();
});

// ══ INIT ══
loadMusicState();
renderAll();

// Expose for external use
window.musicState=musicState;
window.playTrack=playTrack;
window.switchTab=switchTab;
window.openUploadModal=openUploadModal;
window.closeUploadModal=closeUploadModal;
window.confirmUpload=confirmUpload;
window.togglePlay=togglePlay;
window.prevSong=prevSong;
window.nextSong=nextSong;
window.toggleShuffle=toggleShuffle;
window.toggleRepeat=toggleRepeat;
window.playAll=playAll;
window.seekSong=seekSong;
window.loadArtFile=loadArtFile;
window.showTrackCtx=showTrackCtx;
window.closeCtx=closeCtx;
window.trackTouchStart=trackTouchStart;
window.trackTouchEnd=trackTouchEnd;
window.handleFileInput=handleFileInput;
</script>
</body>
