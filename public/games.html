<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Couple Games 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --h: 215;
  --accent: hsl(var(--h), 100%, 62%);
  --accent-d: hsl(var(--h), 95%, 50%);
  --accent-l: hsl(var(--h), 100%, 78%);
  --accent-glow: hsla(var(--h), 100%, 62%, 0.35);
  --accent2: hsl(300, 85%, 65%);
  --accent2-d: hsl(300, 80%, 52%);
  --accent2-glow: hsla(300, 85%, 65%, 0.35);
  --g1: rgba(255,255,255,0.04);
  --g2: rgba(255,255,255,0.08);
  --g3: rgba(255,255,255,0.13);
  --blur: blur(24px) saturate(180%);
  --blur-sm: blur(12px) saturate(150%);
  --ff-serif: 'DM Serif Display', Georgia, serif;
  --ff-sans: 'Inter', system-ui, sans-serif;
  --r: 18px; --rs: 12px; --rss: 8px; --space: 20px;
  --white: #ffffff;
  --text: rgba(255,255,255,0.92);
  --text2: rgba(255,255,255,0.62);
  --text3: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.18);
  --green: #34d399; --green-bg: rgba(52,211,153,0.15);
  --red: #f87171; --red-bg: rgba(248,113,113,0.15);
  --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.15);
  --t: all 0.22s cubic-bezier(0.4,0,0.2,1);
  --t-spring: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ff-sans);color:var(--text);min-height:100vh;background:transparent;line-height:1.5;overflow-x:hidden}

/* ── GAME CARDS GRID ── */
.games-hero{text-align:center;padding:28px 20px 20px;position:relative}
.games-hero-title{font-family:var(--ff-serif);font-size:28px;color:var(--white);margin-bottom:6px}
.games-hero-sub{font-size:13px;color:var(--text2)}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:0 0 20px}
@media(max-width:700px){.games-grid{grid-template-columns:1fr}}

.game-card{
  border-radius:20px;overflow:hidden;position:relative;cursor:pointer;
  border:1px solid var(--border2);
  background:var(--g1);backdrop-filter:var(--blur);
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s;
}
.game-card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.game-card:active{transform:scale(0.97)}
.game-banner{
  height:140px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.game-banner-emoji{font-size:52px;position:relative;z-index:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4));animation:floatEmoji 3s ease-in-out infinite}
@keyframes floatEmoji{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.game-banner::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.15)}
.game-card-body{padding:16px}
.game-card-title{font-family:var(--ff-serif);font-size:17px;color:var(--white);margin-bottom:5px}
.game-card-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:13px}
.game-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.game-tag{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.game-play-btn{
  width:100%;padding:11px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--ff-sans);font-size:13px;font-weight:600;
  background:linear-gradient(135deg,var(--accent),var(--accent-d));
  color:#fff;box-shadow:0 4px 16px var(--accent-glow);
  transition:var(--t-spring);display:flex;align-items:center;justify-content:center;gap:7px;
}
.game-play-btn:hover{filter:brightness(1.12);transform:translateY(-2px)}
.game-play-btn:active{transform:scale(0.96)}

/* ── GAME MODAL ── */
.game-modal-bg{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;padding:16px;
}
.game-modal-bg.open{display:flex}
.game-modal{
  background:rgba(8,8,20,0.92);backdrop-filter:blur(30px) saturate(200%);
  border:1px solid var(--border2);border-radius:24px;
  width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;
  color:var(--white);box-shadow:0 24px 80px rgba(0,0,0,0.5);
  animation:modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.game-modal-header{
  padding:22px 22px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.game-modal-title{font-family:var(--ff-serif);font-size:20px;color:var(--white)}
.game-modal-close{
  background:var(--g2);border:1px solid var(--border);border-radius:50%;
  width:36px;height:36px;cursor:pointer;color:var(--text2);font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:var(--t);
}
.game-modal-close:hover{background:var(--g3);color:var(--white)}
.game-modal-body{padding:20px}

/* ── TRUTH OR DARE ── */
.tod-tabs{display:flex;gap:8px;margin-bottom:18px}
.tod-tab{
  flex:1;padding:10px;border-radius:12px;cursor:pointer;font-size:13px;
  font-weight:600;text-align:center;border:1px solid var(--border);
  background:var(--g1);color:var(--text2);transition:var(--t);
}
.tod-tab.truth.active{background:linear-gradient(135deg,#5B9BFF,#1453C4);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(91,155,255,0.4)}
.tod-tab.dare.active{background:linear-gradient(135deg,#FF6B9D,#C40060);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(255,107,157,0.4)}
.card-display{
  min-height:160px;border-radius:18px;padding:24px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:16px;line-height:1.65;color:var(--white);font-weight:500;
  border:1px solid var(--border2);margin-bottom:16px;
  background:var(--g2);backdrop-filter:var(--blur);
  animation:cardAppear 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardAppear{from{opacity:0;transform:scale(0.9) rotateY(10deg)}to{opacity:1;transform:scale(1) rotateY(0)}}
.spin-btn{
  width:100%;padding:13px;border-radius:14px;border:none;cursor:pointer;
  font-family:var(--ff-sans);font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--accent2),var(--accent2-d));
  color:#fff;box-shadow:0 6px 20px var(--accent2-glow);
  transition:var(--t-spring);
}
.spin-btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.spin-btn:active{transform:scale(0.95)}

/* ── QUIZ ── */
.quiz-q{font-size:16px;font-weight:600;color:var(--white);margin-bottom:14px;line-height:1.55}
.quiz-opt{
  padding:12px 16px;border-radius:12px;border:1px solid var(--border);
  background:var(--g1);color:var(--text);font-size:13px;cursor:pointer;
  margin-bottom:8px;transition:var(--t);text-align:left;width:100%;
  font-family:var(--ff-sans);
}
.quiz-opt:hover{background:var(--g2);border-color:var(--border2)}
.quiz-opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.quiz-progress{height:5px;background:var(--g2);border-radius:3px;margin-bottom:18px;overflow:hidden}
.quiz-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s ease}
.score-display{
  text-align:center;padding:24px;
  background:linear-gradient(135deg,hsla(var(--h),100%,62%,0.1),hsla(300,85%,65%,0.1));
  border-radius:18px;border:1px solid var(--border2);margin-bottom:16px;
}
.score-num{font-family:var(--ff-serif);font-size:56px;color:var(--white);line-height:1}
.score-label{font-size:12px;color:var(--text2);margin-top:6px}

/* ── WYR / NHIE ── */
.vs-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:16px}
.vs-opt{
  padding:18px 14px;border-radius:16px;text-align:center;
  font-size:13px;font-weight:500;color:var(--white);cursor:pointer;
  border:1px solid var(--border);background:var(--g1);
  transition:var(--t-spring);line-height:1.5;
}
.vs-opt:hover{transform:scale(1.03);border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.vs-opt.a{background:linear-gradient(135deg,hsla(var(--h),100%,62%,0.15),hsla(var(--h),100%,62%,0.05))}
.vs-opt.b{background:linear-gradient(135deg,hsla(300,85%,65%,0.15),hsla(300,85%,65%,0.05))}
.vs-divider{font-size:18px;font-weight:800;color:var(--text2);text-align:center}
.nhie-card{padding:20px;border-radius:16px;border:1px solid var(--border);background:var(--g1);margin-bottom:14px;font-size:14px;line-height:1.65;color:var(--text);text-align:center}
.nhie-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.nhie-btn{padding:11px;border-radius:12px;border:none;cursor:pointer;font-family:var(--ff-sans);font-size:13px;font-weight:600;transition:var(--t-spring)}
.nhie-btn.done{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
.nhie-btn.nope{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.nhie-btn:hover{transform:scale(1.03)}

/* ── SPIN THE BOTTLE ── */
.spin-container{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0}
.bottle-wrap{width:220px;height:220px;position:relative;margin:0 auto}
.bottle-svg{width:100%;height:100%;transition:transform 2s cubic-bezier(0.17,0.89,0.32,1.28)}
.spin-result{
  font-size:14px;font-weight:600;text-align:center;padding:14px 20px;
  background:var(--g2);border-radius:14px;border:1px solid var(--border);
  color:var(--white);min-height:50px;display:flex;align-items:center;justify-content:center;
}
.players-input{display:flex;gap:8px;margin-bottom:12px}
.players-input input{flex:1;background:var(--g1);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--white);font-family:var(--ff-sans);font-size:13px;outline:none}
.players-input input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.players-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.player-chip{
  padding:5px 12px;border-radius:20px;background:var(--g2);border:1px solid var(--border);
  font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;
}
.player-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:0 2px}
.player-chip button:hover{color:var(--red)}

/* ── TIC TAC TOE ── */
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:260px;margin:0 auto 18px}
.ttt-cell{
  aspect-ratio:1;border-radius:14px;background:var(--g2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  cursor:pointer;transition:var(--t-spring);user-select:none;
}
.ttt-cell:hover:empty{background:var(--g3);transform:scale(1.05)}
.ttt-cell.x{color:var(--accent);animation:cellPop 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.ttt-cell.o{color:var(--accent2);animation:cellPop 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.ttt-cell.win{background:linear-gradient(135deg,hsla(var(--h),100%,62%,0.2),hsla(300,85%,65%,0.2));border-color:var(--accent2)}
@keyframes cellPop{from{transform:scale(0.5)}to{transform:scale(1)}}
.ttt-status{text-align:center;font-size:14px;font-weight:600;padding:12px;background:var(--g1);border-radius:12px;border:1px solid var(--border);margin-bottom:14px;color:var(--white)}
.ttt-score{display:flex;justify-content:center;gap:20px;margin-bottom:14px}
.ttt-score-item{text-align:center;padding:10px 18px;background:var(--g1);border-radius:12px;border:1px solid var(--border)}
.ttt-score-n{font-family:var(--ff-serif);font-size:24px;color:var(--white)}
.ttt-score-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── LOVE CHALLENGE ── */
.challenge-card{
  padding:22px;border-radius:18px;text-align:center;margin-bottom:16px;
  background:linear-gradient(135deg,hsla(300,85%,65%,0.12),hsla(var(--h),100%,62%,0.08));
  border:1px solid rgba(255,107,157,0.25);
}
.challenge-emoji{font-size:48px;margin-bottom:10px}
.challenge-title{font-family:var(--ff-serif);font-size:18px;color:var(--white);margin-bottom:6px}
.challenge-desc{font-size:13px;color:var(--text2);line-height:1.65}
.challenge-timer{font-family:var(--ff-serif);font-size:36px;color:var(--accent);margin:12px 0}
.challenge-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chal-btn{padding:11px;border-radius:12px;border:none;cursor:pointer;font-family:var(--ff-sans);font-size:13px;font-weight:600;transition:var(--t-spring)}
.chal-btn.done{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
.chal-btn.skip{background:var(--g2);color:var(--text2);border:1px solid var(--border)}
.chal-btn:hover{transform:scale(1.03)}

/* ── COMPAT QUIZ ── */
.compat-q{
  padding:18px;border-radius:14px;background:var(--g1);border:1px solid var(--border);
  margin-bottom:12px;
}
.compat-q-text{font-size:14px;color:var(--white);margin-bottom:12px;font-weight:500}
.compat-options{display:flex;flex-wrap:wrap;gap:7px}
.compat-opt{
  padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);background:var(--g1);color:var(--text2);
  transition:var(--t);font-family:var(--ff-sans);font-weight:500;
}
.compat-opt:hover{background:var(--g2);color:var(--white)}
.compat-opt.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}
.compat-result{text-align:center;padding:24px;border-radius:18px;background:var(--g2);border:1px solid var(--border2);margin-bottom:16px}
.compat-pct{font-family:var(--ff-serif);font-size:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.compat-ring{width:120px;height:120px;position:relative;margin:0 auto 16px}
.compat-ring svg{transform:rotate(-90deg)}

/* ── SHARED UTIL ── */
.g-btn{
  display:inline-flex;align-items:center;gap:7px;padding:10px 18px;
  border-radius:12px;font-size:13px;cursor:pointer;border:none;
  font-weight:600;transition:var(--t-spring);font-family:var(--ff-sans);
}
.g-btn:active{transform:scale(0.96)}
.g-btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.g-btn-accent:hover{filter:brightness(1.1);transform:translateY(-1px)}
.g-btn-glass{background:var(--g2);color:var(--white);border:1px solid var(--border2)}
.g-btn-glass:hover{background:var(--g3)}
.g-btn-pink{background:linear-gradient(135deg,var(--accent2),var(--accent2-d));color:#fff;box-shadow:0 4px 14px var(--accent2-glow)}
.g-btn-pink:hover{filter:brightness(1.1);transform:translateY(-1px)}
.g-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.streak{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,0.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.info-chip{background:var(--g1);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
</style>
</head>
<body>

<!-- ══ GAMES GRID ══ -->
<div class="games-hero">
  <div class="games-hero-title">🎮 Couple Games</div>
  <div class="games-hero-sub">Play together, grow closer 💕</div>
</div>

<div class="games-grid" id="gamesGrid"></div>

<!-- ══ GAME MODAL ══ -->
<div class="game-modal-bg" id="gameModalBg">
  <div class="game-modal" id="gameModal">
    <div class="game-modal-header">
      <div class="game-modal-title" id="gameModalTitle">Game</div>
      <button class="game-modal-close" onclick="closeGame()">✕</button>
    </div>
    <div class="game-modal-body" id="gameModalBody"></div>
  </div>
</div>

<script>
// ══ GAME DEFINITIONS ══
const GAMES = [
  {
    id:'tod',
    title:'Truth or Dare',
    emoji:'🎯',
    desc:'Pick Truth for honest confessions or Dare for fun challenges. Take turns and get to know each other deeper!',
    gradient:'linear-gradient(135deg,#1a1a4e,#3b1d7a)',
    tags:[{label:'2 Players',color:'rgba(150,100,255,0.3)',text:'#c4a0ff'},{label:'Party',color:'rgba(255,107,157,0.2)',text:'#ff6b9d'}],
  },
  {
    id:'quiz',
    title:'Couple Quiz',
    emoji:'❓',
    desc:'How well do you know each other? Answer questions about your relationship and see your score!',
    gradient:'linear-gradient(135deg,#0d2035,#1a5276)',
    tags:[{label:'Knowledge',color:'rgba(91,155,255,0.2)',text:'var(--accent)'},{label:'Fun',color:'rgba(52,211,153,0.2)',text:'var(--green)'}],
  },
  {
    id:'wyr',
    title:'Would You Rather',
    emoji:'🤔',
    desc:'Two tempting choices — which would you pick? Discuss your answers and discover new things about each other.',
    gradient:'linear-gradient(135deg,#1a0d2e,#4a1060)',
    tags:[{label:'Decisions',color:'rgba(167,139,250,0.2)',text:'#a78bfa'},{label:'2 Players',color:'rgba(255,107,157,0.2)',text:'#ff6b9d'}],
  },
  {
    id:'nhie',
    title:'Never Have I Ever',
    emoji:'🙈',
    desc:'Find out surprising secrets! Say "Never have I ever…" and see who has done it. Perfect for date nights.',
    gradient:'linear-gradient(135deg,#1a2a0d,#2d5016)',
    tags:[{label:'Secrets',color:'rgba(52,211,153,0.2)',text:'var(--green)'},{label:'Adults',color:'rgba(251,191,36,0.2)',text:'var(--yellow)'}],
  },
  {
    id:'stb',
    title:'Spin The Bottle',
    emoji:'🍾',
    desc:'Add your friends or just the two of you — spin the bottle and see who gets a dare or a kiss!',
    gradient:'linear-gradient(135deg,#2a0d0d,#6b1a1a)',
    tags:[{label:'Group',color:'rgba(248,113,113,0.2)',text:'var(--red)'},{label:'Fun',color:'rgba(251,191,36,0.2)',text:'var(--yellow)'}],
  },
  {
    id:'challenge',
    title:'Love Challenge',
    emoji:'💪',
    desc:'30 romantic challenges to bring you closer. Complete challenges together and earn couple XP!',
    gradient:'linear-gradient(135deg,#2a1a0d,#7a3b00)',
    tags:[{label:'Romantic',color:'rgba(255,107,157,0.2)',text:'#ff6b9d'},{label:'Daily',color:'rgba(251,191,36,0.2)',text:'var(--yellow)'}],
  },
  {
    id:'compat',
    title:'Compatibility Quiz',
    emoji:'💑',
    desc:'Discover your compatibility score through questions about personality, values, and relationship goals.',
    gradient:'linear-gradient(135deg,#0d1a2a,#1a3a5c)',
    tags:[{label:'Deep',color:'rgba(91,155,255,0.2)',text:'var(--accent)'},{label:'Insight',color:'rgba(167,139,250,0.2)',text:'#a78bfa'}],
  },
  {
    id:'ttt',
    title:'Couple Tic Tac Toe',
    emoji:'❌⭕',
    desc:'Classic Tic Tac Toe with a romantic twist. Customize your symbols and keep score together!',
    gradient:'linear-gradient(135deg,#1a0d2e,#2d0d5c)',
    tags:[{label:'Strategy',color:'rgba(91,155,255,0.2)',text:'var(--accent)'},{label:'2 Players',color:'rgba(52,211,153,0.2)',text:'var(--green)'}],
  },
  {
    id:'ludo',
    title:'Couple Ludo',
    emoji:'🎲',
    desc:'Play the classic board game together! Two-player mode designed for couples. Roll dice, race to win!',
    gradient:'linear-gradient(135deg,#2a1a0d,#5c3200)',

function initQuiz() { quizIdx=0; quizScore=0; showQuizQ(); }
function showQuizQ() {
  const el = document.getElementById('quizContent');
  if(quizIdx>=QUIZ_Q.length) { showQuizResult(); return; }
  const q = QUIZ_Q[quizIdx];
  document.getElementById('qProg').style.width = (quizIdx/QUIZ_Q.length*100)+'%';

  if(quizAnswered) return;

        <svg id="bottleSVG" class="bottle-svg" viewBox="0 0 100 100">
          <defs>
            <radialGradient id="bg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>

            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
          ${Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;const x1=50+42*Math.cos(a);const y1=50+42*Math.sin(a);const x2=50+46*Math.cos(a);const y2=50+46*Math.sin(a);return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>`;}).join('')}
          <!-- Bottle shape pointing right -->
          <g transform="translate(50,50)">
            <ellipse rx="6" ry="4" fill="#4ade80" opacity="0.9"/>
            <path d="M -22,0 L 22,0" stroke="none"/>
            <!-- Bottle body -->
            <path d="M 0,-3 L 20,-3 Q 24,-3 24,0 Q 24,3 20,3 L 0,3 Q -6,3 -10,6 L -22,6 L -22,-6 L -10,-6 Q -6,-3 0,-3 Z" fill="linear-gradient(#4ade80,#22c55e)" stroke="none" opacity="0"/>
            <!-- Arrow (pointer) -->
            <polygon points="0,-5 32,0 0,5" fill="url(#bottleGrad)" opacity="0.95"/>
            <polygon points="-2,-4 -28,-7 -28,7 -2,4" fill="url(#bottleGrad2)" opacity="0.85"/>
            <circle r="6" fill="#1a1a3e" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
            <defs>
              <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#34d399"/>
                <stop offset="100%" stop-color="#059669"/>
              </linearGradient>
              <linearGradient id="bottleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f87171"/>
                <stop offset="100%" stop-color="#dc2626"/>
              </linearGradient>
            </defs>
          </g>
          <!-- Player labels will be added dynamically -->
          <g id="playerLabels"></g>
        </svg>
      </div>
      <div class="spin-result" id="spinResult">Add players and spin!</div>
      <button class="g-btn g-btn-pink" onclick="spinBottle()" style="width:100%;padding:14px;font-size:15px">🍾 Spin!</button>
    </div>
  `;
}
function initSTB() { stbPlayers=['You','Partner']; renderSTBPlayers(); }
function addSTBPlayer() {
  const inp=document.getElementById('stbInput');
  const name=inp.value.trim();
  if(!name||stbPlayers.includes(name)) return;
  stbPlayers.push(name); inp.value='';
  renderSTBPlayers();
}
function removeSTBPlayer(i) { stbPlayers.splice(i,1); renderSTBPlayers(); }
function renderSTBPlayers() {
  document.getElementById('playersList').innerHTML = stbPlayers.map((p,i)=>`<div class="player-chip"><span>${p}</span><button onclick="removeSTBPlayer(${i})">✕</button></div>`).join('');
  // Draw player labels on circle
  const labelsEl = document.getElementById('playerLabels');
  if(!labelsEl) return;
  labelsEl.innerHTML = stbPlayers.map((p,i)=>{
    const angle = (i/stbPlayers.length)*2*Math.PI - Math.PI/2;
    const x = 50+36*Math.cos(angle);
    const y = 50+36*Math.sin(angle);
    return `<text x="${x.toFixed(1)}" y="${(y+1).toFixed(1)}" text-anchor="middle" font-size="6" fill="rgba(255,255,255,0.7)" font-family="Inter,sans-serif">${p.slice(0,5)}</text>`;
  }).join('');
}
let stbSpinning=false;
function spinBottle() {
  if(stbSpinning||stbPlayers.length<2){if(stbPlayers.length<2) alert('Add at least 2 players!');return;}
  stbSpinning=true;
  const svg=document.getElementById('bottleSVG');
  const spins = 4+Math.random()*6;
  const chosen = Math.floor(Math.random()*stbPlayers.length);
  const targetAngle = chosen*(360/stbPlayers.length) + spins*360;
  stbAngle+=targetAngle;
  svg.style.transition='transform 3s cubic-bezier(0.17,0.89,0.32,1.28)';
  svg.style.transform=`rotate(${stbAngle}deg)`;
  setTimeout(()=>{ 
    document.getElementById('spinResult').innerHTML = `<span style="font-size:18px">💋</span> <strong style="color:var(--accent2)">${stbPlayers[chosen]}</strong> gets a dare!`;
    stbSpinning=false; 
  },3100);
}
window.addSTBPlayer=addSTBPlayer; window.removeSTBPlayer=removeSTBPlayer; window.spinBottle=spinBottle;

function initCompat() { compatAnswers=[]; compatPhase='me'; compatMyAnswers=[]; compatPtAnswers=[]; showCompatQ(0); }
function showCompatQ(idx) {
  const el=document.getElementById('compatContent');
  if(idx>=COMPAT_Q.length) { if(compatPhase==='me'){compatMyAnswers=[...compatAnswers];compatAnswers=[];compatPhase='pt';el.innerHTML=`<div style="text-align:center;padding:24px"><div style="font-size:48px;margin-bottom:12px">💑</div><div style="font-family:var(--ff-serif);font-size:20px;color:var(--white);margin-bottom:8px">Now, Partner's Turn!</div><div style="font-size:13px;color:var(--text2);margin-bottom:20px">Pass the phone to your partner</div><button class="g-btn g-btn-accent" onclick="showCompatQ(0)" style="width:100%;padding:13px;justify-content:center">Start ➤</button></div>`;return;}else{compatPtAnswers=[...compatAnswers];showCompatResult();return;}}
  const q=COMPAT_Q[idx];
  el.innerHTML=`
    <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${compatPhase==='me'?'Your answers':'Partner\'s answers'} · ${idx+1}/${COMPAT_Q.length}</div>
    <div class="quiz-progress" style="margin-bottom:14px"><div class="quiz-progress-fill" style="width:${idx/COMPAT_Q.length*100}%"></div></div>
    <div class="compat-q">
      <div class="compat-q-text">${q.q}</div>
      <div class="compat-options">
        ${q.opts.map((o,i)=>`<button class="compat-opt" onclick="compatPick(${i},${idx})">${o}</button>`).join('')}
      </div>
    </div>
  `;
}
function compatPick(i,idx) {
  compatAnswers.push(i);
  showCompatQ(idx+1);
}
function showCompatResult() {
  let matches=0;
  for(let i=0;i<Math.min(compatMyAnswers.length,compatPtAnswers.length);i++) if(compatMyAnswers[i]===compatPtAnswers[i]) matches++;
  const pct=Math.round(matches/COMPAT_Q.length*100);
  const msg=pct>=80?'Soul Mates! 💍':pct>=60?'Great Match! 💕':pct>=40?'Opposites Attract! 💞':'Beautifully Different! 🌹';
  const c=2*Math.PI*50;
  const dash=c-(pct/100)*c;
  document.getElementById('compatContent').innerHTML=`
    <div class="compat-result">
      <div class="compat-ring">
        <svg viewBox="0 0 120 120" width="120" height="120" style="transform:rotate(-90deg)">
          <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="url(#compatGrad)" stroke-width="10"
            stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}"
            stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
          <defs><linearGradient id="compatGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="var(--accent2)"/>
          </linearGradient></defs>
        </svg>
      </div>
      <div class="compat-pct">${pct}%</div>
      <div style="font-size:18px;font-family:var(--ff-serif);color:var(--white);margin-top:6px">${msg}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:8px;line-height:1.65">You matched on ${matches} out of ${COMPAT_Q.length} questions. ${pct>=60?'Your relationship has a strong foundation!':'Every difference is a chance to learn and grow together.'}</div>
    </div>
    <div class="g-row"><button class="g-btn g-btn-accent" onclick="initCompat()">🔄 Retake</button></div>
  `;
}
window.compatPick=compatPick; window.showCompatQ=showCompatQ;

// ══ 8. TIC TAC TOE ══
let tttBoard=Array(9).fill(null), tttTurn='X', tttScores={X:0,O:0,D:0}, tttOver=false;
const TTT_WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function renderTTT() {
  return `
    <div class="ttt-score">
      <div class="ttt-score-item"><div class="ttt-score-n" id="tttScoreX" style="color:var(--accent)">0</div><div class="ttt-score-l">You (X)</div></div>
      <div class="ttt-score-item"><div class="ttt-score-n" id="tttScoreD">0</div><div class="ttt-score-l">Draws</div></div>
      <div class="ttt-score-item"><div class="ttt-score-n" id="tttScoreO" style="color:var(--accent2)">0</div><div class="ttt-score-l">Partner (O)</div></div>
    </div>
    <div class="ttt-status" id="tttStatus">X's turn 🎮</div>
    <div class="ttt-board" id="tttBoard">
      ${Array(9).fill(0).map((_,i)=>`<div class="ttt-cell" id="tc${i}" onclick="tttMove(${i})"></div>`).join('')}
    </div>
    <div class="g-row"><button class="g-btn g-btn-glass" onclick="tttReset()">🔄 New Game</button></div>
  `;
}
function initTTT() { tttBoard=Array(9).fill(null);tttTurn='X';tttOver=false; }
function tttMove(i) {
  if(tttBoard[i]||tttOver) return;
  tttBoard[i]=tttTurn;
  const cell=document.getElementById('tc'+i);
  cell.textContent=tttTurn==='X'?'❌':'⭕';
  cell.classList.add(tttTurn.toLowerCase());
  const win=tttCheckWin();
  if(win){
    win.forEach(i=>document.getElementById('tc'+i).classList.add('win'));
    tttScores[tttTurn]++;
    document.getElementById('tttStatus').textContent=`${tttTurn==='X'?'❌ You win':'⭕ Partner wins'}! 🎉`;
    document.getElementById(`tttScore${tttTurn}`).textContent=tttScores[tttTurn];
    tttOver=true;
    setTimeout(tttReset,2000);
  } else if(tttBoard.every(Boolean)){
    tttScores.D++;document.getElementById('tttStatus').textContent='Draw! 🤝';
    document.getElementById('tttScoreD').textContent=tttScores.D;
    tttOver=true;setTimeout(tttReset,2000);
  } else {
    tttTurn=tttTurn==='X'?'O':'X';
    document.getElementById('tttStatus').textContent=`${tttTurn==='X'?'❌ Your':'⭕ Partner\'s'} turn`;
  }
}
function tttCheckWin() {
  for(const [a,b,c] of TTT_WINS) if(tttBoard[a]&&tttBoard[a]===tttBoard[b]&&tttBoard[a]===tttBoard[c]) return [a,b,c];
  return null;
}
function tttReset() {
  tttBoard=Array(9).fill(null);tttTurn='X';tttOver=false;
  for(let i=0;i<9;i++){const c=document.getElementById('tc'+i);if(c){c.textContent='';c.className='ttt-cell';c.onclick=()=>tttMove(i);}}
  const st=document.getElementById('tttStatus');if(st) st.textContent="X's turn 🎮";
}
window.tttMove=tttMove; window.tttReset=tttReset;

// ══ 9. COUPLE LUDO ══
const LUDO_COLORS=['#5B9BFF','#FF6B9D'];
const LUDO_NAMES=['You','Partner'];
let ludoState={pieces:[[0,0],[0,0]],turn:0,dice:0,home:[0,0],rolled:false};
function renderLudo() {
  return `
    <div class="info-chip">Simple 2-player Ludo. Roll dice, move your piece around the board, reach HOME to win! 🎲</div>
    <div id="ludoBoard" style="position:relative;width:280px;height:280px;margin:0 auto 16px;border-radius:16px;overflow:hidden;border:1px solid var(--border2);background:rgba(8,8,20,0.9)"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="text-align:center;flex:1"><div style="font-size:13px;font-weight:700;color:${LUDO_COLORS[0]}">${LUDO_NAMES[0]}</div><div style="font-size:10px;color:var(--text3)">Home: <span id="ludo-home-0">0</span>/2</div></div>
      <div id="ludoDiceDisplay" style="font-size:48px;text-align:center;flex:1">🎲</div>
      <div style="text-align:center;flex:1"><div style="font-size:13px;font-weight:700;color:${LUDO_COLORS[1]}">${LUDO_NAMES[1]}</div><div style="font-size:10px;color:var(--text3)">Home: <span id="ludo-home-1">0</span>/2</div></div>
    </div>
    <div id="ludoStatus" style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:14px;padding:10px;background:var(--g1);border-radius:10px;border:1px solid var(--border)">Your turn! Roll the dice.</div>
    <div class="g-row">
      <button class="g-btn g-btn-accent" id="ludoRollBtn" onclick="ludoRoll()" style="width:100%;padding:14px;justify-content:center;font-size:15px">🎲 Roll Dice</button>
    </div>
  `;
}
// Simple linear track: 0=start, steps 1-20, 21=home zone
const TOTAL_STEPS=20;
function initLudo() { ludoState={pieces:[[1,1],[1,1]],turn:0,dice:0,home:[0,0],rolled:false}; drawLudo(); }
function drawLudo() {
  const board=document.getElementById('ludoBoard'); if(!board) return;
  const W=280;
  let svg=`<svg width="${W}" height="${W}" viewBox="0 0 ${W} ${W}" xmlns="http://www.w3.org/2000/svg">`;
  // Draw track cells
  const cells=[];
  const cx=W/2,cy=W/2,r=100,nr=20;
  for(let i=0;i<nr;i++){const a=(i/nr)*2*Math.PI-Math.PI/2;cells.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}
  // Draw lines
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="20" stroke-dasharray="5 ${(2*Math.PI*r/nr-5).toFixed(1)}" stroke-dashoffset="0"/>`;
  // Step cells
  cells.forEach((c,i)=>{
    const isHome=i===0||i===10;
    svg+=`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="9" fill="${isHome?'rgba(255,215,0,0.3)':'rgba(255,255,255,0.05)'}" stroke="${isHome?'rgba(255,215,0,0.5)':'rgba(255,255,255,0.1)'}" stroke-width="1"/>`;
    svg+=`<text x="${c.x.toFixed(1)}" y="${(c.y+3).toFixed(1)}" text-anchor="middle" font-size="6" fill="rgba(255,255,255,0.3)" font-family="Inter">${i+1}</text>`;
  });
  // HOME in center
  svg+=`<circle cx="${cx}" cy="${cy}" r="30" fill="rgba(255,215,0,0.1)" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="14" fill="rgba(255,215,0,0.8)">🏆</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.5)" font-family="Inter">HOME</text>`;
  // Pieces
  [0,1].forEach(p=>{
    ludoState.pieces[p].forEach((step,pieceIdx)=>{
      if(step>TOTAL_STEPS){const o=p===0?-12:12;svg+=`<circle cx="${(cx+o).toFixed(1)}" cy="${cy}" r="8" fill="${LUDO_COLORS[p]}" stroke="#fff" stroke-width="2" opacity="0.8"/>`;return;}
      const cellIdx=(step-1+p*10)%nr;
      const c2=cells[cellIdx];
      const ox=pieceIdx===0?-5:5;
      svg+=`<circle cx="${(c2.x+ox).toFixed(1)}" cy="${c2.y.toFixed(1)}" r="8" fill="${LUDO_COLORS[p]}" stroke="#fff" stroke-width="2"/>
        <text x="${(c2.x+ox).toFixed(1)}" y="${(c2.y+4).toFixed(1)}" text-anchor="middle" font-size="8" fill="#fff" font-family="Inter">${pieceIdx+1}</text>`;
    });
  });
  svg+=`</svg>`;
  board.innerHTML=svg;
}
function ludoRoll() {
  if(ludoState.rolled) return;
  const dice=1+Math.floor(Math.random()*6);
  ludoState.dice=dice;ludoState.rolled=true;
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  document.getElementById('ludoDiceDisplay').textContent=faces[dice-1];
  document.getElementById('ludoStatus').textContent=`${LUDO_NAMES[ludoState.turn]} rolled ${dice}! Click a piece to move.`;
  // Auto move if only 1 valid piece
  const validPieces=ludoState.pieces[ludoState.turn].map((s,i)=>i).filter(i=>ludoState.pieces[ludoState.turn][i]<=TOTAL_STEPS);
  if(validPieces.length===1) setTimeout(()=>ludoMove(validPieces[0]),500);
  else if(validPieces.length===0) { ludoNextTurn(); }
}
function ludoMove(pieceIdx) {
  if(!ludoState.rolled) return;
  const p=ludoState.turn;
  const newStep=ludoState.pieces[p][pieceIdx]+ludoState.dice;
  if(newStep>TOTAL_STEPS+2) return; // can't overshoot
  ludoState.pieces[p][pieceIdx]=newStep;
  ludoState.rolled=false;
  // Check home
  if(ludoState.pieces[p].filter(s=>s>TOTAL_STEPS).length){
    const homeCount=ludoState.pieces[p].filter(s=>s>TOTAL_STEPS).length;
    ludoState.home[p]=homeCount;
    document.getElementById(`ludo-home-${p}`).textContent=homeCount;
    if(homeCount>=2){document.getElementById('ludoStatus').innerHTML=`🏆 <strong style="color:${LUDO_COLORS[p]}">${LUDO_NAMES[p]} WINS!</strong> 🎉`;drawLudo();return;}
  }
  drawLudo();
  ludoNextTurn();
}
function ludoNextTurn() {
  ludoState.turn=ludoState.turn===0?1:0;
  document.getElementById('ludoStatus').textContent=`${LUDO_NAMES[ludoState.turn]}'s turn. Roll the dice!`;
  document.getElementById('ludoDiceDisplay').textContent='🎲';
}
window.ludoRoll=ludoRoll; window.ludoMove=ludoMove;

// ══ INIT ══
renderGames();

// Accept theme variables from parent
window.addEventListener('message',e=>{
  if(e.data?.type==='theme'){
    const r=document.documentElement;
    Object.entries(e.data.vars||{}).forEach(([k,v])=>r.style.setProperty(k,v));
  }
});
</script>
