<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Couple Games 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --h:215; --accent:hsl(var(--h),100%,62%); --accent-d:hsl(var(--h),95%,50%); --accent-l:hsl(var(--h),100%,78%); --accent-glow:hsla(var(--h),100%,62%,.35);
  --accent2:hsl(300,85%,65%); --accent2-d:hsl(300,80%,52%); --accent2-glow:hsla(300,85%,65%,.35);
  --gold:#ffc94a; --gold-glow:rgba(255,201,74,.4); --dia:#7ee8ff; --dia-glow:rgba(126,232,255,.4);
  --g1:rgba(255,255,255,.045); --g2:rgba(255,255,255,.09); --g3:rgba(255,255,255,.15);
  --blur:blur(26px) saturate(180%); --blur-sm:blur(12px) saturate(150%);
  --ff-serif:'DM Serif Display',Georgia,serif; --ff-sans:'Inter',system-ui,sans-serif;
  --white:#fff; --text:rgba(255,255,255,.94); --text2:rgba(255,255,255,.64); --text3:rgba(255,255,255,.38);
  --border:rgba(255,255,255,.11); --border2:rgba(255,255,255,.20);
  --green:#34d399; --green-bg:rgba(52,211,153,.15); --red:#f87171; --red-bg:rgba(248,113,113,.15); --yellow:#fbbf24;
  --t:all .22s cubic-bezier(.4,0,.2,1); --ts:all .35s cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
input,textarea{user-select:text}
body{font-family:var(--ff-sans);color:var(--text);min-height:100vh;background:transparent;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}
button{font-family:inherit;cursor:pointer}
.glass{background:var(--g1);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border)}

/* ══ HUB ══ */
.hub{padding:16px 14px 40px;max-width:960px;margin:0 auto}
.hub-hero{text-align:center;padding:10px 0 18px}
.hub-title{font-family:var(--ff-serif);font-size:26px;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
.hub-sub{font-size:12px;color:var(--text2);margin-top:4px}

/* rank cards */
.rank-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:stretch;margin-bottom:14px}
.rank-card{border-radius:20px;padding:14px;position:relative;overflow:hidden;border:1px solid var(--border2);backdrop-filter:var(--blur)}
.rank-card.me{background:linear-gradient(155deg,hsla(var(--h),100%,55%,.18),rgba(255,255,255,.03))}
.rank-card.pt{background:linear-gradient(155deg,hsla(300,85%,60%,.18),rgba(255,255,255,.03))}
.rank-vs{align-self:center;font-family:var(--ff-serif);font-size:20px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:2px}
.rank-top{display:flex;align-items:center;gap:10px}
.rank-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;border:2px solid rgba(255,255,255,.3);flex-shrink:0;position:relative;overflow:hidden}
.rank-av img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.rank-card.me .rank-av{background:linear-gradient(135deg,var(--accent),var(--accent-d))}
.rank-card.pt .rank-av{background:linear-gradient(135deg,var(--accent2),var(--accent2-d))}
.rank-online{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:var(--text3);border:2px solid rgba(10,10,20,.9)}
.rank-online.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.rank-name{font-size:13px;font-weight:700;color:#fff}
.rank-lvl{font-size:10px;color:var(--text3);margin-top:1px}
.rank-xpbar{height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}
.rank-xpfill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.rank-card.me .rank-xpfill{background:linear-gradient(90deg,var(--accent),var(--accent-l))}
.rank-card.pt .rank-xpfill{background:linear-gradient(90deg,var(--accent2),#ff9ec7)}
.rank-stats{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.rank-stat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);font-weight:600}
.rank-playing{margin-top:9px;font-size:10px;padding:4px 9px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.3);display:inline-flex;align-items:center;gap:5px;font-weight:700}
.rank-playing .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blk 1.4s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.3}}

/* daily / continue */
.banner-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:640px){.banner-row{grid-template-columns:1fr}}
.banner{border-radius:18px;padding:15px;position:relative;overflow:hidden;cursor:pointer;transition:var(--ts);border:1px solid var(--border2)}
.banner:hover{transform:translateY(-3px)}
.banner.daily{background:linear-gradient(135deg,rgba(255,201,74,.15),rgba(255,107,157,.08))}
.banner.cont{background:linear-gradient(135deg,rgba(126,232,255,.12),hsla(var(--h),100%,55%,.10))}
.banner-tag{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.banner.cont .banner-tag{color:var(--dia)}
.banner-title{font-family:var(--ff-serif);font-size:16px;color:#fff}
.banner-sub{font-size:11px;color:var(--text2);margin-top:3px}
.banner-prog{height:5px;border-radius:3px;background:rgba(255,255,255,.08);margin-top:9px;overflow:hidden}
.banner-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),#ff9ec7)}
.banner.cont .banner-prog-fill{background:linear-gradient(90deg,var(--dia),var(--accent))}
.banner-ico{position:absolute;right:10px;top:10px;font-size:34px;opacity:.5}

/* section labels */
.hub-sec-title{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin:18px 4px 10px;display:flex;align-items:center;gap:8px}
.hub-sec-title .line{flex:1;height:1px;background:var(--border)}

/* game grid */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.gcard{border-radius:22px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border2);background:var(--g1);backdrop-filter:var(--blur);transition:var(--ts)}
.gcard:hover{transform:translateY(-6px) scale(1.008);box-shadow:0 22px 50px rgba(0,0,0,.45)}
.gcard:active{transform:scale(.97)}
.gcard-art{height:132px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gcard-art::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% -10%,rgba(255,255,255,.18),transparent 60%)}
.gcard-emoji{font-size:58px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));animation:gfloat 3.2s ease-in-out infinite;z-index:1}
@keyframes gfloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}
.gcard-badges{position:absolute;top:9px;left:9px;display:flex;gap:5px;z-index:2}
.gbadge{font-size:9px;font-weight:800;letter-spacing:.4px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.gbadge.new{background:var(--accent2);color:#fff}
.gbadge.trend{background:var(--gold);color:#3a2600}
.gfav{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;z-index:2;transition:var(--t)}
.gfav.on{background:rgba(255,80,80,.3)}
.gcard-live{position:absolute;bottom:9px;left:9px;font-size:9px;font-weight:700;background:rgba(52,211,153,.25);color:#7cffcf;border:1px solid rgba(52,211,153,.4);padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;z-index:2}
.gcard-body{padding:14px 15px 15px}
.gcard-title{font-family:var(--ff-serif);font-size:17px;color:#fff;margin-bottom:4px}
.gcard-desc{font-size:11.5px;color:var(--text2);line-height:1.55;margin-bottom:10px;min-height:34px}
.gcard-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.gtag{font-size:9.5px;padding:3px 8px;border-radius:20px;background:var(--g2);color:var(--text2);border:1px solid var(--border);font-weight:600}
.gplay-btn{width:100%;padding:11px;border-radius:13px;border:none;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:7px;transition:var(--ts)}
.gplay-btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
.gplay-btn:active{transform:scale(.95)}
.gprog-mini{height:4px;background:rgba(255,255,255,.09);border-radius:3px;margin-bottom:9px;overflow:hidden}
.gprog-mini-fill{height:100%;border-radius:3px}

/* ══ FULLSCREEN GAME OVERLAY ══ */
.goverlay{position:fixed;inset:0;z-index:3000;display:none;flex-direction:column;background:rgba(4,4,10,.55);backdrop-filter:blur(2px)}
.goverlay.open{display:flex}
.goverlay-inner{flex:1;display:flex;flex-direction:column;background:rgba(9,9,20,.86);backdrop-filter:blur(30px) saturate(190%);margin:0;overflow:hidden;animation:gopop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes gopop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.gohead{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(255,255,255,.02)}
.gohead-title{font-family:var(--ff-serif);font-size:16px;color:#fff;flex:1;display:flex;align-items:center;gap:8px}
.gohead-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--g2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.gobody{flex:1;overflow-y:auto;padding:14px;position:relative}
.gobody.nopad{padding:0}
.gohead-chip{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--g2);border:1px solid var(--border);color:var(--text2);font-weight:700;display:flex;align-items:center;gap:4px}

/* generic ui atoms reused across games */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:13px;font-size:13px;border:none;font-weight:700;color:#fff;transition:var(--ts)}
.btn:active{transform:scale(.95)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-d));box-shadow:0 4px 16px var(--accent-glow)}
.btn-pink{background:linear-gradient(135deg,var(--accent2),var(--accent2-d));box-shadow:0 4px 16px var(--accent2-glow)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e08a00);box-shadow:0 4px 16px var(--gold-glow);color:#3a2600}
.btn-glass{background:var(--g2);color:#fff;border:1px solid var(--border2)}
.btn-sm{padding:7px 12px;font-size:11.5px}
.btn:disabled{opacity:.4;pointer-events:none}
.coin-chip,.dia-chip,.xp-chip{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.coin-chip{background:rgba(255,201,74,.15);color:var(--gold);border:1px solid rgba(255,201,74,.3)}
.dia-chip{background:rgba(126,232,255,.15);color:var(--dia);border:1px solid rgba(126,232,255,.3)}
.xp-chip{background:hsla(var(--h),100%,62%,.15);color:var(--accent-l);border:1px solid hsla(var(--h),100%,62%,.3)}

/* toast/reward */
.gtoast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(14,14,14,.88);backdrop-filter:blur(16px);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:.3s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:0 8px 26px rgba(0,0,0,.45);border:1px solid var(--border2)}
.gtoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.reward-pop{position:fixed;inset:0;z-index:9998;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
.reward-pop.show{display:flex}
.reward-card{background:rgba(255,255,255,.07);backdrop-filter:blur(30px);border:1px solid var(--border2);border-radius:28px;padding:36px 30px;text-align:center;max-width:320px;animation:gopop .4s cubic-bezier(.34,1.56,.64,1)}
.reward-ico{font-size:64px;animation:rewardbeat 1s ease-in-out infinite}
@keyframes rewardbeat{0%,100%{transform:scale(1)}30%{transform:scale(1.2)}}
.reward-title{font-family:var(--ff-serif);font-size:22px;color:#fff;margin-top:12px}
.reward-items{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.reward-item{background:var(--g2);border:1px solid var(--border);border-radius:14px;padding:10px 16px;font-size:14px;font-weight:800}
#confettiCanvas{position:fixed;inset:0;z-index:9997;pointer-events:none;display:none}

/* achievements strip */
.ach-strip{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px}
.ach-strip::-webkit-scrollbar{height:0}
.ach-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;text-align:center;opacity:.4}
.ach-pill.unlocked{opacity:1}
.ach-ico{width:46px;height:46px;border-radius:14px;background:var(--g2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px}
.ach-pill.unlocked .ach-ico{background:linear-gradient(135deg,var(--gold),#e08a00);box-shadow:0 3px 12px var(--gold-glow)}
.ach-lbl{font-size:8.5px;color:var(--text3);font-weight:700;line-height:1.2}

/* ═══ PLAY ANALYTICS ═══ */
.pa-insight-card{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;background:linear-gradient(135deg,rgba(229,9,20,0.1),rgba(143,0,0,0.05));border:1px solid rgba(229,9,20,0.2);border-radius:14px;margin-bottom:14px}
.pa-insight-ico{font-size:20px;flex-shrink:0}
.pa-insight-text{font-size:12px;color:var(--text2);line-height:1.55}
.pa-insight-text strong{color:#fff}
.pa-explore-row{display:flex;align-items:center;gap:16px;margin-bottom:14px;background:var(--g1);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.pa-explore-ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.pa-explore-ring-wrap svg{transform:rotate(-90deg)}
.pa-explore-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.pa-explore-label{font-size:11px;color:var(--text3)}
.pa-explore-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.pa-ach-prog-wrap{height:5px;background:var(--g2);border-radius:3px;margin-top:6px;overflow:hidden;max-width:200px}
.pa-ach-prog{height:100%;background:linear-gradient(90deg,var(--gold),#e08a00);border-radius:3px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1)}

/* ═══ LOVE ADVENTURE ═══ */
.la-scene{border-radius:20px;overflow:hidden;position:relative;min-height:230px;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:14px;border:1px solid var(--border2)}
.la-scene-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.28;filter:blur(1px)}
.la-scene-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(6,6,16,.9))}
.la-scene-content{position:relative;padding:18px;animation:laFade .5s ease}
@keyframes laFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.la-chap-tag{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent-l)}
.la-title{font-family:var(--ff-serif);font-size:19px;color:#fff;margin:5px 0 8px}
.la-text{font-size:13px;color:var(--text2);line-height:1.75}
.la-choices{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.la-choice{padding:12px 15px;border-radius:14px;background:var(--g1);border:1px solid var(--border);color:#fff;font-size:12.5px;text-align:left;transition:var(--t);display:flex;align-items:center;gap:8px}
.la-choice:hover{background:var(--g2);border-color:var(--accent);transform:translateX(3px)}
.la-mission-card{background:linear-gradient(135deg,rgba(255,107,157,.12),hsla(var(--h),100%,55%,.08));border:1px solid rgba(255,107,157,.25);border-radius:16px;padding:16px;margin-bottom:14px}
.la-map{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px;margin-top:6px}
.la-node{aspect-ratio:1;border-radius:14px;background:var(--g1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;cursor:pointer}
.la-node.done{background:linear-gradient(135deg,var(--green),#0d8f60)}
.la-node.locked{opacity:.3;pointer-events:none}
.la-node.cur{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* ═══ ISLAND ═══ */
.isl-wrap{display:flex;flex-direction:column;height:100%}
.isl-topbar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0}
.isl-topbar::-webkit-scrollbar{height:0}
.isl-item{flex-shrink:0;width:64px;text-align:center;padding:7px 5px;border-radius:13px;background:var(--g1);border:1px solid var(--border);cursor:pointer;transition:var(--t)}
.isl-item.sel{border-color:var(--accent);background:var(--g2);box-shadow:0 0 0 2px var(--accent-glow)}
.isl-item.locked{opacity:.35}
.isl-item-emoji{font-size:22px}
.isl-item-name{font-size:8px;color:var(--text3);font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.isl-item-cost{font-size:8.5px;color:var(--gold);font-weight:800;margin-top:1px}
.isl-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:20px}
.isl-grid{display:grid;gap:3px;background:linear-gradient(160deg,#0a2a3a,#0e3a2e);border-radius:22px;padding:14px;border:2px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.isl-tile{width:46px;height:46px;border-radius:9px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:var(--t);position:relative;border:1px solid rgba(255,255,255,.06)}
.isl-tile:hover{background:rgba(255,255,255,.12);transform:scale(1.08)}
.isl-tile.filled{animation:islPlace .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes islPlace{from{transform:scale(0)}to{transform:scale(1)}}
.isl-tile .anim{display:inline-block;animation:islBob 2.4s ease-in-out infinite}
@keyframes islBob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(4deg)}}


/* ═══ DRAW ═══ */
.dw-wrap{display:flex;flex-direction:column;height:100%}
.dw-toolbar{display:flex;gap:8px;padding:9px 12px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.dw-color{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.3);cursor:pointer;flex-shrink:0;transition:var(--t)}
.dw-color.sel{border-color:#fff;transform:scale(1.2)}
.dw-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#fff}
#dwCanvas{width:100%;height:100%;touch-action:none;cursor:crosshair}
.dw-tool-btn{width:32px;height:32px;border-radius:9px;background:var(--g2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.dw-tool-btn.sel{background:var(--accent);border-color:var(--accent)}
.dw-guess-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;backdrop-filter:blur(8px);z-index:5}

/* ═══ ESCAPE ROOM ═══ */
.er-room-bg{border-radius:20px;min-height:200px;position:relative;overflow:hidden;margin-bottom:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
.er-room-emoji{font-size:80px;opacity:.8;filter:drop-shadow(0 8px 20px rgba(0,0,0,.4))}

const Snd = (function(){
  let ctx = null;
  function ac(){ if(!ctx){ try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; }
  function beep(freq, start, dur, type, vol){
    const c = ac(); if(!c) return;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001, c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(vol||0.28, c.currentTime+start+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+start+dur);
    o.start(c.currentTime+start); o.stop(c.currentTime+start+dur+0.02);
  }
  return {
    click(){ beep(720,0,.06,'sine',.18); },
    tap(){ beep(500,0,.05,'triangle',.15); },
    success(){ beep(523,0,.1,'sine',.22); beep(659,.09,.12,'sine',.22); beep(784,.18,.18,'sine',.24); },
    fail(){ beep(220,0,.14,'sawtooth',.18); beep(160,.1,.18,'sawtooth',.16); },
    coin(){ beep(988,0,.08,'square',.14); beep(1318,.06,.1,'square',.14); },

    spin(){ beep(300,0,.4,'sawtooth',.06); },

})();

/* confetti */
function confetti(n){
  n = n||70;
  const cvs = document.getElementById('confettiCanvas');
  cvs.style.display='block'; cvs.width=innerWidth; cvs.height=innerHeight;
  const ctx = cvs.getContext('2d');
  const colors=['#ff6b9d','#5B9BFF','#ffc94a','#7ee8ff','#34d399','#a78bfa'];
  const parts = Array.from({length:n},()=>({x:Math.random()*cvs.width,y:-20-Math.random()*200,r:4+Math.random()*5,c:rand(colors),vy:2+Math.random()*3,vx:(Math.random()-.5)*3,rot:Math.random()*360,vr:(Math.random()-.5)*10}));
  let t=0;
  function frame(){
    t++; ctx.clearRect(0,0,cvs.width,cvs.height);
    let alive=false;
    parts.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr;
      if(p.y<cvs.height+20) alive=true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6); ctx.restore();
    });
    if(alive && t<260) requestAnimationFrame(frame); else cvs.style.display='none';
  }
  frame();
}

/* ═══════════════════════════════════════════════════════
   REALTIME SYNC LAYER — Supabase channel (broadcast) + table persistence
   Falls back gracefully to localStorage cross-tab if table/RLS unavailable.
   Requires table `games_shared` (couple_id text, game text, data jsonb, updated_at timestamptz,
   primary key (couple_id, game)) — see closing notes.
═══════════════════════════════════════════════════════ */
class GameChannel {
  constructor(gameKey){
    this.gameKey=gameKey; this.chanName='gm_'+ID.coupleId+'_'+gameKey;
    this.channel=null; this._onMsg=null; this._lsHandler=null;
  }
  async load(){
    if(sb){
      try{
        const {data,error} = await sb.from('games_shared').select('data').eq('couple_id',ID.coupleId).eq('game',this.gameKey).maybeSingle();
        if(!error && data) return data.data;
      }catch(e){ console.warn('games_shared load failed:', e.message); }
    }
    try{ const raw=localStorage.getItem('gm_local_'+this.chanName); if(raw) return JSON.parse(raw); }catch(e){}
    return null;
  }
  async persist(state){
    try{ localStorage.setItem('gm_local_'+this.chanName, JSON.stringify(state)); }catch(e){}
    if(sb){
      try{ await sb.from('games_shared').upsert({couple_id:ID.coupleId,game:this.gameKey,data:state,updated_at:new Date().toISOString()},{onConflict:'couple_id,game'}); }
      catch(e){ /* table may not exist — silently keep local-only */ }
    }
  }
  listen(onMsg){
    this._onMsg=onMsg;
    if(sb){
      this.channel = sb.channel(this.chanName, {config:{broadcast:{self:false}}});
      this.channel.on('broadcast',{event:'ev'},(p)=>onMsg(p.payload));
      this.channel.subscribe();
    }
    this._lsHandler = (e)=>{ if(e.key==='gm_bc_'+this.chanName && e.newValue){ try{ onMsg(JSON.parse(e.newValue).payload); }catch(er){} } };
    window.addEventListener('storage', this._lsHandler);
  }
  send(payload){
    if(this.channel){ try{ this.channel.send({type:'broadcast',event:'ev',payload}); }catch(e){} }
    try{ localStorage.setItem('gm_bc_'+this.chanName, JSON.stringify({t:Date.now(),payload})); }catch(e){}
  }
  close(){ if(this.channel && sb) sb.removeChannel(this.channel); if(this._lsHandler) window.removeEventListener('storage',this._lsHandler); }
}

function isDailyDone(){ return localStorage.getItem(dailyDoneKey())==='1'; }

const LoveAdventure = {
  chan:null, state:null,
  async open(body){
    this.chan = new GameChannel('love');
    let st = await this.chan.load();
    if(!st) st = { current:0, flags:{}, missionsDone:{}, unlockedMax:0 };
    this.state = st;
    this.chan.listen(payload=>{ if(payload.type==='sync'){ this.state=payload.state; this.render(); } });
    this.render();
  },
  close(){ if(this.chan) this.chan.close(); },
  sync(){ this.chan.send({type:'sync',state:this.state}); this.chan.persist(this.state); },
  goTo(idx,xp,restart){
    if(restart) this.state={current:0,flags:{},missionsDone:{},unlockedMax:0};
    else {
      this.state.current=idx;
      this.state.unlockedMax=Math.max(this.state.unlockedMax,idx);
      GameCore.me().laChapter=Math.max(GameCore.me().laChapter,idx);
      if(idx>=3) GameCore.unlock('love_ch3');
      if(xp) GameCore.addXP(xp);
    }
    Hub.completeDailyIfPending('love');
    this.sync(); this.render(); Snd.success();
  },
  completeMission(){
    const ch=LA_CHAPTERS[this.state.current];
    this.state.missionsDone[ch.id]=true;
    GameCore.addCoins(10); Snd.coin(); toast('Mission complete! +10 coins 🪙');
    this.sync(); this.render();
  },
  render(){
    const body=document.getElementById('goBody'); if(!body) return;
    const ch = LA_CHAPTERS[this.state.current];
    const missionPending = ch.mission && !this.state.missionsDone[ch.id];
    body.innerHTML = `
      <div class="la-scene">
        <div class="la-scene-bg">${ch.emoji}</div><div class="la-scene-grad"></div>
        <div class="la-scene-content">
          <div class="la-chap-tag">${esc(ch.tag)}</div>
          <div class="la-title">${ch.emoji} ${esc(ch.title)}</div>
          <div class="la-text">${esc(ch.text)}</div>
        </div>
      </div>
      ${ch.mission ? `<div class="la-mission-card">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#ff9ec7;margin-bottom:6px">💫 Daily Mission ${this.state.missionsDone[ch.id]?'· ✅ Done':''}</div>
        <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:4px">${esc(ch.mission.title)}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px">${esc(ch.mission.desc)}</div>
        ${this.state.missionsDone[ch.id] ? '' : `<button class="btn btn-pink btn-sm" onclick="LoveAdventure.doMission('${ch.mission.type}')">${ch.mission.type==='photo'?'📷 Capture':ch.mission.type==='voice'?'🎙️ Record':'✍️ Write'}</button>`}
      </div>` : ''}
      <div class="la-choices">
        ${ch.choices.map(c=>`<button class="la-choice" ${missionPending?'disabled style="opacity:.4;pointer-events:none"':''} onclick="LoveAdventure.goTo(${c.next},${c.xp||0},${!!c.restart})">${esc(c.t)} ${c.xp?`<span style="margin-left:auto;color:var(--accent-l);font-size:11px;font-weight:800">+${c.xp} XP</span>`:''}</button>`).join('')}
      </div>
      <div class="hub-sec-title" style="margin-top:18px"><span>🗺️ Story Map</span><div class="line"></div></div>
      <div class="la-map">
        ${LA_CHAPTERS.map((c,i)=>`<div class="la-node ${i<=this.state.unlockedMax?'done':(i===this.state.unlockedMax+1?'cur':'locked')}" onclick="${i<=this.state.unlockedMax?`LoveAdventure.goTo(${i},0,false)`:''}" title="${esc(c.title)}">${c.emoji}</div>`).join('')}
      </div>
    `;
  },
  doMission(type){
    if(type==='photo'){
      const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
      inp.onchange=()=>{ if(inp.files[0]) this.completeMission(); };
      inp.click();
    } else if(type==='voice'){
      if(!navigator.mediaDevices){ toast('Mic not supported on this device — marking complete anyway 💕'); this.completeMission(); return; }
      navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
        toast('🎙️ Recording… speak now (3s)');
        const rec=new MediaRecorder(stream);
        rec.start();
        setTimeout(()=>{ rec.stop(); stream.getTracks().forEach(t=>t.stop()); this.completeMission(); },3000);
      }).catch(()=>{ toast('Mic permission denied — try the write option next time'); this.completeMission(); });
    } else {
      const msg=prompt('Write your toast / message:');
      if(msg!==null) this.completeMission();
    }
  }
};

const ISL_SIZE = 6;
const Island = {
  chan:null, state:null, selected:'house',
  async open(body){
    this.chan = new GameChannel('island');
    let st = await this.chan.load();
    if(!st) st = { grid:{} };
    this.state = st;
    this.chan.listen(payload=>{ if(payload.type==='place'){ this.state.grid[payload.key]=payload.b; this.renderGrid(); } });
    this.render(body);
  },
  close(){ if(this.chan) this.chan.close(); },
  render(body){
    const coupleLevel = GameCore.level(GameCore.me().xp+GameCore.pt().xp);
    body.className='gobody nopad';
    body.innerHTML = `<div class="isl-wrap">
      <div class="isl-topbar" id="islTopbar"></div>
      <div class="isl-canvas-wrap"><div class="isl-grid" id="islGrid" style="grid-template-columns:repeat(${ISL_SIZE},46px)"></div></div>
    </div>`;
    const tb=document.getElementById('islTopbar');
    tb.innerHTML = ISL_BUILDINGS.map(b=>{
      const locked = coupleLevel<b.lvl;
      return `<div class="isl-item ${this.selected===b.id?'sel':''} ${locked?'locked':''}" onclick="${locked?'':`Island.select('${b.id}')`}" title="${locked?'Unlocks at couple level '+b.lvl:b.name}">
        <div class="isl-item-emoji">${locked?'🔒':b.emoji}</div>
        <div class="isl-item-name">${b.name}</div>
        <div class="isl-item-cost">${locked?'Lv.'+b.lvl:(b.cost?'🪙'+b.cost:'Free')}</div>
      </div>`;
    }).join('');
    this.renderGrid();
  },
  select(id){ this.selected=id; Snd.tap(); this.render(document.getElementById('goBody')); },
  renderGrid(){
    const grid=document.getElementById('islGrid'); if(!grid) return;
    let html='';
    for(let y=0;y<ISL_SIZE;y++) for(let x=0;x<ISL_SIZE;x++){
      const key=x+'_'+y; const bid=this.state.grid[key];
      const b = bid ? ISL_BUILDINGS.find(x2=>x2.id===bid) : null;
      html += `<div class="isl-tile ${b?'filled':''}" onclick="Island.place('${key}')">${b?`<span class="${b.anim?'anim':''}">${b.emoji}</span>`:''}</div>`;
    }
    grid.innerHTML=html;
  },
  place(key){
    const b = ISL_BUILDINGS.find(x=>x.id===this.selected);
    if(!b) return;
    const coupleLevel = GameCore.level(GameCore.me().xp+GameCore.pt().xp);
    if(coupleLevel<b.lvl){ toast('🔒 Unlocks at couple level '+b.lvl); return; }
    if(GameCore.me().coins<b.cost){ toast('Not enough coins 🪙 — earn more by playing!'); return; }
    if(b.cost>0) GameCore.addCoins(-b.cost);
    this.state.grid[key]=b.id;
    GameCore.me().islandBuildings=Object.keys(this.state.grid).length;
    if(GameCore.me().islandBuildings>=5) GameCore.unlock('island_5');
    const placedTypes = new Set(Object.values(this.state.grid));
    if(ISL_BUILDINGS.every(bd=>placedTypes.has(bd.id))) GameCore.unlock('island_all');
    GameCore.addXP(15);
    Hub.completeDailyIfPending('island');
    Snd.place();
    this.chan.send({type:'place',key,b:b.id}); this.chan.persist(this.state);
    this.renderGrid();
  }
};

const DreamHome = {
  chan:null, state:null, curRoom:'bedroom', selected:null,
  async open(body){
    this.chan = new GameChannel('dreamhome');
    let st = await this.chan.load();
    if(!st) st = { rooms:{} }; // rooms[roomId] = { "x_y": itemId }
    DH_ROOMS.forEach(r=>{ if(!st.rooms[r.id]) st.rooms[r.id]={}; });
    this.state = st;
    this.chan.listen(payload=>{ if(payload.type==='place'){ this.state.rooms[payload.room][payload.key]=payload.item; if(this.curRoom===payload.room) this.renderGrid(); this.renderScore(); } });
    this.render(body);
  },
  close(){ if(this.chan) this.chan.close(); },
  coupleLevel(){ return GameCore.level(GameCore.me().xp + GameCore.pt().xp); },
  render(body){
    body.className='gobody nopad';
    body.innerHTML = `<div class="dh-wrap">
      <div class="dh-roomtabs" id="dhRoomTabs"></div>
      <div class="dh-shoptray" id="dhShopTray"></div>
      <div class="dh-canvas-wrap"><div class="dh-room" id="dhRoomGrid"></div></div>
      <div class="dh-home-score" id="dhScoreRow"></div>
    </div>`;
    this.renderTabs(); this.renderShop(); this.renderGrid(); this.renderScore();
  },
  renderTabs(){
    const el=document.getElementById('dhRoomTabs'); if(!el) return;
    const cl=this.coupleLevel();
    el.innerHTML = DH_ROOMS.map(r=>{
      const locked = cl<r.lvl;
      return `<div class="dh-roomtab ${this.curRoom===r.id?'sel':''} ${locked?'locked':''}" onclick="${locked?'':`DreamHome.switchRoom('${r.id}')`}" title="${locked?'Unlocks at couple level '+r.lvl:r.name}">
        ${locked?'🔒':r.emoji} ${r.name}
      </div>`;
    }).join('');
  },
  switchRoom(id){ this.curRoom=id; this.selected=null; Snd.tap(); this.renderTabs(); this.renderShop(); this.renderGrid(); },
  renderShop(){
    const el=document.getElementById('dhShopTray'); if(!el) return;
    const cl=this.coupleLevel();
    const pool = (DH_ITEMS[this.curRoom]||[]).concat(cl>=6?DH_LUXURY:[]);
    el.innerHTML = pool.map(it=>{
      const locked = cl<it.lvl;
      return `<div class="dh-item ${this.selected===it.id?'sel':''} ${locked?'locked':''}" onclick="${locked?'':`DreamHome.select('${it.id}')`}" title="${locked?'Unlocks at couple level '+it.lvl:it.name}">
        <div class="dh-item-emoji">${locked?'🔒':it.emoji}</div>
        <div class="dh-item-name">${it.name}</div>
        <div class="dh-item-cost">${locked?'Lv.'+it.lvl:(it.cost?'🪙'+it.cost:'Free')}</div>
      </div>`;
    }).join('');
  },
  select(id){ this.selected=id; Snd.tap(); this.renderShop(); },
  findItem(id){
    return (DH_ITEMS[this.curRoom]||[]).find(x=>x.id===id) || DH_LUXURY.find(x=>x.id===id);
  },
  renderGrid(){
    const grid=document.getElementById('dhRoomGrid'); if(!grid) return;
    const room = DH_ROOMS.find(r=>r.id===this.curRoom);
    const size = room.size;
    grid.style.gridTemplateColumns = `repeat(${size},46px)`;
    grid.style.background = this.roomGradient(room.id);
    const placed = this.state.rooms[room.id] || {};
    let html='';
    for(let y=0;y<size;y++) for(let x=0;x<size;x++){
      const key=x+'_'+y; const itemId=placed[key];
      const it = itemId ? this.findItem(itemId) : null;
      html += `<div class="dh-tile ${it?'filled':''}" onclick="DreamHome.place('${key}')">${it?`<span class="${it.anim?'anim':''}">${it.emoji}</span>`:''}</div>`;
    }
    grid.innerHTML = html;
  },
  roomGradient(id){
    const g = {
      bedroom:'linear-gradient(160deg,#2a1a3a,#1a0e2e)', kitchen:'linear-gradient(160deg,#3a2a1a,#2e1e0e)',
      living:'linear-gradient(160deg,#1a2a3a,#0e1e2e)', garden:'linear-gradient(160deg,#0a2a3a,#0e3a2e)',
      balcony:'linear-gradient(160deg,#3a1a2a,#2e0e1e)', gaming:'linear-gradient(160deg,#1a0a3a,#2e0e4a)',
      theater:'linear-gradient(160deg,#0a0a1a,#1a0a2a)', pool:'linear-gradient(160deg,#0a2a3a,#0e4a5c)',
      garage:'linear-gradient(160deg,#2a2a2a,#1a1a1a)'
    };
    return g[id] || 'linear-gradient(160deg,#0a2a3a,#0e3a2e)';
  },
  place(key){
    if(!this.selected){ toast('Pick an item from the tray first 🛋️'); return; }
    const it = this.findItem(this.selected);
    if(!it) return;
    const cl = this.coupleLevel();
    if(cl<it.lvl){ toast('🔒 Unlocks at couple level '+it.lvl); return; }
    if(GameCore.me().coins<it.cost){ toast('Not enough coins 🪙'); return; }
    if(it.cost>0) GameCore.addCoins(-it.cost);
    this.state.rooms[this.curRoom][key]=it.id;
    GameCore.addXP(12);
    Hub.completeDailyIfPending && Hub.completeDailyIfPending('dreamhome');
    Snd.place();
    GameCore.unlock('dh_first');
    if(DH_LUXURY.find(l=>l.id===it.id)) GameCore.unlock('dh_luxury');
    // room complete?
    const room = DH_ROOMS.find(r=>r.id===this.curRoom);
    const filled = Object.keys(this.state.rooms[this.curRoom]).length;
    if(filled>=room.size*room.size) GameCore.unlock('dh_room_done');
    // all rooms unlocked?
    if(DH_ROOMS.every(r=>this.coupleLevel()>=r.lvl)) GameCore.unlock('dh_allrooms');
    this.chan.send({type:'place',room:this.curRoom,key,item:it.id}); this.chan.persist(this.state);
    this.renderGrid(); this.renderScore();
  },
  renderScore(){
    const el=document.getElementById('dhScoreRow'); if(!el) return;
    let total=0, done=0;
    DH_ROOMS.forEach(r=>{ const f=Object.keys(this.state.rooms[r.id]||{}).length; total+=f; if(f>=r.size*r.size) done++; });
    el.innerHTML = `
      <div class="dh-score-chip">🛋️ ${total} items placed</div>
      <div class="dh-score-chip">🏠 ${done}/${DH_ROOMS.length} rooms complete</div>
      <div class="dh-score-chip">⭐ Couple Lv.${this.coupleLevel()}</div>
    `;
  }
};

const DRAW_COLORS = ['#111111','#f87171','#fb923c','#fbbf24','#34d399','#38bdf8','#818cf8','#e879f9','#ffffff'];
const GUESS_WORDS = ['Heart','Sunset','Beach','Coffee','Rainbow','Cake','Star','Flower','Guitar','Mountain','Cat','Dog','Rocket','Rainbow','Moon','Pizza','Umbrella','Fireworks'];
const Draw = {
  chan:null, canvas:null, ctx:null, drawing:false, color:'#111111', size:5, tool:'pen',
  strokes:[], myStrokeStack:[], guessMode:false, guessWord:'', guessTimer:null, guessSecs:0,
  async open(body){
    this.chan = new GameChannel('draw');
    body.className='gobody nopad';
    body.innerHTML = `<div class="dw-wrap">
      <div class="dw-toolbar" id="dwToolbar"></div>
      <div class="dw-canvas-wrap"><canvas id="dwCanvas"></canvas><div class="dw-guess-banner" id="dwGuessBanner" style="display:none"></div></div>
    </div>`;
    this.buildToolbar();
    this.canvas = document.getElementById('dwCanvas'); this.ctx = this.canvas.getContext('2d');
    const wrap = this.canvas.parentElement;
    this.canvas.width = wrap.clientWidth; this.canvas.height = wrap.clientHeight;
    this.ctx.fillStyle='#fff'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
    this.attachEvents();
    const saved = await this.chan.load();
    if(saved && saved.img){ const img=new Image(); img.onload=()=>this.ctx.drawImage(img,0,0,this.canvas.width,this.canvas.height); img.src=saved.img; }
    this.chan.listen(payload=>{
      if(payload.type==='stroke') this.drawRemoteStroke(payload);
      if(payload.type==='clear'){ this.ctx.fillStyle='#fff'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height); }
      if(payload.type==='guessStart'){ this.guessWord=payload.word; this.startGuessUI(payload.by); }
    });
  },
  close(){ if(this.chan) this.chan.close(); clearInterval(this.guessTimer); },
  buildToolbar(){
    const tb=document.getElementById('dwToolbar');
    tb.innerHTML = `
      ${DRAW_COLORS.map(c=>`<div class="dw-color ${this.color===c?'sel':''}" style="background:${c}" onclick="Draw.setColor('${c}')"></div>`).join('')}
      <input type="range" min="2" max="24" value="${this.size}" oninput="Draw.setSize(this.value)" style="width:60px">
      <button class="dw-tool-btn ${this.tool==='pen'?'sel':''}" onclick="Draw.setTool('pen')">✏️</button>
      <button class="dw-tool-btn ${this.tool==='eraser'?'sel':''}" onclick="Draw.setTool('eraser')">🧽</button>
      <button class="dw-tool-btn ${this.tool==='rect'?'sel':''}" onclick="Draw.setTool('rect')">▭</button>
      <button class="dw-tool-btn ${this.tool==='circle'?'sel':''}" onclick="Draw.setTool('circle')">◯</button>
      <button class="dw-tool-btn" onclick="Draw.stamp()">✨</button>
      <button class="dw-tool-btn" onclick="Draw.undo()">↩️</button>
      <button class="dw-tool-btn" onclick="Draw.clearAll()">🗑️</button>
      <button class="btn btn-glass btn-sm" onclick="Draw.toggleGuess()">🎯 Guess</button>
      <button class="btn btn-accent btn-sm" onclick="Draw.save()">💾 Save</button>
    `;
  },
  setColor(c){ this.color=c; this.buildToolbar(); },
  setSize(v){ this.size=+v; },
  setTool(t){ this.tool=t; this.buildToolbar(); },
  pos(e){ const r=this.canvas.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return {x:(p.clientX-r.left)*(this.canvas.width/r.width), y:(p.clientY-r.top)*(this.canvas.height/r.height)}; },
  attachEvents(){
    let last=null, shapeStart=null, snapshot=null, buffer=[];
    const start=(e)=>{
      e.preventDefault(); this.drawing=true; const p=this.pos(e); last=p; shapeStart=p; buffer=[p];
      if(this.tool==='rect'||this.tool==='circle') snapshot=this.ctx.getImageData(0,0,this.canvas.width,this.canvas.height);
      this.myStrokeStack.push(this.ctx.getImageData(0,0,this.canvas.width,this.canvas.height));
      if(this.myStrokeStack.length>25) this.myStrokeStack.shift();
    };
    const move=(e)=>{
      if(!this.drawing) return; e.preventDefault(); const p=this.pos(e);
      if(this.tool==='pen'||this.tool==='eraser'){
        this.line(last,p,this.tool==='eraser'?'#ffffff':this.color,this.tool==='eraser'?this.size*2.4:this.size);
        this.chan.send({type:'stroke',x1:last.x,y1:last.y,x2:p.x,y2:p.y,color:this.tool==='eraser'?'#ffffff':this.color,size:this.tool==='eraser'?this.size*2.4:this.size});
        last=p; buffer.push(p);
      } else if(shapeStart){ this.ctx.putImageData(snapshot,0,0); this.drawShape(shapeStart,p); }
    };
    const end=()=>{
      if(!this.drawing) return; this.drawing=false;
      if((this.tool==='rect'||this.tool==='circle') && shapeStart){ this.chan.send({type:'stroke',shape:this.tool,x1:shapeStart.x,y1:shapeStart.y,x2:last===shapeStart?shapeStart.x+40:last.x,y2:last===shapeStart?shapeStart.y+40:last.y,color:this.color,size:this.size}); }
      this.debouncedPersist();
    };
    this.canvas.addEventListener('mousedown',start); this.canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
    this.canvas.addEventListener('touchstart',start,{passive:false}); this.canvas.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',end);
  },
  line(a,b,color,size){ const c=this.ctx; c.strokeStyle=color; c.lineWidth=size; c.lineCap='round'; c.lineJoin='round'; c.beginPath(); c.moveTo(a.x,a.y); c.lineTo(b.x,b.y); c.stroke(); },
  drawShape(a,b,color,size){ const c=this.ctx; c.strokeStyle=color||this.color; c.lineWidth=size||this.size; if(this.tool==='rect'||arguments[4]==='rect'){ c.strokeRect(Math.min(a.x,b.x),Math.min(a.y,b.y),Math.abs(b.x-a.x),Math.abs(b.y-a.y)); } else { c.beginPath(); const rx=Math.abs(b.x-a.x)/2, ry=Math.abs(b.y-a.y)/2; c.ellipse((a.x+b.x)/2,(a.y+b.y)/2,rx,ry,0,0,7); c.stroke(); } },
  drawRemoteStroke(p){
    if(p.shape){ this.ctx.strokeStyle=p.color; this.ctx.lineWidth=p.size; if(p.shape==='rect') this.ctx.strokeRect(Math.min(p.x1,p.x2),Math.min(p.y1,p.y2),Math.abs(p.x2-p.x1),Math.abs(p.y2-p.y1)); else { this.ctx.beginPath(); this.ctx.ellipse((p.x1+p.x2)/2,(p.y1+p.y2)/2,Math.abs(p.x2-p.x1)/2,Math.abs(p.y2-p.y1)/2,0,0,7); this.ctx.stroke(); } }
    else this.line({x:p.x1,y:p.y1},{x:p.x2,y:p.y2},p.color,p.size);
  },
  stamp(){
    const em=rand(['✨','💕','⭐','🌸','🎈','🦋','🌈']);
    this.ctx.font='42px sans-serif'; this.ctx.fillText(em, this.canvas.width/2-20, this.canvas.height/2);
    this.debouncedPersist(); Snd.tap();
  },
  undo(){ if(!this.myStrokeStack.length){ toast('Nothing to undo'); return; } const d=this.myStrokeStack.pop(); this.ctx.putImageData(d,0,0); this.debouncedPersist(); },
  clearAll(){ this.ctx.fillStyle='#fff'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height); this.chan.send({type:'clear'}); this.debouncedPersist(); Snd.whoosh(); },
  _pt:null,
  debouncedPersist(){ clearTimeout(this._pt); this._pt=setTimeout(()=>{ this.chan.persist({img:this.canvas.toDataURL('image/jpeg',0.6)}); },700); },
  save(){
    const a=document.createElement('a'); a.href=this.canvas.toDataURL('image/png'); a.download='us-drawing-'+Date.now()+'.png'; a.click();
    GameCore.me().drawSaves=(GameCore.me().drawSaves||0)+1; if(GameCore.me().drawSaves>=10) GameCore.unlock('draw_10');
    GameCore.addXP(20); Hub.completeDailyIfPending('draw'); Snd.success(); toast('Saved to your downloads 💾');
  },
  toggleGuess(){
    if(this.guessMode){ this.guessMode=false; document.getElementById('dwGuessBanner').style.display='none'; clearInterval(this.guessTimer); return; }
    const word=rand(GUESS_WORDS);
    this.chan.send({type:'guessStart',word,by:ID.role});
    this.startGuessUI(ID.role, word);
  },
  startGuessUI(by, wordIfMine){
    this.guessMode=true; this.guessSecs=60;
    const banner=document.getElementById('dwGuessBanner'); banner.style.display='block';
    const iAmDrawer = by===ID.role;
    if(iAmDrawer) this.guessWord = wordIfMine;
    clearInterval(this.guessTimer);
    this.guessTimer=setInterval(()=>{
      this.guessSecs--;
      banner.textContent = iAmDrawer ? `🎯 Draw: ${this.guessWord} — ${this.guessSecs}s` : `🤔 Guess what's being drawn! — ${this.guessSecs}s`;
      if(this.guessSecs<=0){ clearInterval(this.guessTimer); banner.textContent = iAmDrawer ? `Time's up! It was: ${this.guessWord}` : `Time's up!`; if(iAmDrawer) GameCore.addXP(10); setTimeout(()=>{ this.guessMode=false; banner.style.display='none'; },2500); }
    },1000);
  }
};

      <div class="tod-card-type">${c.type==='truth'?'💬 Truth':'🎯 Dare'} · ${TOD_CATS.find(x=>x.id===c.cat).name}</div>
      <div class="tod-card-text" id="todCardText">${esc(c.text)}</div>
      <div class="tod-timer-ring" id="todTimerRing"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/><circle id="todTimerCircle" cx="20" cy="20" r="17" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="106.8" stroke-dashoffset="0" stroke-linecap="round"/></svg></div>
      <div class="tod-reactions">
        ${['😂','😍','😳','🔥','👏'].map(e=>`<button class="tod-react-btn" onclick="TOD.react('${e}')">${e}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn btn-glass btn-sm" onclick="TOD.speakCard()">🔊 Read</button>
        <button class="btn btn-glass btn-sm" onclick="TOD.penalty()">😅 Skip (penalty)</button>
        <button class="btn btn-accent btn-sm" onclick="TOD.completeCard()">✅ Done!</button>
      </div>
    </div>`;
  },
  startCardTimer(){
    clearInterval(this.timerInt); let secs=45;
    this.timerInt=setInterval(()=>{
      secs--; const el=document.getElementById('todTimerCircle');
      if(el){ const off=106.8*(1-secs/45); el.setAttribute('stroke-dashoffset',off); }
      if(secs<=0){ clearInterval(this.timerInt); this.penalty(); }
    },1000);
  },
  speakCard(){
    if(!('speechSynthesis' in window)){ toast('Voice not supported on this browser'); return; }
    const u=new SpeechSynthesisUtterance(this.state.current.text); u.rate=0.95; u.pitch=1.05;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  },
  react(emoji){ this.chan.send({type:'react',emoji}); this.floatEmoji(emoji); },
  floatEmoji(emoji){
    const el=document.createElement('div'); el.className='tod-float-emoji'; el.textContent=emoji;
    el.style.left=(40+Math.random()*20)+'vw'; el.style.bottom='120px';
    document.body.appendChild(el); setTimeout(()=>el.remove(),2000);
  },
  completeCard(){
    clearInterval(this.timerInt);
    this.state.streak++; this.state.history.push(this.state.current);
    GameCore.me().todCount=(GameCore.me().todCount||0)+1;
    GameCore.me().todStreak=this.state.streak;
    GameCore.me().todBestStreak=Math.max(GameCore.me().todBestStreak||0,this.state.streak);
    if(GameCore.me().todCount>=25) GameCore.unlock('tod_25');
    if(this.state.streak>=10) GameCore.unlock('tod_streak10');
    GameCore.addXP(10); GameCore.addCoins(this.state.streak>=5?8:4);
    Hub.completeDailyIfPending('tod'); Snd.success();
    this.chan.send({type:'resolve',streak:this.state.streak,turn:this.nextTurn()});
    this.applyResolve({streak:this.state.streak,turn:this.state.turn===('user1')?'user2':'user1'},true);
  },
  penalty(){
    clearInterval(this.timerInt);
    const pen = rand(TOD_PENALTIES);
    Snd.fail(); this.state.streak=0;
    showReward('😅','Penalty Time!',[pen]);
    this.chan.send({type:'resolve',streak:0,turn:this.nextTurn()});
    this.applyResolve({streak:0,turn:this.state.turn==='user1'?'user2':'user1'},true);
  },
  nextTurn(){ return this.state.turn==='user1'?'user2':'user1'; },
  applyResolve(payload,isLocal){
    this.state.streak=payload.streak; this.state.turn=payload.turn; this.state.current=null;
    this.render(); if(isLocal) this.sync();
  },
  addCustom(){
    const inp=document.getElementById('todCustomIn'); const type=document.getElementById('todCustomType').value;
    const text=inp.value.trim(); if(!text) return;
    this.state.custom.push({type,text}); inp.value=''; this.sync(); this.render(); Snd.tap(); toast('Added to your question pool ✨');
  },
  delCustom(i){ this.state.custom.splice(i,1); this.sync(); this.render(); },
  async aiGenerate(){
    toast('✨ Generating with AI…');
    try{
      const prompt = `Generate one fun, tasteful ${rand(['truth question','dare challenge'])} for a couple's Truth or Dare game in the "${this.category}" mood (romantic/cute/funny/deep/hot/adventure — keep it appropriate for a general audience, no explicit content). Reply with ONLY the question/dare text, one sentence, no preamble.`;
      const res = await fetch(AI_API+'/api/ai/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:prompt,myName:ID.myName,partnerName:ID.partnerName})});
      const data = await res.json();
      const text = (data.reply||'').split('\\n')[0].replace(/^["']|["']$/g,'').trim();
      if(text){ this.state.custom.push({type:Math.random()<0.5?'truth':'dare',text}); this.sync(); this.render(); toast('AI question added! ✨'); }
      else toast('AI is unavailable right now — try again later');
    }catch(e){ toast('AI generation failed — check your connection'); }
  }
};
