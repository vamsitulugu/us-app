<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dream Goals 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --h: 215;
  --accent: hsl(var(--h),100%,62%);
  --accent-d: hsl(var(--h),95%,50%);
  --accent-l: hsl(var(--h),100%,78%);
  --accent-glow: hsla(var(--h),100%,62%,0.35);
  --accent2: hsl(300,85%,65%);
  --accent2-d: hsl(300,80%,52%);
  --accent2-glow: hsla(300,85%,65%,0.35);
  --g1: rgba(255,255,255,0.04);
  --g2: rgba(255,255,255,0.08);
  --g3: rgba(255,255,255,0.13);
  --blur: blur(24px) saturate(180%);
  --blur-sm: blur(12px) saturate(150%);
  --ff-serif: 'DM Serif Display',Georgia,serif;
  --ff-sans: 'Inter',system-ui,sans-serif;
  --r: 18px; --rs: 12px; --rss: 8px;
  --white: #ffffff;
  --text: rgba(255,255,255,0.92);
  --text2: rgba(255,255,255,0.62);
  --text3: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.18);
  --green: #34d399; --green-bg: rgba(52,211,153,0.15);
  --red: #f87171; --red-bg: rgba(248,113,113,0.15);
  --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.15);
  --t: all 0.22s cubic-bezier(0.4,0,0.2,1);
  --t-spring: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ff-sans);color:var(--text);min-height:100vh;background:transparent;line-height:1.5}

/* ── HEADER STATS ── */
.dg-hero{
  padding:20px 16px 0;
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:18px;
}
.dg-stat{
  background:var(--g1);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 10px;text-align:center;backdrop-filter:var(--blur);
  transition:var(--t);
}
.dg-stat:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2)}
.dg-stat-n{font-family:var(--ff-serif);font-size:26px;color:var(--white);line-height:1}
.dg-stat-l{font-size:9px;color:var(--text3);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
@media(max-width:500px){.dg-hero{grid-template-columns:repeat(2,1fr)}}
/* ── GOAL ANALYTICS ── */
.ga-insight-card{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;background:linear-gradient(135deg,var(--accent-glow),var(--accent2-glow));border:1px solid var(--border2);border-radius:var(--r);margin:0 16px 18px;backdrop-filter:var(--blur-sm)}
.ga-insight-ico{font-size:20px;flex-shrink:0}
.ga-insight-text{font-size:12px;color:var(--text2);line-height:1.55}
.ga-insight-text strong{color:var(--white)}
.ga-cat-card{margin:0 16px 18px;background:var(--g1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;backdrop-filter:var(--blur-sm)}
.ga-cat-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;font-weight:600}
.ga-cat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.ga-cat-bar-wrap{flex:1;height:6px;background:var(--g2);border-radius:3px;margin:0 10px;overflow:hidden}
.ga-cat-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1)}

/* ── TABS ── */
.dg-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 16px}
.dg-tabs::-webkit-scrollbar{display:none}
.dg-tab{padding:13px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:var(--t);margin-bottom:-1px}
.dg-tab:hover{color:var(--white)}
.dg-tab.active{color:var(--white);border-bottom-color:var(--accent)}
.dg-tab.partner-tab.active{border-bottom-color:var(--accent2)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:7px;padding:14px 16px 10px;overflow-x:auto;scrollbar-width:none;align-items:center}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--g1);color:var(--text2);transition:var(--t);flex-shrink:0}
.filter-chip:hover{background:var(--g2);color:var(--white)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}
.filter-chip.cat-active{background:var(--accent2);border-color:var(--accent2);color:#fff;box-shadow:0 2px 10px var(--accent2-glow)}
.add-btn-fab{
  padding:8px 18px;border-radius:20px;border:none;cursor:pointer;
  font-family:var(--ff-sans);font-size:12px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent-d));
  color:#fff;box-shadow:0 4px 14px var(--accent-glow);
  transition:var(--t-spring);white-space:nowrap;flex-shrink:0;margin-left:auto;
}
.add-btn-fab:hover{filter:brightness(1.1);transform:translateY(-1px)}

/* ── DREAM CARDS GRID ── */
.dreams-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;padding:0 16px 20px;
}
@media(max-width:600px){.dreams-grid{grid-template-columns:1fr}}

/* ── SINGLE DREAM CARD ── */
.dream-card{
  border-radius:20px;border:1px solid var(--border);
  background:var(--g1);backdrop-filter:var(--blur);
  padding:18px;position:relative;overflow:hidden;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s;
}
.dream-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
.dream-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-accent,linear-gradient(90deg,var(--accent),var(--accent2)));
}
.dream-card.completed{opacity:0.75}
.dream-card.completed::before{background:linear-gradient(90deg,var(--green),#059669)}
.dc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.dc-emoji{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:var(--g2);border:1px solid var(--border);
}
.dc-meta{flex:1;min-width:0}
.dc-title{font-size:14px;font-weight:600;color:var(--white);line-height:1.4;margin-bottom:4px}
.dc-title.done{text-decoration:line-through;color:var(--text3)}
.dc-badges{display:flex;gap:5px;flex-wrap:wrap}
.dc-badge{padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:0.3px}
.dc-desc{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:12px}
.dc-target{font-size:11px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:5px}

/* PROGRESS BAR */
.dc-progress-wrap{margin-bottom:12px}
.dc-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.dc-progress-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.dc-progress-pct{font-size:11px;font-weight:700;color:var(--white)}
.dc-progress-bar{height:6px;border-radius:3px;background:var(--g2);overflow:hidden;cursor:pointer;position:relative}
.dc-progress-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);position:relative}
.dc-progress-fill::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:inherit;box-shadow:0 0 8px rgba(255,255,255,0.3)}

/* ACTIONS */
.dc-actions{display:flex;gap:6px;flex-wrap:wrap}
.dc-action{padding:6px 12px;border-radius:10px;border:none;cursor:pointer;font-family:var(--ff-sans);font-size:11px;font-weight:600;transition:var(--t-spring)}
.dc-action:active{transform:scale(0.95)}
.dc-action.complete{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
.dc-action.edit{background:var(--g2);color:var(--text2);border:1px solid var(--border)}
.dc-action.delete{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.dc-action.progress{background:hsla(var(--h),100%,62%,0.12);color:var(--accent);border:1px solid hsla(var(--h),100%,62%,0.25)}
.dc-action:hover{filter:brightness(1.15);transform:translateY(-1px)}

/* PRIORITY */
.priority-high{background:rgba(248,113,113,0.15);color:var(--red);border-color:rgba(248,113,113,0.3)}
.priority-medium{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(251,191,36,0.3)}
.priority-low{background:var(--green-bg);color:var(--green);border-color:rgba(52,211,153,0.3)}

/* STATUS */
.status-notstarted{background:var(--g2);color:var(--text3);border:1px solid var(--border)}
.status-inprogress{background:hsla(var(--h),100%,62%,0.12);color:var(--accent);border:1px solid hsla(var(--h),100%,62%,0.25)}
.status-completed{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.3)}

/* ── COMPLETED SECTION ── */
.completed-toggle{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  cursor:pointer;border-top:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--text2);
  transition:var(--t);user-select:none;
}
.completed-toggle:hover{color:var(--white);background:var(--g1)}
.completed-toggle .arrow{transition:var(--t);font-size:12px}
.completed-toggle.open .arrow{transform:rotate(90deg)}
.completed-section{display:none;padding:0 16px 16px}
.completed-section.open{display:block}

/* ── MODAL ── */
.dg-modal-bg{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;padding:16px;
  overflow-y:auto;
}
.dg-modal-bg.open{display:flex}
.dg-modal{
  background:rgba(8,8,20,0.92);backdrop-filter:blur(30px) saturate(200%);
  border:1px solid var(--border2);border-radius:22px;
  width:100%;max-width:480px;padding:24px;color:var(--white);
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
  animation:modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  margin:auto;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dg-modal-title{font-family:var(--ff-serif);font-size:20px;color:var(--white);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.dg-modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:2px 6px;border-radius:6px;transition:var(--t)}
.dg-modal-close:hover{background:var(--g1);color:var(--white)}
.dg-field{margin-bottom:13px}
.dg-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px}
.dg-field input,.dg-field textarea,.dg-field select{
  width:100%;background:var(--g1);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;font-size:13px;color:var(--white);font-family:var(--ff-sans);outline:none;transition:var(--t);
}
.dg-field textarea{resize:vertical;min-height:72px;line-height:1.6}
.dg-field input:focus,.dg-field textarea:focus,.dg-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.dg-field select option{background:#0d0d1f;color:#fff}
.dg-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dg-save-btn{
  width:100%;padding:13px;border-radius:13px;border:none;cursor:pointer;
  font-family:var(--ff-sans);font-size:14px;font-weight:600;
  background:linear-gradient(135deg,var(--accent),var(--accent-d));
  color:#fff;box-shadow:0 6px 20px var(--accent-glow);transition:var(--t);margin-top:6px;
}
.dg-save-btn:hover{filter:brightness(1.1)}

/* EMOJI PICKER */
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;padding:6px 0}
.emoji-pick{font-size:22px;cursor:pointer;padding:6px;border-radius:8px;transition:var(--t);border:2px solid transparent}
.emoji-pick:hover{background:var(--g2)}
.emoji-pick.sel{border-color:var(--accent);background:hsla(var(--h),100%,62%,0.1)}

/* PROGRESS SLIDER */
.progress-slider{width:100%;accent-color:var(--accent);cursor:pointer;height:4px}

/* EMPTY */
.dg-empty{text-align:center;padding:48px 20px}
.dg-empty-ico{font-size:52px;margin-bottom:12px}
.dg-empty-text{font-size:13px;color:var(--text3);line-height:1.7}

/* CELEBRATION OVERLAY */
#celebOverlay{
  position:fixed;inset:0;z-index:9999;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.celeb-card{
  background:rgba(8,8,20,0.92);backdrop-filter:blur(30px);
  border:1px solid rgba(52,211,153,0.4);border-radius:24px;
  padding:36px 44px;text-align:center;
  animation:celebPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 0 60px rgba(52,211,153,0.3);
}
@keyframes celebPop{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.celeb-emoji{font-size:64px;margin-bottom:12px}
.celeb-title{font-family:var(--ff-serif);font-size:24px;color:var(--green);margin-bottom:6px}
.celeb-sub{font-size:13px;color:var(--text2)}

/* PARTNER SECTION INDICATOR */
.partner-indicator{
  margin:0 16px 14px;padding:12px 14px;border-radius:12px;
  background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);
  font-size:12px;color:rgba(167,139,250,0.9);display:flex;align-items:center;gap:8px;
}
</style>
<link rel="stylesheet" href="/theme-burgundy.css">
<link rel="stylesheet" href="/premium-motion.css">
<link rel="stylesheet" href="/premium-states.css">
  <link rel="stylesheet" href="/responsive-fix.css">
</head>
<body>

<!-- ═══ STATS HERO ═══ -->
<div class="dg-hero" id="dgHero"></div>
<div class="ga-insight-card" id="gaInsightCard"></div>
<div class="ga-cat-card" id="gaCatCardWrap" style="display:none">
  <div class="ga-cat-title">🌟 Goals by Category</div>
  <div id="gaCatCard"></div>
</div>

<!-- ═══ TABS ═══ -->
<div class="dg-tabs">
  <div class="dg-tab active" onclick="switchDGTab('my',this)">❤️ My Dreams</div>
  <div class="dg-tab partner-tab" onclick="switchDGTab('partner',this)">💜 Partner's Dreams</div>
  <div class="dg-tab" onclick="switchDGTab('shared',this)">✨ Shared Goals</div>
</div>

<!-- ═══ SECTIONS ═══ -->
<div id="dg-section-my">
  <div class="filter-bar" id="myFilterBar"></div>
  <div class="dreams-grid" id="myDreamsGrid"></div>
  <div class="completed-toggle" id="myCompletedToggle" onclick="toggleCompleted('my')">
    <span class="arrow">›</span>
    <span>Completed Goals</span>
    <span class="completed-count" id="myCompletedCount" style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">0</span>
  </div>
  <div class="completed-section" id="myCompletedSection">
    <div class="dreams-grid" id="myCompletedGrid"></div>
  </div>
</div>

<div id="dg-section-partner" style="display:none">
  <div class="partner-indicator">💜 These are <strong id="ptNameLabel">Partner</strong>'s personal dreams — view and cheer them on!</div>
  <div class="filter-bar" id="ptFilterBar"></div>
  <div class="dreams-grid" id="ptDreamsGrid"></div>
  <div class="completed-toggle" id="ptCompletedToggle" onclick="toggleCompleted('partner')">
    <span class="arrow">›</span>
    <span>Partner's Completed Goals</span>
    <span class="completed-count" id="ptCompletedCount" style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">0</span>
  </div>
  <div class="completed-section" id="ptCompletedSection">
    <div class="dreams-grid" id="ptCompletedGrid"></div>
  </div>
</div>

<div id="dg-section-shared" style="display:none">
  <div class="filter-bar" id="sharedFilterBar"></div>
  <div class="dreams-grid" id="sharedDreamsGrid"></div>
  <div class="completed-toggle" id="sharedCompletedToggle" onclick="toggleCompleted('shared')">
    <span class="arrow">›</span>
    <span>Completed Together</span>
    <span class="completed-count" id="sharedCompletedCount" style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">0</span>
  </div>
  <div class="completed-section" id="sharedCompletedSection">
    <div class="dreams-grid" id="sharedCompletedGrid"></div>
  </div>
</div>

<!-- ═══ ADD/EDIT MODAL ═══ -->
<div class="dg-modal-bg" id="dgModal">
  <div class="dg-modal">
    <div class="dg-modal-title">
      <span id="dgModalTitle">🌟 New Dream</span>
      <button class="dg-modal-close" onclick="closeDGModal()">✕</button>
    </div>

    <div class="dg-field">
      <label>Choose an Emoji</label>
      <div class="emoji-row" id="emojiPickerRow"></div>
    </div>
    <input type="hidden" id="dgEmoji" value="🌟">

    <div class="dg-field">
      <label>Dream Title *</label>
      <input type="text" id="dgTitle" placeholder="What's your dream?" autocomplete="off">
    </div>

    <div class="dg-field">
      <label>Description</label>
      <textarea id="dgDesc" placeholder="Describe your dream in detail..."></textarea>
    </div>

    <div class="dg-row2">
      <div class="dg-field">
        <label>Category</label>
        <select id="dgCat">
          <option value="Career">💼 Career</option>
          <option value="Travel">✈️ Travel</option>
          <option value="Health">💪 Health</option>
          <option value="Finance">💰 Finance</option>
          <option value="Education">📚 Education</option>
          <option value="Relationship">💕 Relationship</option>
          <option value="Creative">🎨 Creative</option>
          <option value="Home">🏠 Home</option>
          <option value="Adventure">🏔️ Adventure</option>
          <option value="Personal">🌱 Personal</option>
          <option value="Family">👨‍👩‍👧 Family</option>
          <option value="Other">💫 Other</option>
        </select>
      </div>
      <div class="dg-field">
        <label>Priority</label>
        <select id="dgPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>

    <div class="dg-row2">
      <div class="dg-field">
        <label>Target Date</label>
        <input type="date" id="dgDate">
      </div>
      <div class="dg-field">
        <label>Status</label>
        <select id="dgStatus">
          <option value="notstarted">⬜ Not Started</option>
          <option value="inprogress">🔵 In Progress</option>
          <option value="completed">✅ Completed</option>
        </select>
      </div>
    </div>

    <div class="dg-field">
      <label>Progress: <span id="dgProgressVal">0</span>%</label>
      <input type="range" class="progress-slider" id="dgProgress" min="0" max="100" value="0"
        oninput="document.getElementById('dgProgressVal').textContent=this.value">
    </div>

    <div class="dg-field">
      <label>Belongs To</label>
      <select id="dgOwner">
        <option value="my">❤️ My Dream</option>
        <option value="partner">💜 Partner's Dream</option>
        <option value="shared">✨ Shared Goal</option>
      </select>
    </div>

    <input type="hidden" id="dgEditId" value="">
    <button class="dg-save-btn" onclick="saveDream()">✨ Save Dream</button>
  </div>
</div>

<!-- ═══ PROGRESS MODAL ═══ -->
<div class="dg-modal-bg" id="progressModal">
  <div class="dg-modal" style="max-width:360px">
    <div class="dg-modal-title">
      📊 Update Progress
      <button class="dg-modal-close" onclick="document.getElementById('progressModal').classList.remove('open')">✕</button>
    </div>
    <div id="progressModalDreamTitle" style="font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5"></div>
    <div class="dg-field">
      <label>Progress: <span id="pmProgressVal">0</span>%</label>
      <input type="range" class="progress-slider" id="pmProgress" min="0" max="100" value="0"
        oninput="document.getElementById('pmProgressVal').textContent=this.value">
    </div>
    <div class="dg-field">
      <label>Status</label>
      <select id="pmStatus">
        <option value="notstarted">⬜ Not Started</option>
        <option value="inprogress">🔵 In Progress</option>
        <option value="completed">✅ Completed</option>
      </select>
    </div>
    <input type="hidden" id="pmDreamId">
    <button class="dg-save-btn" onclick="saveProgress()">Save Progress 📊</button>
  </div>
</div>

<!-- CELEBRATION OVERLAY -->
<div id="celebOverlay" style="display:none"></div>

<!-- TOAST -->
<div id="dgToast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(15,15,15,0.9);backdrop-filter:blur(16px);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);font-family:var(--ff-sans);font-weight:500"></div>

<script>
// ══ STATE ══
let dgState = {
  dreams: [],   // all dreams
  filter: { my:'all', partner:'all', shared:'all' },
  catFilter: { my:'', partner:'', shared:'' },
};

const CATS = {
  Career:'💼', Travel:'✈️', Health:'💪', Finance:'💰', Education:'📚',
  Relationship:'💕', Creative:'🎨', Home:'🏠', Adventure:'🏔️',
  Personal:'🌱', Family:'👨‍👩‍👧', Other:'💫',
};
const CAT_GRADIENTS = {
  Career:'linear-gradient(135deg,#2563eb,#1e40af)',
  Travel:'linear-gradient(135deg,#0891b2,#0e7490)',
  Health:'linear-gradient(135deg,#16a34a,#15803d)',
  Finance:'linear-gradient(135deg,#ca8a04,#a16207)',
  Education:'linear-gradient(135deg,#7c3aed,#6d28d9)',
  Relationship:'linear-gradient(135deg,#db2777,#be185d)',
  Creative:'linear-gradient(135deg,#ea580c,#c2410c)',
  Home:'linear-gradient(135deg,#0f766e,#0d9488)',
  Adventure:'linear-gradient(135deg,#b45309,#92400e)',
  Personal:'linear-gradient(135deg,#6d28d9,#4c1d95)',
  Family:'linear-gradient(135deg,#0369a1,#0c4a6e)',
  Other:'linear-gradient(135deg,#475569,#334155)',
};
const PRIORITY_COLORS = {high:'var(--red)',medium:'var(--yellow)',low:'var(--green)'};
const STATUS_LABELS = {notstarted:'Not Started',inprogress:'In Progress',completed:'Completed'};
const STATUS_CLASSES = {notstarted:'status-notstarted',inprogress:'status-inprogress',completed:'status-completed'};
const PRIORITY_CLASSES = {high:'priority-high',medium:'priority-medium',low:'priority-low'};

const EMOJIS = ['🌟','💫','🎯','🏆','💪','✈️','🏠','💰','📚','🎨','🌱','❤️','💍','🚀','🌍','🎭','🏋️','🎸','🌸','🦋','🎓','💼','🏖️','🏔️','🌈','🎉','💡','🔥','⭐','🌙'];

// ══ PERSIST ══
function saveDGState() {
  try{localStorage.setItem('us_dreamgoals',JSON.stringify(dgState.dreams));}catch(e){}
  // Notify parent
  try{window.parent.postMessage({type:'dreamgoals',dreams:dgState.dreams},'*');}catch(e){}
}
function loadDGState() {
  try{const d=localStorage.getItem('us_dreamgoals');if(d)dgState.dreams=JSON.parse(d);}catch(e){}
  // Also try from parent state
  try{
    const ps=window.parent?.S;
    if(ps?.dreamGoals&&Array.isArray(ps.dreamGoals)&&ps.dreamGoals.length>dgState.dreams.length){
      dgState.dreams=ps.dreamGoals;
    }
  }catch(e){}
}

// ══ TAB SWITCHING ══
let currentDGTab='my';
function switchDGTab(tab,el) {
  currentDGTab=tab;
  document.querySelectorAll('.dg-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['my','partner','shared'].forEach(t=>{document.getElementById('dg-section-'+t).style.display=t===tab?'block':'none';});
  renderSection(tab);
  // Update add button owner
  document.getElementById('dgOwner').value=tab;
}

// ══ FILTER BAR ══
function renderFilterBar(section) {
  const el=document.getElementById(section+'FilterBar');
  if(!el) return;
  const cats=[...new Set(dgState.dreams.filter(d=>d.owner===section).map(d=>d.category))];
  const filters=[
    {key:'all',label:'🌟 All'},
    {key:'inprogress',label:'🔵 In Progress'},
    {key:'high',label:'🔴 High Priority'},
    {key:'notstarted',label:'⬜ Not Started'},
  ];
  el.innerHTML = filters.map(f=>`
    <div class="filter-chip ${dgState.filter[section]===f.key?'active':''}" onclick="setFilter('${section}','${f.key}')">${f.label}</div>
  `).join('') + cats.map(c=>`
    <div class="filter-chip ${dgState.catFilter[section]===c?'cat-active':''}" onclick="setCatFilter('${section}','${c}')">${CATS[c]||'💫'} ${c}</div>
  `).join('') + `<button class="add-btn-fab" onclick="openDGModal('${section}')">+ Add Dream</button>`;
}
function setFilter(section,key) {
  dgState.filter[section]=key;
  dgState.catFilter[section]='';
  renderSection(section);
}
function setCatFilter(section,cat) {
  if(dgState.catFilter[section]===cat) dgState.catFilter[section]='';
  else dgState.catFilter[section]=cat;
  renderSection(section);
}

// ══ STATS HERO ══
function renderStats() {
  const all=dgState.dreams;
  const total=all.length;
  const completed=all.filter(d=>d.status==='completed').length;
  const inprog=all.filter(d=>d.status==='inprogress').length;
  const avgProg=total?Math.round(all.reduce((s,d)=>s+(d.progress||0),0)/total):0;
  document.getElementById('dgHero').innerHTML=`
    <div class="dg-stat"><div class="dg-stat-n">${total}</div><div class="dg-stat-l">Total Dreams</div></div>
    <div class="dg-stat"><div class="dg-stat-n" style="color:var(--accent)">${inprog}</div><div class="dg-stat-l">In Progress</div></div>
    <div class="dg-stat"><div class="dg-stat-n" style="color:var(--green)">${completed}</div><div class="dg-stat-l">Completed</div></div>
    <div class="dg-stat"><div class="dg-stat-n" style="color:var(--yellow)">${avgProg}%</div><div class="dg-stat-l">Avg Progress</div></div>
  `;
  renderGoalAnalytics(all, total, completed, inprog, avgProg);
}

function renderGoalAnalytics(all, total, completed, inprog, avgProg) {
  const insEl = document.getElementById('gaInsightCard');
  const catWrap = document.getElementById('gaCatCardWrap'), catEl = document.getElementById('gaCatCard');
  if (insEl) {
    let text, ico = '💡';
    if (!total) { text = 'Add your first shared dream to start tracking progress together.'; }
    else if (completed === total) { ico = '🌟'; text = `Incredible — you've completed <strong>all ${total}</strong> of your dreams!`; }
    else if (avgProg >= 70) { ico = '🔥'; text = `You're averaging <strong>${avgProg}%</strong> progress — most dreams are close to done.`; }
    else if (inprog > 0) { ico = '🚀'; text = `<strong>${inprog}</strong> dream${inprog === 1 ? ' is' : 's are'} actively in progress, ${completed} completed so far.`; }
    else { ico = '🌱'; text = `You have <strong>${total}</strong> dream${total === 1 ? '' : 's'} logged — start moving one forward today.`; }
    insEl.innerHTML = `<div class="ga-insight-ico">${ico}</div><div class="ga-insight-text">${text}</div>`;
  }
  if (catEl && catWrap) {
    const catCounts = {};
    all.forEach(d => { const c = d.category || 'Other'; catCounts[c] = (catCounts[c] || 0) + 1; });
    const entries = Object.entries(catCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);
    if (!entries.length) { catWrap.style.display = 'none'; }
    else {
      catWrap.style.display = '';
      const max = Math.max(...entries.map(e => e[1]));
      catEl.innerHTML = entries.map(([cat, count]) => `
        <div class="ga-cat-row">
          <span style="font-size:12px;color:var(--text2);min-width:80px">${cat}</span>
          <div class="ga-cat-bar-wrap"><div class="ga-cat-bar" style="width:${Math.round((count / max) * 100)}%"></div></div>
          <span style="font-size:11px;color:var(--text3)">${count}</span>
        </div>`).join('');
    }
  }
}

// ══ RENDER SECTION ══
function renderSection(section) {
  renderFilterBar(section);
  const all=dgState.dreams.filter(d=>d.owner===section);
  const active=filterDreams(all,section);
  const completed=all.filter(d=>d.status==='completed');
  const activeNotComplete=active.filter(d=>d.status!=='completed');

  renderGrid(section+'DreamsGrid', activeNotComplete, section);
  renderGrid(section+'CompletedGrid', completed, section);

  const cc=document.getElementById(section+'CompletedCount');
  if(cc) cc.textContent=completed.length;
  renderStats();
}
function filterDreams(dreams,section) {
  let r=dreams;
  const f=dgState.filter[section];
  const cf=dgState.catFilter[section];
  if(f==='inprogress') r=r.filter(d=>d.status==='inprogress');
  else if(f==='high') r=r.filter(d=>d.priority==='high');
  else if(f==='notstarted') r=r.filter(d=>d.status==='notstarted');
  if(cf) r=r.filter(d=>d.category===cf);
  // Sort: high priority first, then by target date
  return r.sort((a,b)=>{
    const po={high:0,medium:1,low:2};
    if(po[a.priority]!==po[b.priority]) return po[a.priority]-po[b.priority];
    if(a.targetDate&&b.targetDate) return a.targetDate.localeCompare(b.targetDate);
    return b.id-a.id;
  });
}
function renderGrid(gridId, dreams, section) {
  const el=document.getElementById(gridId); if(!el) return;
  if(!dreams.length){
    el.style.gridColumn='1/-1';
    const copy = {
      my:      { title:"You haven't created your first dream yet.", desc:"Big or small — write down something you want to reach for, and track it right here.", action:"Create Dream" },
      partner: { title:"Partner hasn't added dreams here yet.",     desc:"Once they add one, you'll see it here so you can cheer them on.", action:null },
      shared:  { title:"No shared goals yet.",                       desc:"Add something you both want to achieve together — a trip, a milestone, anything.", action:"Add Shared Goal" }
    }[section] || { title:"Nothing here yet.", desc:"", action:"Add" };
    PS.empty(el, {
      icon: 'dream',
      title: copy.title,
      desc: copy.desc,
      actionLabel: copy.action || undefined,
      onAction: copy.action ? function(){ openDGModal(section); } : undefined
    });
    return;
  }
  el.style.gridColumn='';
  el.innerHTML=dreams.map(d=>renderDreamCard(d,section)).join('');
}

function renderDreamCard(d, section) {
  const prog=d.progress||0;
  const isComplete=d.status==='completed';
  const daysLeft=d.targetDate?getDaysLeft(d.targetDate):null;
  const progColor=prog>=100?'var(--green)':prog>=60?'var(--accent)':prog>=30?'var(--yellow)':'var(--red)';
  const gradient=CAT_GRADIENTS[d.category]||CAT_GRADIENTS.Other;

  return `<div class="dream-card${isComplete?' completed':''}" style="--card-accent:${gradient}">
    <div class="dc-top">
      <div class="dc-emoji" style="background:${gradient}">${d.emoji||CATS[d.category]||'🌟'}</div>
      <div class="dc-meta">
        <div class="dc-title${isComplete?' done':''}">${escHtml(d.title)}</div>
        <div class="dc-badges">
          <span class="dc-badge ${PRIORITY_CLASSES[d.priority||'medium']}">${d.priority==='high'?'🔴 High':d.priority==='medium'?'🟡 Medium':'🟢 Low'}</span>
          <span class="dc-badge ${STATUS_CLASSES[d.status||'notstarted']}">${STATUS_LABELS[d.status||'notstarted']}</span>
          <span class="dc-badge" style="background:${CAT_GRADIENTS[d.category]};background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;border:1px solid var(--border);font-weight:700;font-size:9px">${CATS[d.category]||'💫'} ${d.category}</span>
        </div>
      </div>
    </div>

    ${d.description?`<div class="dc-desc">${escHtml(d.description)}</div>`:''}

    ${d.targetDate?`<div class="dc-target">
      📅 ${fmtDate(d.targetDate)}
      ${daysLeft!==null?`<span style="color:${daysLeft<0?'var(--red)':daysLeft<30?'var(--yellow)':'var(--green)'};font-weight:600">${daysLeft<0?'· '+Math.abs(daysLeft)+' days overdue':'· '+daysLeft+' days left'}</span>`:''}
    </div>`:''}

    <div class="dc-progress-wrap">
      <div class="dc-progress-header">
        <span class="dc-progress-label">Progress</span>
        <span class="dc-progress-pct">${prog}%</span>
      </div>
      <div class="dc-progress-bar" onclick="openProgressModal('${d.id}')">
        <div class="dc-progress-fill" style="width:${prog}%;background:${progColor}"></div>
      </div>
    </div>

    <div class="dc-actions">
      ${!isComplete?`<button class="dc-action progress" onclick="openProgressModal('${d.id}')">📊 Progress</button>`:''}
      ${!isComplete?`<button class="dc-action complete" onclick="markComplete('${d.id}')">✅ Done!</button>`:'<span style="font-size:11px;color:var(--green);font-weight:600">🎉 Completed!</span>'}
      <button class="dc-action edit" onclick="openEditModal('${d.id}')">✏️</button>
      <button class="dc-action delete" onclick="deleteDream('${d.id}')">🗑️</button>
    </div>
  </div>`;
}

function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(s){try{return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s}}
function getDaysLeft(dateStr){
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(dateStr+'T00:00:00');
  return Math.ceil((target-today)/86400000);
}

// ══ MODAL ══
function openDGModal(owner) {
  document.getElementById('dgModalTitle').textContent='🌟 New Dream';
  document.getElementById('dgTitle').value='';
  document.getElementById('dgDesc').value='';
  document.getElementById('dgCat').value='Personal';
  document.getElementById('dgPriority').value='medium';
  document.getElementById('dgStatus').value='notstarted';
  document.getElementById('dgDate').value='';
  document.getElementById('dgProgress').value=0;
  document.getElementById('dgProgressVal').textContent=0;
  document.getElementById('dgOwner').value=owner||currentDGTab;
  document.getElementById('dgEditId').value='';
  document.getElementById('dgEmoji').value='🌟';
  renderEmojiPicker('🌟');
  document.getElementById('dgModal').classList.add('open');
}
function openEditModal(id) {
  const d=dgState.dreams.find(x=>x.id===id); if(!d) return;
  document.getElementById('dgModalTitle').textContent='✏️ Edit Dream';
  document.getElementById('dgTitle').value=d.title||'';
  document.getElementById('dgDesc').value=d.description||'';
  document.getElementById('dgCat').value=d.category||'Personal';
  document.getElementById('dgPriority').value=d.priority||'medium';
  document.getElementById('dgStatus').value=d.status||'notstarted';
  document.getElementById('dgDate').value=d.targetDate||'';
  document.getElementById('dgProgress').value=d.progress||0;
  document.getElementById('dgProgressVal').textContent=d.progress||0;
  document.getElementById('dgOwner').value=d.owner||currentDGTab;
  document.getElementById('dgEditId').value=id;
  document.getElementById('dgEmoji').value=d.emoji||'🌟';
  renderEmojiPicker(d.emoji||'🌟');
  document.getElementById('dgModal').classList.add('open');
}
function closeDGModal() { document.getElementById('dgModal').classList.remove('open'); }

function renderEmojiPicker(selected) {
  document.getElementById('emojiPickerRow').innerHTML=EMOJIS.map(e=>`
    <div class="emoji-pick${e===selected?' sel':''}" onclick="selectEmoji('${e}')">${e}</div>
  `).join('');
}
function selectEmoji(e) {
  document.getElementById('dgEmoji').value=e;
  document.querySelectorAll('.emoji-pick').forEach(el=>el.classList.toggle('sel',el.textContent===e));
}
window.selectEmoji=selectEmoji;

function saveDream() {
  const title=document.getElementById('dgTitle').value.trim();
  if(!title){showDGToast('Please enter a dream title ⚠️');return;}
  const editId=document.getElementById('dgEditId').value;
  const progress=parseInt(document.getElementById('dgProgress').value)||0;
  const status=document.getElementById('dgStatus').value;
  const dream={
    id:editId||String(Date.now()),
    title,
    description:document.getElementById('dgDesc').value.trim(),
    category:document.getElementById('dgCat').value,
    priority:document.getElementById('dgPriority').value,
    status:progress>=100?'completed':status,
    targetDate:document.getElementById('dgDate').value,
    progress:progress>=100?100:progress,
    owner:document.getElementById('dgOwner').value,
    emoji:document.getElementById('dgEmoji').value||CATS[document.getElementById('dgCat').value]||'🌟',
    createdAt:editId?(dgState.dreams.find(d=>d.id===editId)?.createdAt||Date.now()):Date.now(),
    updatedAt:Date.now(),
  };
  if(editId){const idx=dgState.dreams.findIndex(d=>d.id===editId);if(idx>-1)dgState.dreams[idx]=dream;}
  else dgState.dreams.push(dream);
  saveDGState();
  closeDGModal();
  renderSection(dream.owner);
  renderStats();
  showDGToast(editId?'Dream updated! ✨':'New dream added! 🌟');
  if(dream.status==='completed') showCelebration(dream);
}

// ══ PROGRESS MODAL ══
function openProgressModal(id) {
  const d=dgState.dreams.find(x=>x.id===id); if(!d) return;
  document.getElementById('pmDreamId').value=id;
  document.getElementById('pmProgress').value=d.progress||0;
  document.getElementById('pmProgressVal').textContent=d.progress||0;
  document.getElementById('pmStatus').value=d.status||'notstarted';
  document.getElementById('progressModalDreamTitle').innerHTML=`<strong style="color:var(--white)">${escHtml(d.emoji)} ${escHtml(d.title)}</strong><br><span style="font-size:11px;color:var(--text3)">${CATS[d.category]||''} ${d.category}</span>`;
  document.getElementById('progressModal').classList.add('open');
}
function saveProgress() {
  const id=document.getElementById('pmDreamId').value;
  const d=dgState.dreams.find(x=>x.id===id); if(!d) return;
  const prog=parseInt(document.getElementById('pmProgress').value)||0;
  const wasDone=d.status==='completed';
  d.progress=prog;
  d.status=prog>=100?'completed':document.getElementById('pmStatus').value;
  d.updatedAt=Date.now();
  saveDGState();
  document.getElementById('progressModal').classList.remove('open');
  renderSection(d.owner);
  renderStats();
  showDGToast('Progress updated! 📊');
  if(!wasDone&&d.status==='completed') showCelebration(d);
}
window.saveProgress=saveProgress;

// ══ MARK COMPLETE ══
function markComplete(id) {
  const d=dgState.dreams.find(x=>x.id===id); if(!d) return;
  const wasDone=d.status==='completed';
  d.status='completed';d.progress=100;d.updatedAt=Date.now();
  saveDGState();
  renderSection(d.owner);renderStats();
  if(!wasDone) showCelebration(d);
}
window.markComplete=markComplete;

// ══ DELETE ══
function deleteDream(id) {
  if(!confirm('Delete this dream?')) return;
  dgState.dreams=dgState.dreams.filter(d=>d.id!==id);
  saveDGState();
  renderSection(currentDGTab);renderStats();
  showDGToast('Dream removed');
}
window.deleteDream=deleteDream;

// ══ CELEBRATION ══
function showCelebration(dream) {
  const overlay=document.getElementById('celebOverlay');
  overlay.style.display='flex';
  overlay.innerHTML=`<div class="celeb-card">
    <div class="celeb-emoji">${dream.emoji||'🏆'}</div>
    <div class="celeb-title">Dream Achieved! 🎉</div>
    <div class="celeb-sub">"${escHtml(dream.title)}"<br>You did it! 💚</div>
  </div>`;
  spawnPetals();
  setTimeout(()=>{overlay.style.display='none';overlay.innerHTML='';},4000);
}
function spawnPetals() {
  const particles=['💕','❤️','✨','💫','🌟','🎉','🏆'];
  for(let i=0;i<14;i++) setTimeout(()=>{
    const p=document.createElement('div');
    const em=particles[Math.floor(Math.random()*particles.length)];
    const x=10+Math.random()*80;const dur=1.8+Math.random()*1.5;
    p.style.cssText=`position:fixed;pointer-events:none;z-index:10000;font-size:${14+Math.random()*12}px;left:${x}vw;bottom:10%;animation:riseUp ${dur}s cubic-bezier(0.16,1,0.3,1) forwards;--rot:${Math.random()>0.5?'360deg':'-360deg'}`;
    p.textContent=em;
    if(!document.getElementById('riseStyle')){const s=document.createElement('style');s.id='riseStyle';s.textContent=`@keyframes riseUp{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(-100vh) rotate(var(--rot)) scale(0.3);opacity:0}}`;document.head.appendChild(s);}
    document.body.appendChild(p);setTimeout(()=>p.remove(),(dur+0.2)*1000);
  },i*100);
}

// ══ COMPLETED TOGGLE ══
function toggleCompleted(section) {
  const toggle=document.getElementById(section+'CompletedToggle');
  const sec=document.getElementById(section+'CompletedSection');
  toggle.classList.toggle('open');
  sec.classList.toggle('open');
}
window.toggleCompleted=toggleCompleted;

// ══ TOAST ══
let dgToastTimer;
function showDGToast(msg) {
  const t=document.getElementById('dgToast');
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(dgToastTimer);
  dgToastTimer=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(12px)';},2800);
}

// ══ MODAL CLOSE ══
document.getElementById('dgModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDGModal();});
document.getElementById('progressModal').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('progressModal').classList.remove('open');});

// ══ LISTEN FROM PARENT ══
window.addEventListener('message',e=>{
  if(e.data?.type==='theme'){
    const r=document.documentElement;
    Object.entries(e.data.vars||{}).forEach(([k,v])=>r.style.setProperty(k,v));
  }
  if(e.data?.type==='names'){
    const el=document.getElementById('ptNameLabel');
    if(el) el.textContent=e.data.partner||'Partner';
  }
  if(e.data?.type==='syncDreams'&&e.data.dreams){
    dgState.dreams=e.data.dreams;
    renderAll();
  }
});

// ══ EXPOSE GLOBALS ══
window.openDGModal=openDGModal;
window.openEditModal=openEditModal;
window.closeDGModal=closeDGModal;
window.saveDream=saveDream;
window.openProgressModal=openProgressModal;
window.setFilter=setFilter;
window.setCatFilter=setCatFilter;
window.switchDGTab=switchDGTab;

function renderAll() {
  renderStats();
  renderSection('my');
  renderSection('partner');
  renderSection('shared');
}

// ══ INIT ══
loadDGState();
renderAll();
</script>
<script src="/premium-motion.js"></script>
<script src="/premium-states.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
