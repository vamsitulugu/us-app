<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Memory Globe</title>
  <style>
    /* ══════ RESET & ROOT ══════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --h: 215;
      --accent: hsl(var(--h),100%,62%);
      --accent-d: hsl(var(--h),95%,50%);
      --accent-l: hsl(var(--h),100%,78%);
      --accent-glow: hsla(var(--h),100%,62%,0.35);
      --accent2: hsl(300,85%,65%);
      --accent2-d: hsl(300,80%,52%);
      --accent2-glow: hsla(300,85%,65%,0.35);
      --g1: rgba(255,255,255,0.04);
      --g2: rgba(255,255,255,0.08);
      --g3: rgba(255,255,255,0.13);
      --blur: blur(24px) saturate(180%);
      --blur-sm: blur(12px) saturate(150%);
      --ff-serif: 'DM Serif Display', Georgia, serif;
      --ff-sans: 'Inter', system-ui, sans-serif;
      --r: 18px; --rs: 12px; --rss: 8px;
      --white: #ffffff;
      --text: rgba(255,255,255,0.92);
      --text2: rgba(255,255,255,0.62);
      --text3: rgba(255,255,255,0.38);
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --green: #34d399; --green-bg: rgba(52,211,153,0.15);
      --red: #f87171; --red-bg: rgba(248,113,113,0.15);
      --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.15);
      --t: all 0.22s cubic-bezier(0.4,0,0.2,1);
      --t-spring: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 15px;
    }
    body {
      font-family: var(--ff-sans);
      color: var(--text);
      background: #020209;
      height: 100dvh;
      overflow: hidden;
      line-height: 1.5;
    }
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap');

    /* ══════ LAYOUT ══════ */
    #app { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }

    /* ══════ GLOBE CANVAS ══════ */
    #globeCanvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      cursor: grab; touch-action: none;
    }
    #globeCanvas:active { cursor: grabbing; }

    /* ══════ STARS ══════ */
    #stars {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden;
    }

    /* ══════ TOP BAR ══════ */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 50;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(2,2,9,0.85) 0%, transparent 100%);
    }
    .top-title {
      font-family: var(--ff-serif);
      font-size: 22px; color: var(--white);
      display: flex; align-items: center; gap: 10px;
    }
    .top-title .globe-ico {
      width: 38px; height: 38px; border-radius: 12px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 14px var(--accent-glow);
      animation: globePulse 3s ease-in-out infinite;
    }
    @keyframes globePulse {
      0%,100%{transform:scale(1) rotate(0deg)}
      50%{transform:scale(1.08) rotate(5deg)}
    }
    .top-actions { display: flex; gap: 8px; }
    .ic-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border2);
      color: var(--white); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: var(--t);
    }
    .ic-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.08); }

    /* ══════ BOTTOM STATS BAR ══════ */
    .stats-bar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
      padding: 16px 20px 24px;
      background: linear-gradient(to top, rgba(2,2,9,0.92) 0%, transparent 100%);
    }
    .stats-row {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 2px;
    }
    .stats-row::-webkit-scrollbar { height: 0; }
    .stat-chip {
      flex-shrink: 0; padding: 8px 14px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border2);
      border-radius: 20px;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text2);
      cursor: pointer; transition: var(--t);
    }
    .stat-chip:hover { background: rgba(255,255,255,0.12); color: var(--white); }
    .stat-chip .val { font-weight: 700; color: var(--white); font-size: 13px; }
    .add-memory-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 20px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border: none; border-radius: 24px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: var(--t-spring);
      font-family: var(--ff-sans);
      box-shadow: 0 6px 20px var(--accent-glow);
      margin-top: 10px; width: 100%;
      justify-content: center;
    }
    .add-memory-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .add-memory-btn:active { transform: scale(0.96); }

    /* ══════ VIEW TOGGLE ══════ */
    .view-toggle {
      position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
      z-index: 50; display: flex; gap: 2px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border2);
      border-radius: 24px; padding: 4px;
    }
    .vt-btn {
      padding: 7px 16px; border-radius: 20px; font-size: 11px;
      font-weight: 600; cursor: pointer; transition: var(--t);
      background: none; border: none; color: var(--text2);
      font-family: var(--ff-sans); white-space: nowrap;
    }
    .vt-btn.active {
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      color: #fff; box-shadow: 0 2px 10px var(--accent-glow);
    }

    /* ══════ CITY TOOLTIP (on hover) ══════ */
    #cityTooltip {
      position: fixed; z-index: 200; pointer-events: none;
      background: rgba(10,10,25,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border2);
      border-radius: 14px; padding: 10px 14px;
      font-size: 12px; color: var(--white);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.15s;
      max-width: 220px;
    }
    #cityTooltip.show { opacity: 1; }
    #cityTooltip .tt-city { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    #cityTooltip .tt-meta { color: var(--text3); font-size: 10px; }
    #cityTooltip .tt-count { color: var(--accent); font-size: 11px; font-weight: 600; margin-top: 3px; }

    /* ══════ GLASS PANEL (side) ══════ */
    .glass-panel {
      position: absolute; top: 0; right: -420px; bottom: 0;
      width: 400px; z-index: 100;
      background: rgba(6,6,18,0.88);
      backdrop-filter: blur(30px) saturate(200%);
      border-left: 1px solid var(--border2);
      display: flex; flex-direction: column;
      transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .glass-panel.open { right: 0; }
    @media(max-width:700px) {
      .glass-panel {
        width: 100%; right: 0; top: auto; bottom: -100%;
        height: 82dvh; border-left: none;
        border-top: 1px solid var(--border2);
        border-radius: 24px 24px 0 0;
        transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1);
      }
      .glass-panel.open { bottom: 0; right: 0; }
    }

    /* Panel header */
    .panel-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header .drag-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border2); margin: 0 auto 14px;
      display: none;
    }
    @media(max-width:700px) { .panel-header .drag-handle { display: block; } }
    .panel-title {
      font-family: var(--ff-serif); font-size: 20px; color: var(--white);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-close {
      background: none; border: none; color: var(--text2);
      font-size: 20px; cursor: pointer; padding: 2px 6px;
      border-radius: 6px; transition: var(--t);
    }
    .panel-close:hover { background: var(--g1); color: var(--white); }

    .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

    /* ══════ CITY MEMORIES LIST PANEL ══════ */
    .city-header {
      display: flex; gap: 12px; align-items: flex-start;
      margin-bottom: 16px;
    }
    .city-flag { font-size: 36px; }
    .city-info .city-name { font-family: var(--ff-serif); font-size: 20px; color: var(--white); }
    .city-info .city-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .memory-card {
      background: var(--g1); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px; margin-bottom: 10px;
      cursor: pointer; transition: var(--t);
      position: relative; overflow: hidden;
    }
    .memory-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,var(--accent-glow),transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .memory-card:hover::before { opacity: 1; }
    .memory-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .mc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .mc-trip { font-weight: 600; font-size: 14px; color: var(--white); }
    .mc-date { font-size: 10px; color: var(--text3); }
    .mc-mood { font-size: 18px; }
    .mc-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .mc-tag {
      padding: 2px 8px; border-radius: 10px; font-size: 10px;
      font-weight: 600; border: 1px solid var(--border);
      background: var(--g2); color: var(--text2);
    }
    .mc-tag.cost { background: var(--green-bg); color: var(--green); border-color: rgba(52,211,153,0.3); }
    .mc-tag.weather { background: var(--yellow-bg); color: var(--yellow); border-color: rgba(251,191,36,0.3); }
    .mc-media-strip { display: flex; gap: 5px; overflow-x: auto; }
    .mc-media-strip::-webkit-scrollbar { height: 0; }
    .mc-thumb {
      width: 52px; height: 52px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; cursor: pointer;
      transition: var(--t);
    }
    .mc-thumb:hover { transform: scale(1.05); }
    .mc-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* ══════ MEMORY DETAIL PANEL ══════ */
    .detail-hero {
      width: 100%; aspect-ratio: 16/9;
      background: var(--g1); border-radius: var(--r);
      overflow: hidden; position: relative; margin-bottom: 16px;
    }
    .detail-hero img, .detail-hero video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .detail-hero-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text3); gap: 8px;
    }
    .detail-section { margin-bottom: 18px; }
    .detail-section-title {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-item {
      background: var(--g1); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 10px 12px;
    }
    .detail-item-label { font-size: 9px; color: var(--text3); text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }
    .detail-item-value { font-size: 13px; color: var(--white); font-weight: 500; margin-top: 2px; }
    .media-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .mg-item {
      aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      background: var(--g1); cursor: pointer; transition: var(--t);
      position: relative;
    }
    .mg-item:hover { transform: scale(1.03); }
    .mg-item img, .mg-item video { width: 100%; height: 100%; object-fit: cover; }
    .mg-item .mg-del {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,0.6); border: none; color: #fff;
      border-radius: 6px; padding: 2px 6px; font-size: 10px;
      cursor: pointer; opacity: 0; transition: var(--t);
    }
    .mg-item:hover .mg-del { opacity: 1; }
    .voice-item {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 12px; background: var(--g1);
      border: 1px solid var(--border); border-radius: var(--rs);
      margin-bottom: 6px;
    }
    .voice-play-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: var(--t); flex-shrink: 0;
    }
    .voice-play-btn:hover { transform: scale(1.1); }
    .timeline-item {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .tl-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 4px;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .journal-entry {
      background: var(--g1); border-left: 3px solid var(--accent);
      border-radius: 0 var(--rs) var(--rs) 0;
      padding: 12px 14px; font-size: 13px; color: var(--text2);
      line-height: 1.7; margin-bottom: 8px;
    }

    /* ══════ ADD MEMORY FORM ══════ */
    .form-field { margin-bottom: 12px; }
    .form-field label {
      display: block; font-size: 11px; color: var(--text2);
      margin-bottom: 5px; font-weight: 600; letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%; border: 1px solid var(--border);
      border-radius: var(--rs); padding: 10px 13px;
      font-size: 13px; font-family: var(--ff-sans);
      outline: none; background: var(--g1); color: var(--white);
      transition: var(--t);
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
      border-color: var(--accent); background: var(--g2);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-field input::placeholder, .form-field textarea::placeholder { color: var(--text3); }
    .form-field select option { background: #0d0d1f; color: #fff; }
    .form-field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
    .row2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: var(--rs);
      font-size: 13px; cursor: pointer; border: none;
      font-weight: 500; transition: var(--t); font-family: var(--ff-sans);
    }
    .btn-accent {
      background: linear-gradient(135deg,var(--accent),var(--accent-d));
      color: #fff; box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-accent:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-glass {
      background: var(--g2); color: var(--white);
      border: 1px solid var(--border2);
    }
    .btn-glass:hover { background: var(--g3); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .btn-sm { padding: 6px 13px; font-size: 12px; }
    .btn-xs { padding: 4px 10px; font-size: 11px; }
    .btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 14px; margin-top: 8px; }
    .btn:active { transform: scale(0.96); }

    /* ══════ MOOD PICKER ══════ */
    .mood-picker { display: flex; gap: 6px; flex-wrap: wrap; }
    .mood-opt {
      padding: 6px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--g1);
      cursor: pointer; transition: var(--t); font-size: 12px; color: var(--text2);
    }
    .mood-opt:hover { background: var(--g2); color: var(--white); }
    .mood-opt.sel { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ══════ LOCATION SEARCH ══════ */
    .loc-results {
      background: rgba(10,10,25,0.97); border: 1px solid var(--border2);
      border-radius: var(--rs); margin-top: 4px; overflow: hidden;
      max-height: 200px; overflow-y: auto; display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .loc-results.show { display: block; }
    .loc-result-item {
      padding: 10px 13px; cursor: pointer; font-size: 13px;
      color: var(--text2); transition: var(--t);
      border-bottom: 1px solid var(--border);
    }
    .loc-result-item:last-child { border-bottom: none; }
    .loc-result-item:hover { background: var(--g2); color: var(--white); }
    .loc-result-item .loc-name { font-weight: 600; color: var(--white); }
    .loc-result-item .loc-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }

    /* ══════ MEDIA UPLOAD SECTION ══════ */
    .media-upload-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .upload-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 14px; border-radius: var(--rs);
      background: var(--g1); border: 1px dashed var(--border2);
      color: var(--text2); font-size: 12px; cursor: pointer;
      transition: var(--t); font-family: var(--ff-sans);
    }
    .upload-btn:hover { background: var(--g2); color: var(--white); border-color: var(--accent); }
    .preview-strip { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 8px; }
    .preview-strip::-webkit-scrollbar { height: 0; }
    .preview-item {
      width: 60px; height: 60px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
    }

    /* ══════ STATS VIEW ══════ */
    #statsView {
      position: absolute; inset: 0; z-index: 80;
      background: rgba(2,2,9,0.95);
      backdrop-filter: blur(30px);
      display: none; flex-direction: column;
      overflow: hidden;
    }
    #statsView.open { display: flex; }
    .stats-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .stats-content { flex: 1; overflow-y: auto; padding: 20px; }
    .stats-content::-webkit-scrollbar { width: 3px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
    @media(min-width:500px) { .kpi-grid { grid-template-columns: repeat(4,1fr); } }
    .kpi-card {
      background: var(--g1); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px 12px; text-align: center;
      transition: var(--t);
    }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .kpi-n { font-family: var(--ff-serif); font-size: 28px; font-weight: 700; color: var(--white); }
    .kpi-l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; font-weight: 700; }
    .world-list { }
    .world-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .world-item:last-child { border-bottom: none; }
    .world-rank { font-size: 11px; color: var(--text3); font-weight: 700; min-width: 20px; }
    .world-city { font-size: 13px; color: var(--white); font-weight: 500; flex: 1; }
    .world-count { font-size: 11px; color: var(--accent); font-weight: 600; }
    .achievement-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .achievement {
      background: var(--g1); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 14px 10px; text-align: center;
      transition: var(--t);
    }
    .achievement.unlocked {
      background: linear-gradient(135deg,rgba(100,100,220,0.12),rgba(220,100,180,0.08));
      border-color: var(--accent);
    }
    .achievement.locked { opacity: 0.45; }
    .achievement .ach-ico { font-size: 28px; margin-bottom: 5px; }
    .achievement .ach-name { font-size: 10px; font-weight: 700; color: var(--white); }
    .achievement .ach-desc { font-size: 9px; color: var(--text3); margin-top: 2px; }
    .heatmap-row {
      display: flex; gap: 3px; flex-wrap: wrap; margin-top: 8px;
    }
    .hm-cell {
      width: 14px; height: 14px; border-radius: 3px;
      background: var(--g2); position: relative;
    }
    .hm-cell[data-count="1"] { background: hsla(var(--h),100%,62%,0.3); }
    .hm-cell[data-count="2"] { background: hsla(var(--h),100%,62%,0.55); }
    .hm-cell[data-count="3"] { background: hsla(var(--h),100%,62%,0.75); }
    .hm-cell[data-count="4"] { background: var(--accent); }
    .timeline-strip {
      position: relative; padding-left: 20px;
    }
    .timeline-strip::before {
      content:''; position: absolute; left: 6px; top: 0; bottom: 0;
      width: 2px; background: var(--g2); border-radius: 1px;
    }

    /* ══════ IMAGE VIEWER ══════ */
    .img-viewer {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.96);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .img-viewer.open { display: flex; }
    .img-viewer img, .img-viewer video {
      max-width: 94vw; max-height: 92dvh;
      object-fit: contain; border-radius: 10px;
    }
    .img-viewer-close {
      position: absolute; top: 16px; right: 18px;
      background: rgba(255,255,255,0.12); border: none;
      color: #fff; font-size: 22px; width: 42px; height: 42px;
      border-radius: 50%; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: var(--t);
    }
    .img-viewer-close:hover { background: rgba(255,255,255,0.25); }

    /* ══════ TOAST ══════ */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(15,15,20,0.9); backdrop-filter: blur(16px);
      color: var(--white); padding: 10px 20px; border-radius: 24px;
      font-size: 13px; z-index: 99999; opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      border: 1px solid var(--border2); font-weight: 500;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════ LOADING ══════ */
    #loadingOverlay {
      position: absolute; inset: 0; z-index: 200;
      background: #020209;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .loading-globe {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      animation: loadSpin 2s linear infinite;
      box-shadow: 0 0 40px var(--accent-glow), 0 0 80px var(--accent2-glow);
    }
    @keyframes loadSpin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--ff-serif); font-size: 18px; color: var(--text2);
    }
    .loading-sub { font-size: 12px; color: var(--text3); }

    /* ══════ EMPTY STATE ══════ */
    .empty-globe {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center; pointer-events: none; z-index: 40;
    }
    .empty-globe-ico { font-size: 64px; margin-bottom: 14px; opacity: 0.5; }
    .empty-globe-title {
      font-family: var(--ff-serif); font-size: 20px;
      color: var(--text2); margin-bottom: 6px;
    }
    .empty-globe-sub { font-size: 13px; color: var(--text3); }

    /* ══════ FILTER BAR ══════ */
    .filter-bar {
      position: absolute; top: 110px; left: 50%;
      transform: translateX(-50%); z-index: 50;
      display: flex; gap: 6px; overflow-x: auto;
      padding: 0 4px 4px; max-width: calc(100vw - 40px);
    }
    .filter-bar::-webkit-scrollbar { height: 0; }
    .filter-chip {
      flex-shrink: 0; padding: 6px 12px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: var(--t); color: var(--text2);
      white-space: nowrap;
    }
    .filter-chip:hover { background: rgba(255,255,255,0.12); color: var(--white); }
    .filter-chip.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 2px 8px var(--accent-glow);
    }

    /* ══════ HEART MARKER (SVG injected into canvas) ══════ */
    /* handled via Three.js sprites */

    /* ══════ EXTRA CHIP LABEL FORM ══════ */
    .chips-input { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .chips-input .chip {
      padding: 3px 10px; border-radius: 12px;
      background: var(--g2); border: 1px solid var(--border);
      font-size: 11px; color: var(--text2);
      display: flex; align-items: center; gap: 5px;
    }
    .chips-input .chip button {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 12px; padding: 0; line-height: 1;
    }
    .chips-input .chip button:hover { color: var(--red); }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(16px); }
      to { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes heartBeat {
      0%,100%{transform:scale(1)}
      20%{transform:scale(1.25)}
      40%{transform:scale(0.96)}
      60%{transform:scale(1.14)}
    }
  </style>
</head>

<!-- Three.js for globe -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Leaflet for flat map -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
'use strict';
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const API = 'https://us-app-api.onrender.com';
let coupleId = null, myName = 'You', partnerName = 'Partner';
let memories = []; // all memories from server
let cityGroups = {}; // { "City,Country": [memories] }
let activeFilter = 'all';
let leafletMap = null, leafletMarkers = [];
let editingMemoryId = null;
let newMediaFiles = []; // files staged for upload in add form
let newVoiceData = null; // base64 audio staged
let addFormChips = { restaurants: [], hotels: [], gifts: [] };
let mediaRecorder = null, audioChunks = [], isRecording = false;

// ═══════════════════════════════════════════
// THEME SYNC (parent → iframe)
// ═══════════════════════════════════════════
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'theme') {
    const root = document.documentElement;
    Object.entries(e.data.vars || {}).forEach(([k, v]) => root.style.setProperty(k, v));
  }
  if (e.data.type === 'names') {
    myName = e.data.my || 'You';
    partnerName = e.data.partner || 'Partner';
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  try {
    const raw = localStorage.getItem('uwl_v5');
    if (raw) {
      const s = JSON.parse(raw);
      coupleId = s.coupleId;
      myName = s.myName || 'You';
      partnerName = s.partnerName || 'Partner';
    }
  } catch(e) {}

  initStars();
  initGlobe();

  if (coupleId) {
    await loadMemories();
  } else {
    // demo mode — no memories
    document.getElementById('loadingOverlay').style.display = 'none';
    showEmptyState(true);
  }
}

// ═══════════════════════════════════════════
// STARS BACKGROUND
// ═══════════════════════════════════════════
function initStars() {
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  const stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(),
      speed: 0.002 + Math.random() * 0.005,
      phase: Math.random() * Math.PI * 2
    });
  }
  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.2 + 0.8 * ((Math.sin(t * s.speed + s.phase) + 1) / 2);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);
}

// ═══════════════════════════════════════════
// THREE.JS GLOBE
// ═══════════════════════════════════════════
let scene, camera, renderer, globe, clouds, atmosphere;
let isDragging = false, prevMouse = {x:0,y:0};
let targetRotX = 0.2, targetRotY = 0, currentRotX = 0.2, currentRotY = 0;
let targetZoom = 2.8, currentZoom = 2.8;
let markers3D = []; // {mesh, lat, lng, city, country, count}
let touchStartDist = null;

function initGlobe() {
  const canvas = document.getElementById('globeCanvas');
  const W = window.innerWidth, H = window.innerHeight;

  // Scene
  scene = new THREE.Scene();

  // Camera
  camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.z = targetZoom;

  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  // Ambient light
  const ambient = new THREE.AmbientLight(0x333355, 0.8);
  scene.add(ambient);

  // Sun light (directional)
  const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
  sunLight.position.set(5, 3, 5);
  scene.add(sunLight);

  // Rim light (blue atmosphere feel)
  const rimLight = new THREE.DirectionalLight(0x4488ff, 0.4);
  rimLight.position.set(-5, -3, -5);
  scene.add(rimLight);

  // ── Earth ──
  const earthGeo = new THREE.SphereGeometry(1, 64, 64);
  const earthMat = new THREE.MeshPhongMaterial({
    color: 0x1a3a6b,
    emissive: 0x050a1a,
    specular: 0x222244,
    shininess: 18,
  });

  // Draw procedural earth texture on canvas
  const texCanvas = document.createElement('canvas');
  texCanvas.width = 1024; texCanvas.height = 512;
  const tc = texCanvas.getContext('2d');
  drawEarthTexture(tc, 1024, 512);
  earthMat.map = new THREE.CanvasTexture(texCanvas);
  earthMat.map.needsUpdate = true;

  globe = new THREE.Mesh(earthGeo, earthMat);
  scene.add(globe);

  // ── Ocean specular layer ──
  const oceanGeo = new THREE.SphereGeometry(1.001, 64, 64);
  const oceanMat = new THREE.MeshPhongMaterial({
    color: 0x0a2040,
    transparent: true, opacity: 0.18,
    specular: 0x6699ff, shininess: 80,
  });
  scene.add(new THREE.Mesh(oceanGeo, oceanMat));

  // ── Clouds ──
  const cloudGeo = new THREE.SphereGeometry(1.012, 48, 48);
  const cloudCanvas = document.createElement('canvas');
  cloudCanvas.width = 512; cloudCanvas.height = 256;
  drawClouds(cloudCanvas.getContext('2d'), 512, 256);
  const cloudMat = new THREE.MeshPhongMaterial({
    map: new THREE.CanvasTexture(cloudCanvas),
    transparent: true, opacity: 0.38, depthWrite: false,
  });
  clouds = new THREE.Mesh(cloudGeo, cloudMat);
  scene.add(clouds);

  // ── Atmosphere glow ──
  const atmGeo = new THREE.SphereGeometry(1.08, 48, 48);
  const atmMat = new THREE.MeshPhongMaterial({
    color: 0x3399ff, transparent: true, opacity: 0.07,
    side: THREE.BackSide, depthWrite: false,
  });
  atmosphere = new THREE.Mesh(atmGeo, atmMat);
  scene.add(atmosphere);

  // ── Outer glow ──
  const glowGeo = new THREE.SphereGeometry(1.18, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x2255aa, transparent: true, opacity: 0.04,
    side: THREE.BackSide, depthWrite: false,
  });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // ── Events ──
  setupGlobeEvents(canvas);

  // ── Animate ──
  animate();
}

function drawEarthTexture(ctx, W, H) {
  // Deep ocean base
  const oceanGrad = ctx.createLinearGradient(0, 0, 0, H);
  oceanGrad.addColorStop(0, '#0a1f3d');
  oceanGrad.addColorStop(0.5, '#0d2b50');
  oceanGrad.addColorStop(1, '#071528');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, W, H);

  // Continents (simplified procedural shapes)
  ctx.fillStyle = '#2d5a27';

  // North America
  drawContinent(ctx, [
    [80,120],[180,80],[220,100],[240,180],[200,260],[160,300],
    [120,280],[80,240],[60,180]
  ]);

  // South America
  drawContinent(ctx, [
    [160,300],[200,290],[220,340],[200,420],[180,470],[160,460],
    [140,400],[140,340]
  ]);

  // Europe
  drawContinent(ctx, [
    [430,90],[490,80],[510,100],[520,130],[490,150],[460,160],
    [430,140],[420,110]
  ]);

  // Africa
  drawContinent(ctx, [
    [450,165],[510,155],[540,200],[550,280],[530,370],[500,430],
    [470,420],[450,380],[440,300],[440,220]
  ]);

  // Asia
  drawContinent(ctx, [
    [510,80],[680,70],[760,100],[800,150],[780,200],[720,220],
    [660,240],[600,220],[560,200],[540,160],[510,130]
  ]);

  // Australia
  drawContinent(ctx, [
    [720,320],[800,300],[840,330],[840,390],[800,410],[750,400],
    [710,380],[700,350]
  ]);

  // Greenland
  drawContinent(ctx, [
    [230,50],[280,40],[300,70],[280,100],[250,110],[220,90],[210,70]
  ]);

  // Add some texture detail - mountain ridges
  ctx.strokeStyle = 'rgba(100,180,80,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 30; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 20, y + 10);
    ctx.stroke();
  }

  // Ice caps
  ctx.fillStyle = 'rgba(220,240,255,0.85)';
  ctx.fillRect(0, 0, W, 20);
  ctx.fillRect(0, H-18, W, 18);

  // Ocean depth variation
  ctx.fillStyle = 'rgba(0,40,100,0.15)';
  for (let i = 0; i < 12; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    ctx.beginPath();
    ctx.ellipse(x, y, 60+Math.random()*80, 30+Math.random()*40, Math.random()*Math.PI, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawContinent(ctx, points) {
  if (points.length < 3) return;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  // Scale to texture size (points designed for ~1024x512 roughly)
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.closePath();
  // Land gradient
  const g = ctx.createRadialGradient(
    points[0][0], points[0][1], 0,
    points[0][0], points[0][1], 120
  );
  g.addColorStop(0, '#3d7a32');
  g.addColorStop(0.5, '#2d5a25');
  g.addColorStop(1, '#1e3d1a');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(50,100,40,0.4)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

function drawClouds(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.0)';
  ctx.fillRect(0, 0, W, H);
  // Draw cloud puffs
  for (let i = 0; i < 60; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = 10 + Math.random() * 30;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.4, 'rgba(255,255,255,0.5)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(x, y, r, r*0.6, Math.random()*Math.PI, 0, Math.PI*2);
    ctx.fill();
  }
}

function latLngToXYZ(lat, lng, r = 1.02) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return {
    x: -(r * Math.sin(phi) * Math.cos(theta)),
    y: r * Math.cos(phi),
    z: r * Math.sin(phi) * Math.sin(theta)
  };
}

function createHeartMarker(count, mood) {
  // Create a sprite texture with a heart shape
  const size = 64;
  const mc = document.createElement('canvas');
  mc.width = size; mc.height = size;
  const mctx = mc.getContext('2d');

  // Glow
  const glow = mctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  glow.addColorStop(0, 'rgba(255,100,180,0.6)');
  glow.addColorStop(1, 'rgba(255,100,180,0)');
  mctx.fillStyle = glow;
  mctx.beginPath();
  mctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  mctx.fill();

  // Heart
  mctx.font = `${26 + Math.min(count * 2, 10)}px serif`;
  mctx.textAlign = 'center';
  mctx.textBaseline = 'middle';
  const emoji = mood ? mood.split(' ')[0] : '❤️';
  mctx.fillText(emoji, size/2, size/2 + 2);

  // Count badge
  if (count > 1) {
    mctx.fillStyle = 'rgba(255,255,255,0.95)';
    mctx.beginPath();
    mctx.arc(size-10, 8, 9, 0, Math.PI*2);
    mctx.fill();
    mctx.fillStyle = '#e00060';
    mctx.font = 'bold 9px Inter, sans-serif';
    mctx.textAlign = 'center';
    mctx.textBaseline = 'middle';
    mctx.fillText(count, size-10, 9);
  }

  const tex = new THREE.CanvasTexture(mc);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  const s = 0.05 + Math.min(count * 0.008, 0.025);
  sprite.scale.set(s * 2, s * 2, 1);
  return sprite;
}

function addMarkersToGlobe() {
  // Remove old markers
  markers3D.forEach(m => globe.remove(m.mesh));
  markers3D = [];

  const filtered = getFilteredMemories();
  const cityMap = {};
  filtered.forEach(m => {
    const key = m.city + ',' + m.country;
    if (!cityMap[key]) cityMap[key] = { lat: m.lat, lng: m.lng, city: m.city, country: m.country, memories: [], mood: m.mood };
    cityMap[key].memories.push(m);
  });

  Object.values(cityMap).forEach(c => {
    const pos = latLngToXYZ(c.lat, c.lng);
    const sprite = createHeartMarker(c.memories.length, c.mood);
    sprite.position.set(pos.x, pos.y, pos.z);
    globe.add(sprite);
    markers3D.push({ mesh: sprite, lat: c.lat, lng: c.lng, city: c.city, country: c.country, count: c.memories.length });
  });

  updateStats();
  showEmptyState(filtered.length === 0 && memories.length === 0);
}

let animT = 0;
function animate() {
  requestAnimationFrame(animate);
  animT += 0.01;

  // Smooth rotation easing
  if (!isDragging) {
    targetRotY += 0.0006; // slow auto-rotation
  }
  currentRotX += (targetRotX - currentRotX) * 0.08;
  currentRotY += (targetRotY - currentRotY) * 0.08;
  currentZoom += (targetZoom - currentZoom) * 0.08;

  globe.rotation.x = currentRotX;
  globe.rotation.y = currentRotY;
  if (clouds) { clouds.rotation.x = currentRotX * 0.98; clouds.rotation.y = currentRotY + animT * 0.0004; }
  if (atmosphere) { atmosphere.rotation.copy(globe.rotation); }
  camera.position.z = currentZoom;

  // Pulse markers
  markers3D.forEach((m, i) => {
    const pulse = 1 + 0.08 * Math.sin(animT * 2 + i * 0.7);
    m.mesh.scale.set(m.mesh.scale.x * 0, m.mesh.scale.y * 0, 1); // reset
    const base = 0.05 + Math.min(m.count * 0.008, 0.025);
    m.mesh.scale.set(base * 2 * pulse, base * 2 * pulse, 1);
  });

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════
// GLOBE INTERACTION
// ═══════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function setupGlobeEvents(canvas) {
  // Mouse
  canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = {x: e.clientX, y: e.clientY}; });
  canvas.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
    if (Math.abs(dx) < 5 && Math.abs(dy) < 5) handleGlobeClick(e);
    isDragging = false;
  });
  canvas.addEventListener('mousemove', e => {
    if (isDragging) {
      const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
      targetRotY += dx * 0.006;
      targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX + dy * 0.006));
      prevMouse = {x: e.clientX, y: e.clientY};
    } else {
      handleHover(e.clientX, e.clientY);
    }
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    targetZoom = Math.max(1.6, Math.min(5, targetZoom + e.deltaY * 0.003));
  }, {passive: false});

  // Touch
  let touchPrev = null, touchStart2Dist = 0;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      isDragging = true;
      touchPrev = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    } else if (e.touches.length === 2) {
      touchStart2Dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, {passive: false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - prevMouse.x;
      const dy = e.touches[0].clientY - prevMouse.y;
      targetRotY += dx * 0.007;
      targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX + dy * 0.007));
      prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    } else if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (touchStart2Dist) {
        const scale = d / touchStart2Dist;
        targetZoom = Math.max(1.6, Math.min(5, targetZoom / scale));
        touchStart2Dist = d;
      }
    }
  }, {passive: false});
  canvas.addEventListener('touchend', e => {
    if (e.changedTouches.length === 1) {
      const dx = e.changedTouches[0].clientX - (touchPrev?.x || 0);
      const dy = e.changedTouches[0].clientY - (touchPrev?.y || 0);
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) {
        handleGlobeClick(e.changedTouches[0]);
      }
    }
    isDragging = false;
    touchPrev = null;
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function getMouseNDC(clientX, clientY) {
  return {
    x: (clientX / window.innerWidth) * 2 - 1,
    y: -(clientY / window.innerHeight) * 2 + 1
  };
}

function handleGlobeClick(e) {
  const ndc = getMouseNDC(e.clientX, e.clientY);
  mouse.set(ndc.x, ndc.y);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(markers3D.map(m => m.mesh));
  if (hits.length) {
    const markerData = markers3D.find(m => m.mesh === hits[0].object);
    if (markerData) openCityPanel(markerData.city, markerData.country);
  }
  hideTip();
}

function handleHover(clientX, clientY) {
  const ndc = getMouseNDC(clientX, clientY);
  mouse.set(ndc.x, ndc.y);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(markers3D.map(m => m.mesh));
  const tip = document.getElementById('cityTooltip');
  if (hits.length) {
    const m = markers3D.find(x => x.mesh === hits[0].object);
    if (m) {
      document.getElementById('ttCity').textContent = m.city;
      document.getElementById('ttMeta').textContent = m.country;
      document.getElementById('ttCount').textContent = m.count + ' memor' + (m.count===1?'y':'ies');
      tip.style.left = (clientX + 14) + 'px';
      tip.style.top = (clientY - 10) + 'px';
      tip.classList.add('show');
      document.getElementById('globeCanvas').style.cursor = 'pointer';
      return;
    }
  }
  hideTip();
}

function hideTip() {
  document.getElementById('cityTooltip').classList.remove('show');
  document.getElementById('globeCanvas').style.cursor = 'grab';
}

function resetView() {
  targetRotX = 0.2; targetRotY = 0; targetZoom = 2.8;
  toast('View reset 🎯');
}

// ═══════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════
async function loadMemories() {
  try {
    const res = await fetch(`${API}/api/globe/${coupleId}`);
    if (!res.ok) throw new Error('Failed');
    memories = await res.json();
    buildCityGroups();
    addMarkersToGlobe();
    updateStats();
    document.getElementById('loadingOverlay').style.display = 'none';
  } catch(e) {
    console.warn('Globe load:', e.message);
    memories = [];
    document.getElementById('loadingOverlay').style.display = 'none';
    showEmptyState(true);
  }
}

function buildCityGroups() {
  cityGroups = {};
  memories.forEach(m => {
    const key = m.city + ',' + m.country;
    if (!cityGroups[key]) cityGroups[key] = [];
    cityGroups[key].push(m);
  });
}

function getFilteredMemories() {
  if (activeFilter === 'all') return memories;
  return memories.filter(m => {
    if (['2025','2024','2023','2022'].includes(activeFilter)) {
      return (m.date_from || '').startsWith(activeFilter);
    }
    return m.mood && m.mood.startsWith(activeFilter);
  });
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function updateStats() {
  const filtered = getFilteredMemories();
  const cities = new Set(filtered.map(m => m.city));
  const countries = new Set(filtered.map(m => m.country));
  const cost = filtered.reduce((s, m) => s + (parseFloat(m.trip_cost) || 0), 0);

  document.getElementById('statCities').textContent = cities.size;
  document.getElementById('statCountries').textContent = countries.size;
  document.getElementById('statMemories').textContent = filtered.length;
  document.getElementById('statCost').textContent = cost > 0 ? '₹' + Math.round(cost).toLocaleString('en-IN') : '₹0';
}

function showEmptyState(show) {
  document.getElementById('emptyState').style.display = show ? 'block' : 'none';
}

// ═══════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════
let currentView = 'globe';
function switchView(view, btn) {
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentView = view;

  document.getElementById('globeCanvas').style.display = view === 'globe' ? 'block' : 'none';
  document.getElementById('starsCanvas').style.display = view === 'globe' ? 'block' : 'none';
  document.getElementById('mapView').style.display = view === 'map' ? 'block' : 'none';
  document.getElementById('timelineView').style.display = view === 'timeline' ? 'block' : 'none';

  if (view === 'map') initLeafletMap();
  if (view === 'timeline') renderTimelineView();
}

function initLeafletMap() {
  if (leafletMap) { leafletMap.invalidateSize(); renderLeafletMarkers(); return; }
  leafletMap = L.map('leafletMapDiv', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(leafletMap);
  renderLeafletMarkers();
}

function renderLeafletMarkers() {
  leafletMarkers.forEach(m => leafletMap.removeLayer(m));
  leafletMarkers = [];
  const filtered = getFilteredMemories();
  const cityMap = {};
  filtered.forEach(m => {
    const key = m.city + ',' + m.country;
    if (!cityMap[key]) cityMap[key] = { lat: m.lat, lng: m.lng, city: m.city, country: m.country, count: 0, mood: m.mood };
    cityMap[key].count++;
  });
  Object.values(cityMap).forEach(c => {
    const emoji = c.mood ? c.mood.split(' ')[0] : '❤️';
    const icon = L.divIcon({
      html: `<div style="font-size:${20 + Math.min(c.count * 3, 12)}px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));cursor:pointer;animation:heartBeat 2s ease-in-out infinite">${emoji}</div>`,
      className: '', iconSize: [36, 36]
    });
    const marker = L.marker([c.lat, c.lng], { icon })
      .addTo(leafletMap)
      .on('click', () => openCityPanel(c.city, c.country));
    leafletMarkers.push(marker);
  });
}

function renderTimelineView() {
  const el = document.getElementById('timelineContent');
  const filtered = getFilteredMemories()
    .slice()
    .sort((a, b) => (b.date_from || '').localeCompare(a.date_from || ''));

  if (!filtered.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">📅</div>
      <div style="font-size:16px">No memories yet</div>
    </div>`;
    return;
  }

  const moodColors = {'😊':'#fbbf24','🥰':'#ff6b9d','😌':'#34d399','😤':'#f87171','🤩':'var(--accent)','😔':'#a78bfa'};

  el.innerHTML = `<div class="timeline-strip">
    ${filtered.map((m, i) => {
      const emoji = (m.mood || '').split(' ')[0] || '❤️';
      const color = moodColors[emoji] || 'var(--accent)';
      const media = (m.globe_memory_media || []).find(x => x.type === 'photo');
      return `<div class="timeline-item fade-in" style="animation-delay:${i*0.06}s;cursor:pointer" onclick="openMemoryDetail(${JSON.stringify(m.id).replace(/"/g,'&quot;')})">
        <div class="tl-dot" style="background:${color};box-shadow:0 0 0 3px ${color}33"></div>
        <div style="flex:1">
          <div style="font-size:11px;color:var(--text3);font-weight:600">${fmtDate(m.date_from)}</div>
          <div style="font-size:14px;font-weight:600;color:var(--white);margin:3px 0">${esc(m.trip_name || m.city)}</div>
          <div style="font-size:12px;color:var(--text2)">${emoji} ${esc(m.city)}, ${esc(m.country)}</div>
          ${m.notes ? `<div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5">${esc(m.notes.slice(0,80))}${m.notes.length>80?'...':''}</div>` : ''}
          ${media ? `<img src="${esc(media.url || media.data_url)}" style="width:100%;max-width:260px;border-radius:10px;margin-top:8px;object-fit:cover;max-height:140px">` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// FILTER
// ═══════════════════════════════════════════
let filterVisible = false;
function cycleFilter() {
  filterVisible = !filterVisible;
  const fb = document.getElementById('filterBar');
  fb.style.display = filterVisible ? 'flex' : 'none';
}

function applyFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  addMarkersToGlobe();
  if (currentView === 'map') renderLeafletMarkers();
  if (currentView === 'timeline') renderTimelineView();
}

  document.getElementById('cityPanelTitle').textContent = `${flagMap} ${city}`;

  const el = document.getElementById('cityPanelBody');
  el.innerHTML = `
    <div class="city-header">
      <div class="city-flag">${flagMap}</div>
      <div class="city-info">
        <div class="city-name">${esc(city)}</div>
        <div class="city-sub">${esc(country)} · ${mems.length} memor${mems.length===1?'y':'ies'}</div>
      </div>
    </div>
    <button class="btn btn-accent btn-sm" style="width:100%;justify-content:center;margin-bottom:14px"

// ── Location search via Nominatim ──
let locSearchTimer = null;
async function searchLocation(q) {
  clearTimeout(locSearchTimer);
  const res = document.getElementById('locResults');
  if (!q || q.length < 3) { res.classList.remove('show'); return; }
  locSearchTimer = setTimeout(async () => {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`, {
        headers: { 'Accept-Language': 'en' }
      });
      const data = await r.json();
      if (!data.length) { res.classList.remove('show'); return; }
      res.innerHTML = data.map(d => {
        const city = d.address?.city || d.address?.town || d.address?.village || d.address?.county || d.name || q;
        const country = d.address?.country || '';
        const state = d.address?.state || '';
        return `<div class="loc-result-item" onclick="selectLocation('${esc(city)}','${esc(country)}','${esc(state)}',${d.lat},${d.lon},'${esc(d.display_name)}')">
          <div class="loc-name">${esc(city)}</div>
          <div class="loc-sub">${esc(state ? state + ', ' : '')}${esc(country)}</div>
        </div>`;
      }).join('');
      res.classList.add('show');
    } catch(e) { console.warn('Nominatim:', e); }
  }, 400);
}

function selectLocation(city, country, state, lat, lng, display) {
  document.getElementById('formLocSearch').value = city + (country ? ', ' + country : '');
  document.getElementById('formCity').value = city;
  document.getElementById('formCountry').value = country;
  document.getElementById('formState').value = state;
  document.getElementById('formLat').value = lat;
  document.getElementById('formLng').value = lng;
  document.getElementById('locResults').classList.remove('show');

  // Auto-fetch weather for this location
  fetchWeatherForLocation(lat, lng);
}

async function fetchWeatherForLocation(lat, lng) {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
    const d = await r.json();
    if (d.current_weather) {
      const code = d.current_weather.weathercode;
      const temp = d.current_weather.temperature;
      const weatherNames = {0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Cloudy',45:'Foggy',51:'Drizzle',61:'Rainy',71:'Snowy',80:'Showers',95:'Stormy'};
      const weatherName = weatherNames[code] || weatherNames[Math.floor(code/10)*10] || 'Clear';
      const sel = document.getElementById('formWeather');
      const ti = document.getElementById('formTemp');
      if (sel) {
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === weatherName) { sel.selectedIndex = i; break; }
        }
      }
      if (ti) ti.value = Math.round(temp);
      toast('📍 Location + weather auto-filled!');
    }
  } catch(e) {}
}

// ── Media staging ──
function stageMedia(input, type) {
  Array.from(input.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      newMediaFiles.push({ type, dataUrl: e.target.result, name: f.name });
      renderPreviewStrip();
    };
    reader.readAsDataURL(f);
  });
}

function renderPreviewStrip() {
  const el = document.getElementById('previewStrip');
  if (!el) return;
  el.innerHTML = newMediaFiles.map((f, i) => {
    if (f.type === 'photo') return `<img src="${esc(f.dataUrl)}" class="preview-item">`;
    if (f.type === 'video') return `<video src="${esc(f.dataUrl)}" class="preview-item" muted></video>`;
    return `<div class="preview-item" style="background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:20px">🎙️</div>`;
  }).join('');
  if (newVoiceData) {
    el.innerHTML += `<div class="preview-item" style="background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:20px">🎙️</div>`;
  }
}

// ── Voice recording (in add form) ──
async function toggleVoiceRecord() {
  const btn = document.getElementById('voiceBtn');
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = e2 => {
          newVoiceData = e2.target.result;
          newMediaFiles.push({ type: 'voice', dataUrl: e2.target.result, duration: '—' });
          renderPreviewStrip();
          toast('Voice note recorded! 🎙️');
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      isRecording = true;
      if (btn) btn.textContent = '⏹ Stop';
      toast('🎙 Recording... tap Stop when done');
    } catch(e) { toast('Microphone access denied'); }
  } else {
    if (mediaRecorder) mediaRecorder.stop();
    isRecording = false;
    if (btn) btn.textContent = '🎙️ Voice';
  }
}

// ── Save Memory ──
async function saveMemory() {
  const city = document.getElementById('formCity').value.trim();
  const country = document.getElementById('formCountry').value.trim();
  const lat = parseFloat(document.getElementById('formLat').value);
  const lng = parseFloat(document.getElementById('formLng').value);

  if (!city || !country || isNaN(lat) || isNaN(lng)) {
    toast('Please search and select a location first 📍');
    return;
  }
  if (!coupleId) { toast('Please pair your account first'); return; }

  const memory = {
    city, country,
    state: document.getElementById('formState').value,
    lat, lng,
    trip_name: document.getElementById('formTripName').value.trim(),
    date_from: document.getElementById('formDateFrom').value || null,
    date_to: document.getElementById('formDateTo').value || null,
    mood: document.getElementById('formMood').value,
    weather: document.getElementById('formWeather').value,
    temperature: document.getElementById('formTemp').value,
    trip_cost: parseFloat(document.getElementById('formCost').value) || null,
    currency: document.getElementById('formCurrency').value,
    notes: document.getElementById('formNotes').value.trim(),
    favorite_moment: document.getElementById('formFav').value.trim(),
    restaurants: addFormChips.restaurants,
    hotels: addFormChips.hotels,
    gifts: addFormChips.gifts,
    by_role: getRole()
  };

  const journalText = document.getElementById('formJournal').value.trim();

  try {
    let savedMemory;
    if (editingMemoryId) {
      const res = await fetch(`${API}/api/globe/${editingMemoryId}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ memory })
      });
      savedMemory = await res.json();
      toast('Memory updated! 💕');
    } else {
      const res = await fetch(`${API}/api/globe`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ coupleId, memory })
      });
      savedMemory = await res.json();
      toast('Memory pinned to the globe! 🌍');
    }

    // Upload staged media
    for (const f of newMediaFiles) {
      await fetch(`${API}/api/globe/${savedMemory.id}/media`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          coupleId, media: {
            type: f.type, data_url: f.dataUrl, duration: f.duration || null
          }
        })
      });
    }

    // Journal entry
    if (journalText) {
      await fetch(`${API}/api/globe/${savedMemory.id}/media`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ coupleId, media: { type: 'journal', journal_text: journalText } })
      });
    }

    closeAddPanel();
    await loadMemories();
    spawnHearts();
  } catch(e) {
    toast('Error saving: ' + e.message);
  }
}

async function addMediaToMemory(input, memoryId, type) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      await fetch(`${API}/api/globe/${memoryId}/media`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ coupleId, media: { type, data_url: e.target.result } })
      });
      toast('Added! 📸');
      await loadMemories();
      openMemoryDetail(memoryId);
    } catch(err) { toast('Upload failed'); }
  };
  reader.readAsDataURL(input.files[0]);
}

async function recordVoiceForMemory(memoryId) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const chunks = [];
    const mr = new MediaRecorder(stream);
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = async () => {
      const blob = new Blob(chunks, {type:'audio/webm'});
      const reader = new FileReader();
      reader.onload = async e2 => {
        await fetch(`${API}/api/globe/${memoryId}/media`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ coupleId, media: { type:'voice', data_url: e2.target.result, duration:'—' } })
        });
        toast('Voice note saved! 🎙️');
        await loadMemories();
        openMemoryDetail(memoryId);
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mr.start();
    toast('🎙 Recording... tap record again to stop');
    setTimeout(() => { if (mr.state !== 'inactive') mr.stop(); }, 30000);
  } catch(e) { toast('Mic access denied'); }
}

async function addJournalToMemory(memoryId) {
  const text = prompt('Write your journal entry:');
  if (!text || !text.trim()) return;
  await fetch(`${API}/api/globe/${memoryId}/media`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ coupleId, media: { type:'journal', journal_text: text.trim() } })
  });
  toast('Journal saved! 📖');
  await loadMemories();
  openMemoryDetail(memoryId);
}

async function deleteMedia(mediaId, memoryId) {
  if (!confirm('Delete this media?')) return;
  await fetch(`${API}/api/globe/media/${mediaId}`, { method:'DELETE' });
  toast('Deleted');
  await loadMemories();
  openMemoryDetail(memoryId);
}

async function deleteMemory(id) {
  if (!confirm('Delete this memory? This cannot be undone.')) return;
  await fetch(`${API}/api/globe/${id}`, { method:'DELETE' });
  toast('Memory removed from globe');
  await loadMemories();
  closeDetailPanel();
  closeCityPanel();
}

// ═══════════════════════════════════════════
// VOICE PLAYBACK
// ═══════════════════════════════════════════
function playVoice(src, btn) {
  const audio = new Audio(src);
  if (btn) btn.textContent = '⏸';
  audio.play();
  audio.onended = () => { if (btn) btn.textContent = '▶'; };
  audio.onerror = () => { if (btn) btn.textContent = '▶'; toast('Cannot play audio'); };
}

// ═══════════════════════════════════════════
// STATS VIEW
// ═══════════════════════════════════════════
function openStats() {
  renderStats();
  document.getElementById('statsView').classList.add('open');
}
function closeStats() {
  document.getElementById('statsView').classList.remove('open');
}

function renderStats() {
  const el = document.getElementById('statsContent');
  const filtered = memories;
  const cities = [...new Set(filtered.map(m => m.city))];
  const countries = [...new Set(filtered.map(m => m.country))];
  const totalCost = filtered.reduce((s, m) => s + (parseFloat(m.trip_cost)||0), 0);
  const photos = filtered.reduce((s, m) => s + (m.globe_memory_media||[]).filter(x=>x.type==='photo').length, 0);

  // City frequency
  const cityFreq = {};
  filtered.forEach(m => { cityFreq[m.city] = (cityFreq[m.city]||0) + 1; });
  const topCities = Object.entries(cityFreq).sort((a,b)=>b[1]-a[1]).slice(0, 8);

  // Mood distribution
  const moodFreq = {};
  filtered.forEach(m => { if (m.mood) { const k = m.mood.split(' ')[0]; moodFreq[k]=(moodFreq[k]||0)+1; } });

  // Achievements
  const achievements = [
    { ico:'🌱', name:'First Memory', desc:'Pin your first memory', unlocked: filtered.length >= 1 },
    { ico:'🏙️', name:'City Explorer', desc:'Visit 3+ cities', unlocked: cities.length >= 3 },
    { ico:'🌍', name:'World Traveler', desc:'Visit 3+ countries', unlocked: countries.length >= 3 },
    { ico:'💰', name:'Big Spender', desc:'Log ₹10,000+ in travel', unlocked: totalCost >= 10000 },
    { ico:'📸', name:'Photographer', desc:'Add 20+ photos', unlocked: photos >= 20 },
    { ico:'🗺️', name:'Continent Hopper', desc:'Visit 5+ countries', unlocked: countries.length >= 5 },
    { ico:'💕', name:'Romantics', desc:'Log 5+ memories together', unlocked: filtered.length >= 5 },
    { ico:'👑', name:'Globe Masters', desc:'Visit 10+ cities', unlocked: cities.length >= 10 },
    { ico:'🎙️', name:'Storytellers', desc:'Add 5+ voice notes', unlocked: filtered.reduce((s,m)=>s+(m.globe_memory_media||[]).filter(x=>x.type==='voice').length,0) >= 5 },
  ];

  // Heatmap (last 12 months)
  const heatmap = {};
  filtered.forEach(m => {
    if (m.date_from) {
      const key = m.date_from.slice(0,7);
      heatmap[key] = (heatmap[key]||0) + 1;
    }
  });
  const heatMonths = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth() - i);
    heatMonths.push(d.toISOString().slice(0,7));
  }

  el.innerHTML = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-n" style="color:var(--accent)">${filtered.length}</div><div class="kpi-l">Memories</div></div>
      <div class="kpi-card"><div class="kpi-n" style="color:#ff6b9d">${cities.length}</div><div class="kpi-l">Cities</div></div>
      <div class="kpi-card"><div class="kpi-n" style="color:var(--green)">${countries.length}</div><div class="kpi-l">Countries</div></div>
      <div class="kpi-card"><div class="kpi-n" style="color:var(--yellow);font-size:20px">₹${totalCost>0?Math.round(totalCost/1000)+'k':0}</div><div class="kpi-l">Spent</div></div>
    </div>

    <!-- Heatmap -->
    <div style="margin-bottom:20px">
      <div class="detail-section-title">🗓️ Activity (last 12 months)</div>
      <div class="heatmap-row">
        ${heatMonths.map(m => {
          const count = Math.min(heatmap[m]||0, 4);
          const label = m.slice(5);
          return `<div class="hm-cell" data-count="${count}" title="${m}: ${heatmap[m]||0} memories"></div>`;
        }).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:4px">
        <span>${heatMonths[0]}</span><span>${heatMonths[11]}</span>
      </div>
    </div>

    <!-- Top cities -->
    ${topCities.length ? `
    <div style="margin-bottom:20px">
      <div class="detail-section-title">🏙️ Most Visited Cities</div>
      ${topCities.map(([city, count], i) => `
        <div class="world-item">
          <div class="world-rank">${i+1}</div>
          <div class="world-city">${esc(city)}</div>
          <div class="world-count">${count} memor${count===1?'y':'ies'}</div>
        </div>`).join('')}
    </div>` : ''}

    <!-- Mood distribution -->
    ${Object.keys(moodFreq).length ? `
    <div style="margin-bottom:20px">
      <div class="detail-section-title">💭 Mood Distribution</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${Object.entries(moodFreq).map(([emoji, count]) =>
          `<div class="kpi-card" style="min-width:70px;padding:10px">
            <div style="font-size:24px">${emoji}</div>
            <div style="font-size:14px;font-weight:700;color:var(--white)">${count}</div>
          </div>`
        ).join('')}
      </div>
    </div>` : ''}

    <!-- Achievements -->
    <div style="margin-bottom:20px">
      <div class="detail-section-title">🏅 Achievements</div>
      <div class="achievement-grid">
        ${achievements.map(a => `
          <div class="achievement ${a.unlocked ? 'unlocked' : 'locked'}">
            <div class="ach-ico">${a.ico}</div>
            <div class="ach-name">${a.name}</div>
            <div class="ach-desc">${a.desc}</div>
            ${a.unlocked ? '<div style="font-size:9px;color:var(--green);margin-top:3px;font-weight:700">✓ Unlocked</div>' : ''}
          </div>`).join('')}
      </div>
    </div>

    <div style="height:40px"></div>
  `;
}

// ═══════════════════════════════════════════
// IMAGE VIEWER
// ═══════════════════════════════════════════
function openViewer(src, type) {
  const iv = document.getElementById('imgViewer');
  const img = document.getElementById('viewerImg');
  const vid = document.getElementById('viewerVid');
  if (type === 'video') {
    img.style.display = 'none';
    vid.style.display = 'block';
    vid.src = src;
  } else {
    vid.style.display = 'none';
    img.style.display = 'block';
    img.src = src;
  }
  iv.classList.add('open');
}
function closeViewer() {
  document.getElementById('imgViewer').classList.remove('open');
  document.getElementById('viewerVid').pause();
}
document.getElementById('imgViewer').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(s) {
  if (!s) return '';
  try { return new Date(s + 'T00:00:00').toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }); }
  catch(e) { return s; }
}
function toast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

    'Switzerland':'🇨🇭','Greece':'🇬🇷','Turkey':'🇹🇷','Indonesia':'🇮🇩',
    'Malaysia':'🇲🇾','Vietnam':'🇻🇳','China':'🇨🇳','South Korea':'🇰🇷',
    'Portugal':'🇵🇹','Netherlands':'🇳🇱','New Zealand':'🇳🇿','Brazil':'🇧🇷',
    'Mexico':'🇲🇽','Egypt':'🇪🇬','Morocco':'🇲🇦','Kenya':'🇰🇪',

function getRole() {
  try { const s = JSON.parse(localStorage.getItem('uwl_v5')||'{}'); return s.role || 'user1'; } catch(e) { return 'user1'; }
}

// Hearts celebration
function spawnHearts() {
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.style.cssText = `position:fixed;pointer-events:none;z-index:9999;font-size:${20+Math.random()*20}px;left:${20+Math.random()*60}vw;bottom:${30+Math.random()*20}px;animation:riseUp ${1.5+Math.random()*1.5}s cubic-bezier(0.16,1,0.3,1) forwards;--rot:${Math.random()>0.5?'360deg':'-360deg'}`;
      p.textContent = ['❤️','💕','🌍','✨','💫'][Math.floor(Math.random()*5)];
      if (!document.getElementById('riseUpStyle')) {
        const s = document.createElement('style'); s.id='riseUpStyle';
        s.textContent = `@keyframes riseUp{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(-80vh) rotate(var(--rot)) scale(0.3);opacity:0}}`;
        document.head.appendChild(s);
      }
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }, i * 120);
  }
}

// ═══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAllPanels();
  if (e.key === 'n' && !e.target.closest('input,textarea')) openAddMemory();
  if (e.key === 's' && !e.target.closest('input,textarea')) openStats();
});
